<!doctype html>
<title>Bottom</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: var(--terminal-background, var(--panel-background)); color: var(--terminal-foreground, var(--panel-foreground)); font: var(--ide-font-size, 13px) var(--ide-font-ui, -apple-system, BlinkMacSystemFont, "Segoe WPC", "Segoe UI", sans-serif); }
  body { display: flex; flex-direction: column; }
  .xterm-viewport { overflow-x: hidden !important; overscroll-behavior: none; }
  .xterm-viewport::-webkit-scrollbar { width: 14px; height: 14px; background: transparent; }
  .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
  .xterm-viewport::-webkit-scrollbar-thumb { background: var(--scrollbarSlider-background, #c1c1c1); border-radius: 0; }
  .xterm-viewport::-webkit-scrollbar-thumb:hover { background: var(--scrollbarSlider-hoverBackground, #a8a8a8); }
  .xterm-viewport::-webkit-scrollbar-corner { background: transparent; }
  .topbar {
    box-sizing: border-box;
    height: 32px;
    flex: none;
    display: flex;
    align-items: center;
    background: var(--terminal-background, var(--panel-background));
  }
  .topbarTab {
    border: 0;
    background: transparent;
    border-radius: 5px;
    padding: 3px 10px;
    margin-left: 6px;
    font: inherit;
    cursor: pointer;
    color: var(--terminal-foreground, var(--panel-foreground));
    opacity: 0.6;
  }
  .topbarTab:hover { opacity: 0.8; }
  .topbarTab.active {
    background: var(--list-inactiveSelectionBackground);
    color: var(--list-inactiveSelectionForeground, var(--panel-foreground));
    opacity: 1;
  }
  .topbarControl {
    width: 20px;
    height: 20px;
    margin-right: 6px;
    margin-left: auto;
    border: 0;
    border-radius: 5px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    color: var(--terminal-foreground, var(--panel-foreground));
    cursor: pointer;
  }
  .topbarControl:hover { background: var(--list-inactiveSelectionBackground); }
  .topbarControl .icon { width: 12px; height: 12px; display: block; background: currentColor; -webkit-mask: url(icons/add.svg) center / contain no-repeat; mask: url(icons/add.svg) center / contain no-repeat; }
  .body { flex: 1; min-height: 0; display: flex; }
  .terms { flex: 1; min-width: 0; position: relative; }
  .group { position: absolute; inset: 0; display: none; }
  .group.active { display: flex; }
  .termPane { min-width: 0; position: relative; }
  .termPaneInner { position: absolute; inset: 0; padding: 4px; box-sizing: border-box; }
  .vgutter { flex: none; width: 2px; cursor: col-resize; position: relative; z-index: 1; background: color-mix(in srgb, var(--editor-background) 88%, var(--editor-foreground)); }
  .vgutter::before { content: ""; position: absolute; top: 0; bottom: 0; left: -1px; right: -1px; background: var(--editorWidget-resizeBorder, var(--activityBarBadge-background)); opacity: 0; transition: opacity 0.15s ease-out; }
  .vgutter:hover::before, .vgutter.dragging::before { opacity: 1; transition: opacity 0.10s ease-in 0.2s; }
  body.dragging .termPaneInner { pointer-events: none; }
  .tabPane {
    flex: none;
    width: 200px;
    box-sizing: border-box;
    border-left: 1px solid var(--editorGroup-border);
    overflow-y: auto;
    padding: 4px 0;
  }
  .tab {
    box-sizing: border-box;
    display: flex;
    align-items: center;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 2px 12px 2px 12px;
    border-top: 1px solid transparent;
    border-bottom: 1px solid transparent;
    color: var(--terminal-foreground, var(--panel-foreground));
  }
  .tab:hover { background: var(--list-hoverBackground); color: var(--list-hoverForeground); }
  .tab.selected { background: var(--list-inactiveSelectionBackground); color: var(--list-inactiveSelectionForeground); }
  body.tabFocused .tab.selected {
    background: var(--list-activeSelectionBackground);
    color: var(--list-activeSelectionForeground);
    border-top-color: color-mix(in srgb, var(--list-activeSelectionBackground) 80%, black);
    border-bottom-color: color-mix(in srgb, var(--list-activeSelectionBackground) 80%, black);
  }
  .tabPrefix { flex: none; white-space: pre; }
  .tabIcon { width: 16px; height: 16px; flex: none; margin-right: 4px; background: currentColor; -webkit-mask: url(icons/terminal.svg) center / 14px 14px no-repeat; mask: url(icons/terminal.svg) center / 14px 14px no-repeat; }
  .tabLabel { min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .tabControls { margin-left: auto; display: flex; flex: none; padding-left: 4px; }
  .tabControl { width: 20px; height: 20px; border: 0; border-radius: 5px; padding: 0; display: flex; align-items: center; justify-content: center; background: transparent; color: inherit; cursor: pointer; }
  .tabControl:hover { background: var(--list-inactiveSelectionBackground); }
  .tabControl .icon { width: 12px; height: 12px; display: block; background: currentColor; -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; -webkit-mask-position: center; mask-position: center; -webkit-mask-size: contain; mask-size: contain; }
  .tabControl.split .icon { -webkit-mask-image: url(icons/split-horizontal.svg); mask-image: url(icons/split-horizontal.svg); }
  .tabControl.trash .icon { -webkit-mask-image: url(icons/trash.svg); mask-image: url(icons/trash.svg); }
</style>
<div class="topbar"><button class="topbarTab" id="serverTab" type="button">Problems</button><button class="topbarTab active" id="terminalTab" type="button">Terminal</button><button class="topbarControl" id="add" type="button" aria-label="Add terminal"><span class="icon"></span></button></div>
<div class="body" id="terminalBody">
  <div class="terms" id="terms"></div>
  <div class="tabPane" id="tabPane"></div>
</div>
<div class="body" id="serverBody" style="display: none; align-items: flex-start; justify-content: flex-start; padding: 8px;"><span>No problems have been detected in the workspace.</span></div>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
  const themeOptions = () => {
    const css = getComputedStyle(document.documentElement);
    const v = (name, fallback) => css.getPropertyValue(name).trim() || fallback;
    return {
      background: v('--terminal-background', v('--panel-background', '#1e1e1e')),
      foreground: v('--terminal-foreground', v('--panel-foreground', '#cccccc')),
      cursor: v('--terminalCursor-foreground', v('--panel-foreground', '#cccccc')),
      selectionBackground: v('--terminal-selectionBackground', v('--editor-selectionBackground', '#264f78')),
      black: v('--terminal-ansiBlack', '#000000'),
      red: v('--terminal-ansiRed', '#cd3131'),
      green: v('--terminal-ansiGreen', '#0dbc79'),
      yellow: v('--terminal-ansiYellow', '#e5e510'),
      blue: v('--terminal-ansiBlue', '#2472c8'),
      magenta: v('--terminal-ansiMagenta', '#bc3fbc'),
      cyan: v('--terminal-ansiCyan', '#11a8cd'),
      white: v('--terminal-ansiWhite', '#e5e5e5'),
      brightBlack: v('--terminal-ansiBrightBlack', '#666666'),
      brightRed: v('--terminal-ansiBrightRed', '#f14c4c'),
      brightGreen: v('--terminal-ansiBrightGreen', '#23d18b'),
      brightYellow: v('--terminal-ansiBrightYellow', '#f5f543'),
      brightBlue: v('--terminal-ansiBrightBlue', '#3b8eea'),
      brightMagenta: v('--terminal-ansiBrightMagenta', '#d670d6'),
      brightCyan: v('--terminal-ansiBrightCyan', '#29b8db'),
      brightWhite: v('--terminal-ansiBrightWhite', '#e5e5e5'),
    };
  };

  const fontFamily = getComputedStyle(document.documentElement).getPropertyValue('--ide-font-editor').trim() || 'monospace';
  const termsEl = document.getElementById('terms');
  const tabPaneEl = document.getElementById('tabPane');
  const sessions = new Map();
  const groups = [];
  let selectedId = null;
  let activeId = null;
  let nextId = 1;

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/terminal`);
  const queue = [];
  const send = msg => { if (ws.readyState === ws.OPEN) ws.send(JSON.stringify(msg)); else queue.push(msg); };
  ws.onopen = () => { while (queue.length) ws.send(JSON.stringify(queue.shift())); };

  const groupOf = id => groups.find(g => g.members.includes(id));

  const prefixFor = (group, id) => {
    const n = group.members.length;
    if (n < 2) return '';
    const i = group.members.indexOf(id);
    if (i === 0) return '\u250c ';
    if (i === n - 1) return '\u2514 ';
    return '\u251c ';
  };

  const renderTabs = () => {
    tabPaneEl.innerHTML = '';
    for (const group of groups) {
      for (const id of group.members) {
        const s = sessions.get(id);
        const tab = document.createElement('div');
        tab.className = 'tab' + (id === selectedId ? ' selected' : '');
        const prefix = prefixFor(group, id);
        if (prefix) {
          const pre = document.createElement('span');
          pre.className = 'tabPrefix';
          pre.textContent = prefix;
          tab.appendChild(pre);
        }
        const icon = document.createElement('span');
        icon.className = 'tabIcon';
        tab.appendChild(icon);
        const label = document.createElement('span');
        label.className = 'tabLabel';
        label.textContent = 'zsh';
        tab.appendChild(label);
        const controls = document.createElement('span');
        controls.className = 'tabControls';
        const split = document.createElement('button');
        split.className = 'tabControl split';
        split.type = 'button';
        split.setAttribute('aria-label', 'Split terminal');
        split.innerHTML = '<span class="icon"></span>';
        split.onmousedown = e => { e.stopPropagation(); };
        split.onclick = e => { e.stopPropagation(); splitTerminal(id); };
        const trash = document.createElement('button');
        trash.className = 'tabControl trash';
        trash.type = 'button';
        trash.setAttribute('aria-label', 'Kill terminal');
        trash.innerHTML = '<span class="icon"></span>';
        trash.onmousedown = e => { e.stopPropagation(); };
        trash.onclick = e => { e.stopPropagation(); killTerminal(id); };
        controls.appendChild(split);
        controls.appendChild(trash);
        tab.appendChild(controls);
        tab.onmousedown = e => { e.stopPropagation(); selectTerminal(id, true); };
        tabPaneEl.appendChild(tab);
      }
    }
  };

  const renderGroups = () => {
    for (const group of groups) {
      group.el.classList.toggle('active', group.members.includes(activeId));
      group.el.innerHTML = '';
      group.members.forEach((id, i) => {
        const s = sessions.get(id);
        if (i > 0) {
          const g = document.createElement('div');
          g.className = 'vgutter';
          attachVGutter(g, group, i);
          group.el.appendChild(g);
        }
        s.pane.style.flex = group.sizes[i] + ' 1 0';
        group.el.appendChild(s.pane);
      });
    }
    fitAll();
  };

  const fitAll = () => { for (const s of sessions.values()) fitSession(s); };

  const selectTerminal = (id, tabFocused) => {
    activeId = id;
    selectedId = id;
    document.body.classList.toggle('tabFocused', !!tabFocused);
    renderGroups();
    renderTabs();
    const s = sessions.get(id);
    if (s) { s.term.focus(); fitSession(s); }
  };

  const clearTabSelection = () => {
    selectedId = null;
    document.body.classList.remove('tabFocused');
    renderTabs();
  };

  const fitSession = s => {
    const group = groupOf(s.id);
    if (group && group.el.classList.contains('active') && s.pane.offsetWidth > 0) {
      s.fit.fit();
      send({ type: 'resize', id: s.id, cols: s.term.cols, rows: s.term.rows });
    }
  };

  const makeSession = () => {
    const id = nextId++;
    const pane = document.createElement('div');
    pane.className = 'termPane';
    const inner = document.createElement('div');
    inner.className = 'termPaneInner';
    pane.appendChild(inner);
    const term = new Terminal({ fontFamily, fontSize: 13, smoothScrollDuration: 0, theme: themeOptions() });
    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(inner);
    const viewport = inner.querySelector('.xterm-viewport');
    if (viewport) viewport.addEventListener('wheel', e => {
      e.preventDefault();
      viewport.scrollTop += e.deltaY;
    }, { passive: false });
    const s = { id, term, fit, pane };
    sessions.set(id, s);
    send({ type: 'spawn', id });
    term.onData(data => send({ type: 'data', id, data }));
    pane.addEventListener('mousedown', () => selectTerminal(id, false));
    new ResizeObserver(() => fitSession(s)).observe(inner);
    return s;
  };

  const createTerminal = () => {
    const s = makeSession();
    const group = { members: [s.id], sizes: [1], el: document.createElement('div') };
    group.el.className = 'group';
    termsEl.appendChild(group.el);
    groups.push(group);
    selectTerminal(s.id);
  };

  const splitTerminal = id => {
    const group = groupOf(id);
    if (!group) return;
    const s = makeSession();
    const idx = group.members.indexOf(id) + 1;
    group.members.splice(idx, 0, s.id);
    group.sizes = group.members.map(() => 1);
    selectTerminal(s.id);
  };

  const killTerminal = id => {
    const group = groupOf(id);
    const s = sessions.get(id);
    if (!group || !s) return;
    send({ type: 'kill', id });
    s.term.dispose();
    sessions.delete(id);
    const idx = group.members.indexOf(id);
    group.members.splice(idx, 1);
    group.sizes = group.members.map(() => 1);
    if (group.members.length === 0) {
      group.el.remove();
      groups.splice(groups.indexOf(group), 1);
    }
    if (activeId === id) {
      const next = group.members[Math.min(idx, group.members.length - 1)]
        ?? groups[0]?.members[0] ?? null;
      if (next != null) selectTerminal(next);
      else { activeId = null; selectedId = null; renderTabs(); }
    } else {
      renderGroups();
      renderTabs();
    }
  };

  const attachVGutter = (el, group, beforeIndex) => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      e.stopPropagation();
      const leftPane = sessions.get(group.members[beforeIndex - 1]).pane;
      const rightPane = sessions.get(group.members[beforeIndex]).pane;
      const li = beforeIndex - 1, ri = beforeIndex;
      const startX = e.clientX;
      const startLeft = leftPane.offsetWidth, startRight = rightPane.offsetWidth;
      const total = startLeft + startRight, totalFlex = group.sizes[li] + group.sizes[ri];
      const move = ev => {
        let newLeft = startLeft + (ev.clientX - startX);
        newLeft = Math.max(40, Math.min(total - 40, newLeft));
        const newRight = total - newLeft;
        group.sizes[li] = totalFlex * (newLeft / total);
        group.sizes[ri] = totalFlex * (newRight / total);
        leftPane.style.flex = group.sizes[li] + ' 1 0';
        rightPane.style.flex = group.sizes[ri] + ' 1 0';
      };
      const up = () => {
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', up);
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        document.body.classList.remove('dragging');
        el.classList.remove('dragging');
        fitAll();
      };
      document.body.style.userSelect = 'none';
      document.body.style.cursor = 'col-resize';
      document.body.classList.add('dragging');
      el.classList.add('dragging');
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
    });
  };

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    const s = sessions.get(msg.id);
    if (!s) return;
    if (msg.type === 'data') s.term.write(msg.data);
    else if (msg.type === 'exit') s.term.write('\r\n[process exited]\r\n');
  };

  document.getElementById('add').onclick = createTerminal;

  const serverTabEl = document.getElementById('serverTab');
  const terminalTabEl = document.getElementById('terminalTab');
  const terminalBodyEl = document.getElementById('terminalBody');
  const serverBodyEl = document.getElementById('serverBody');
  const addEl = document.getElementById('add');
  const setActiveTab = tab => {
    const terminal = tab === 'terminal';
    terminalTabEl.classList.toggle('active', terminal);
    serverTabEl.classList.toggle('active', !terminal);
    terminalBodyEl.style.display = terminal ? 'flex' : 'none';
    serverBodyEl.style.display = terminal ? 'none' : 'flex';
    addEl.style.display = terminal ? '' : 'none';
    if (terminal) fitAll();
  };
  terminalTabEl.onclick = () => setActiveTab('terminal');
  serverTabEl.onclick = () => setActiveTab('server');

  tabPaneEl.addEventListener('mousedown', event => {
    if (!event.target.closest('.tab')) clearTabSelection();
  });

  const applyTheme = () => { for (const s of sessions.values()) s.term.options.theme = themeOptions(); };
  const resetTerminals = () => {
    for (const id of [...sessions.keys()]) killTerminal(id);
    createTerminal();
  };
  addEventListener('message', e => {
    if (e.data?.type === 'settings:theme') requestAnimationFrame(applyTheme);
    else if (e.data?.type === 'terminal:reset') resetTerminals();
  });

  createTerminal();
</script>
