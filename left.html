<!doctype html>
<title>Left</title>
<style>
  html, body { margin: 0; height: 100%; font: var(--ide-font-size, 13px) var(--ide-font-ui, -apple-system, BlinkMacSystemFont, "Segoe WPC", "Segoe UI", sans-serif); background: var(--sideBar-background); color: var(--sideBar-foreground); }
  html { overflow: hidden; }
  body { overflow-y: scroll; overflow-x: hidden; overscroll-behavior: none; box-sizing: border-box; }
  ::-webkit-scrollbar { width: 14px; height: 14px; background: transparent; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbarSlider-background, #c1c1c1); border-radius: 0; }
  ::-webkit-scrollbar-thumb:hover { background: var(--scrollbarSlider-hoverBackground, #a8a8a8); }
  ::-webkit-scrollbar-corner { background: transparent; }
  ul { list-style: none; margin: 0; padding: 0; }
  ul.root { padding: 4px 0; }
  ul.children { position: relative; }
  .row { cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; box-sizing: border-box; padding-top: 2px; padding-bottom: 2px; padding-right: 0; }
  .row:hover { background: var(--list-hoverBackground); color: var(--list-hoverForeground); }
  .row.selected { background: var(--list-inactiveSelectionBackground); color: var(--list-inactiveSelectionForeground); }
  body.focused .row.selected { background: var(--list-activeSelectionBackground); color: var(--list-activeSelectionForeground); box-shadow: inset 0 1px 0 color-mix(in srgb, var(--list-activeSelectionBackground) 80%, black), inset 0 -1px 0 color-mix(in srgb, var(--list-activeSelectionBackground) 80%, black); }
  .caret { display: inline-block; width: 16px; height: 16px; flex: none; margin-right: 4px; background: currentColor; opacity: 0.7; -webkit-mask: url(icons/chevron-right.svg) center / 10px 10px no-repeat; mask: url(icons/chevron-right.svg) center / 10px 10px no-repeat; }
  .caret.expanded { -webkit-mask-image: url(icons/chevron-down.svg); mask-image: url(icons/chevron-down.svg); }
  @font-face { font-family: "seti"; src: url(icons/seti.woff) format("woff"); }
  .row > span:last-child { overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .file-icon { width: 16px; height: 16px; flex: none; margin-right: 4px; font-family: "seti"; font-size: 16px; line-height: 16px; text-align: center; }
  .guide { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--tree-indentGuidesStroke, var(--editorGroup-border)); pointer-events: none; }
  .guide.dim { opacity: 0; }
  body.hovering .guide.dim { opacity: 0.5; }
  .guide.on-selected { opacity: 1; }
</style>
<ul id="files" class="root"></ul>
<script>
  let fileNames = [];
  let selectedPath = null;
  let selectedType = null;
  const expanded = new Set();
  const ROW_PAD_LEFT = 12;
  const GUIDE_ICON_MARGIN = 5;
  const rowIconLeft = depth => ROW_PAD_LEFT + depth * GUIDE_ICON_MARGIN;
  let setiTheme = null;
  let themeVariant = 'dark';
  const EXT_LANG = {
    js: 'javascript', mjs: 'javascript', cjs: 'javascript', jsx: 'javascript',
    ts: 'typescript', tsx: 'typescriptreact', html: 'html', htm: 'html',
    md: 'markdown', txt: 'plaintext', css: 'css', json: 'json'
  };
  fetch('icons/vs-seti-icon-theme.json').then(r => r.json()).then(t => { setiTheme = t; render(); });
  const fileIconFor = name => {
    if (!setiTheme) return { char: '', color: 'inherit' };
    const light = themeVariant === 'light';
    const variant = light ? (setiTheme.light || {}) : {};
    const lower = name.toLowerCase();
    const dot = lower.lastIndexOf('.');
    const ext = dot >= 0 ? lower.slice(dot + 1) : '';
    const lang = EXT_LANG[ext];
    const key = (variant.fileNames && variant.fileNames[lower]) || setiTheme.fileNames[lower]
      || (variant.fileExtensions && variant.fileExtensions[ext]) || setiTheme.fileExtensions[ext]
      || (lang && variant.languageIds && variant.languageIds[lang]) || (lang && setiTheme.languageIds[lang])
      || variant.file || setiTheme.file;
    const def = setiTheme.iconDefinitions[key] || setiTheme.iconDefinitions[setiTheme.file];
    return { char: String.fromCodePoint(parseInt(def.fontCharacter.replace(/\\/g, ''), 16)), color: def.fontColor };
  };

  const buildTree = paths => {
    const node = { dirs: new Map(), files: [] };
    for (const p of paths) {
      const parts = p.split('/');
      let cur = node;
      for (let i = 0; i < parts.length - 1; i++) {
        const part = parts[i];
        if (!cur.dirs.has(part)) cur.dirs.set(part, { dirs: new Map(), files: [] });
        cur = cur.dirs.get(part);
      }
      cur.files.push(parts[parts.length - 1]);
    }
    return node;
  };

  const isImmediateParent = dirPath => {
    if (selectedPath == null) return false;
    const idx = selectedPath.lastIndexOf('/');
    if (idx < 0) return false;
    return selectedPath.slice(0, idx) === dirPath;
  };

  const expandAncestors = path => {
    if (!path) return;
    const parts = path.split('/');
    for (let i = 1; i < parts.length; i++) {
      expanded.add(parts.slice(0, i).join('/'));
    }
  };

  const renderNode = (node, parentPath, depth) => {
    const ul = document.createElement('ul');
    ul.className = depth === 0 ? 'root' : 'children';
    if (depth > 0) {
      const guide = document.createElement('div');
      guide.className = 'guide ' + (isImmediateParent(parentPath) ? 'on-selected' : 'dim');
      guide.style.left = rowIconLeft(depth - 1) + 'px';
      ul.appendChild(guide);
    }
    const dirNames = [...node.dirs.keys()].sort();
    for (const name of dirNames) {
      const childPath = parentPath ? parentPath + '/' + name : name;
      const li = document.createElement('li');
      const row = document.createElement('div');
      row.className = 'row dir';
      row.style.paddingLeft = rowIconLeft(depth) + 'px';
      const caret = document.createElement('span');
      caret.className = 'caret';
      if (expanded.has(childPath)) caret.classList.add('expanded');
      row.appendChild(caret);
      const label = document.createElement('span');
      label.textContent = name;
      row.appendChild(label);
      if (selectedType === 'dir' && selectedPath === childPath) row.classList.add('selected');
      row.onclick = () => {
        selectedPath = childPath;
        selectedType = 'dir';
        if (expanded.has(childPath)) expanded.delete(childPath);
        else expanded.add(childPath);
        render();
      };
      li.appendChild(row);
      if (expanded.has(childPath)) {
        li.appendChild(renderNode(node.dirs.get(name), childPath, depth + 1));
      }
      ul.appendChild(li);
    }
    const files = [...node.files].sort();
    for (const name of files) {
      const childPath = parentPath ? parentPath + '/' + name : name;
      const li = document.createElement('li');
      const row = document.createElement('div');
      row.className = 'row file';
      row.style.paddingLeft = rowIconLeft(depth) + 'px';
      const icon = document.createElement('span');
      icon.className = 'file-icon';
      const glyph = fileIconFor(name);
      icon.textContent = glyph.char;
      icon.style.color = glyph.color;
      row.appendChild(icon);
      const label = document.createElement('span');
      label.textContent = name;
      row.appendChild(label);
      if (selectedType === 'file' && selectedPath === childPath) row.classList.add('selected');
      row.onclick = () => {
        selectedPath = childPath;
        selectedType = 'file';
        parent.postMessage({ type: 'vfs:open', name: childPath }, '*');
        render();
      };
      li.appendChild(row);
      ul.appendChild(li);
    }
    return ul;
  };

  const render = ({ revealSelected = false } = {}) => {
    const tree = buildTree(fileNames);
    const newRoot = renderNode(tree, '', 0);
    newRoot.id = 'files';
    document.getElementById('files').replaceWith(newRoot);
    if (revealSelected) {
      requestAnimationFrame(() => {
        document.querySelector('.row.file.selected')?.scrollIntoView({ block: 'nearest' });
      });
    }
  };

  addEventListener('message', e => {
    if (e.data?.type === 'vfs:files') {
      fileNames = e.data.files;
      render();
    } else if (e.data?.type === 'vfs:reset') {
      fileNames = [];
      selectedPath = null;
      selectedType = null;
      expanded.clear();
      render();
    } else if (e.data?.type === 'vfs:selected') {
      selectedPath = e.data.name;
      selectedType = selectedPath ? 'file' : null;
      expandAncestors(selectedPath);
      render({ revealSelected: true });
    } else if (e.data?.type === 'settings:theme') {
      themeVariant = e.data.value === 'light' ? 'light' : 'dark';
      render();
    }
  });
  const clearSelection = () => {
    selectedPath = null;
    selectedType = null;
    render();
  };
  const setFocused = v => document.body.classList.toggle('focused', v);
  addEventListener('focus', () => setFocused(true));
  addEventListener('blur', () => setFocused(false));
  document.addEventListener('mousedown', event => {
    setFocused(true);
    if (!event.target.closest('.row')) clearSelection();
  });
  setFocused(document.hasFocus());

  document.documentElement.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
  document.documentElement.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));

  parent.postMessage({ type: 'vfs:list' }, '*');
</script>
