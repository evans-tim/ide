<!doctype html>
<title>Left</title>
<style>
  html, body { margin: 0; height: 100%; font: var(--ide-font-size, 13px) var(--ide-font-ui, -apple-system, BlinkMacSystemFont, "Segoe WPC", "Segoe UI", sans-serif); background: var(--sideBar-background); color: var(--sideBar-foreground); }
  html { overflow: hidden; }
  body { overflow: hidden; box-sizing: border-box; display: flex; flex-direction: column; }
  .topbar { box-sizing: border-box; height: 32px; flex: none; display: flex; align-items: center; justify-content: center; gap: 4px; padding: 0 6px; background: var(--sideBar-background); }
  .topbarBtn { width: 28px; height: 24px; flex: none; border: 0; padding: 0; border-radius: 5px; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: color-mix(in srgb, var(--sideBar-foreground) 70%, transparent); }
  .topbarBtn:hover, .topbarBtn.active { background: var(--list-inactiveSelectionBackground); color: var(--sideBar-foreground); }
  .topbarBtn .icon { width: 16px; height: 16px; flex: none; display: block; background: currentColor; }
  .topbarBtn.filesBtn .icon { -webkit-mask: url(icons/files.svg) center / 16px 16px no-repeat; mask: url(icons/files.svg) center / 16px 16px no-repeat; }
  .topbarBtn.searchBtn .icon { -webkit-mask: url(icons/search.svg) center / 16px 16px no-repeat; mask: url(icons/search.svg) center / 16px 16px no-repeat; }
  .topbarBtn.deployBtn .icon { -webkit-mask: url(icons/deploy.svg) center / 16px 16px no-repeat; mask: url(icons/deploy.svg) center / 16px 16px no-repeat; }
  .topbarBtn.extensionsBtn .icon { -webkit-mask: url(icons/extensions.svg) center / 16px 16px no-repeat; mask: url(icons/extensions.svg) center / 16px 16px no-repeat; }
  #treeView { flex: 1; min-height: 0; overflow-y: overlay; overflow-x: hidden; overscroll-behavior: none; }
  li { width: 100%; }
  #searchView, #deployView, #extensionsView { flex: 1; min-height: 0; overflow: hidden; padding: 8px 12px; display: none; }
  #treeView::-webkit-scrollbar { width: 14px; height: 14px; background: transparent; }
  #treeView::-webkit-scrollbar-track { background: transparent; }
  #treeView::-webkit-scrollbar-thumb { background: var(--scrollbarSlider-background, #c1c1c1); border-radius: 0; }
  #treeView::-webkit-scrollbar-thumb:hover { background: var(--scrollbarSlider-hoverBackground, #a8a8a8); }
  #treeView::-webkit-scrollbar-corner { background: transparent; }
  ul { list-style: none; margin: 0; padding: 0; width: 100%; }
  ul.root { padding: 4px 0; }
  ul.children { position: relative; }
  .row { cursor: pointer; white-space: nowrap; overflow: hidden; display: flex; align-items: center; box-sizing: border-box; width: 100%; padding-top: 2px; padding-bottom: 2px; padding-right: 0; }
  .row:hover { background: var(--list-hoverBackground); color: var(--list-hoverForeground); }
  .row.selected { background: var(--list-inactiveSelectionBackground); color: var(--list-inactiveSelectionForeground); }
  body.focused .row.selected { background: var(--list-activeSelectionBackground); color: var(--list-activeSelectionForeground); box-shadow: inset 0 1px 0 color-mix(in srgb, var(--list-activeSelectionBackground) 80%, black), inset 0 -1px 0 color-mix(in srgb, var(--list-activeSelectionBackground) 80%, black); }
  .caret { display: inline-block; width: 16px; height: 16px; flex: none; margin-right: 4px; background: currentColor; opacity: 0.7; -webkit-mask: url(icons/chevron-right.svg) center / 10px 10px no-repeat; mask: url(icons/chevron-right.svg) center / 10px 10px no-repeat; }
  .caret.expanded { -webkit-mask-image: url(icons/chevron-down.svg); mask-image: url(icons/chevron-down.svg); }
  @font-face { font-family: "seti"; src: url(icons/seti.woff) format("woff"); }
  .row > span:last-child { flex: 1; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .file-icon { width: 16px; height: 16px; flex: none; margin-right: 4px; font-family: "seti"; font-size: 16px; line-height: 16px; text-align: center; }
  .guide { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--tree-indentGuidesStroke, var(--editorGroup-border)); pointer-events: none; }
  .guide.dim { opacity: 0; }
  body.hovering .guide.dim { opacity: 0.5; }
  .guide.on-selected { opacity: 1; }
  .row.root-row > span:last-child { font-weight: bold; }
</style>
<div class="topbar">
  <button class="topbarBtn filesBtn active" id="filesBtn"><span class="icon"></span></button>
  <button class="topbarBtn searchBtn" id="searchBtn"><span class="icon"></span></button>
  <button class="topbarBtn deployBtn" id="deployBtn"><span class="icon"></span></button>
  <button class="topbarBtn extensionsBtn" id="extensionsBtn"><span class="icon"></span></button>
</div>
<div id="treeView"><ul id="files" class="root"></ul></div>
<div id="searchView">Search</div>
<div id="deployView">Deployments</div>
<div id="extensionsView">Extensions</div>
<script>
  let fileNames = [];
  let commandNames = [];
  let systemNames = [];
  let selectedPath = null;
  let selectedType = null;
  let rootName = '';
  const ROOT_KEY = '\u0000root';
  const COMMANDS_ROOT_KEY = '\u0000commands';
  const SYSTEM_ROOT_KEY = '\u0000system';
  const expanded = new Set([ROOT_KEY]);
  const ROW_PAD_LEFT = 12;
  const GUIDE_ICON_MARGIN = 5;
  const rowIconLeft = depth => ROW_PAD_LEFT + depth * GUIDE_ICON_MARGIN;
  let setiTheme = null;
  let themeVariant = 'dark';
  const EXT_LANG = {
    js: 'javascript', mjs: 'javascript', cjs: 'javascript', jsx: 'javascript',
    ts: 'typescript', tsx: 'typescriptreact', html: 'html', htm: 'html',
    md: 'markdown', txt: 'plaintext', css: 'css', json: 'json'
  };
  fetch('icons/vs-seti-icon-theme.json').then(r => r.json()).then(t => { setiTheme = t; render(); });
  const fileIconFor = name => {
    if (!setiTheme) return { char: '', color: 'inherit' };
    const light = themeVariant === 'light';
    const variant = light ? (setiTheme.light || {}) : {};
    const lower = name.toLowerCase();
    const dot = lower.lastIndexOf('.');
    const ext = dot >= 0 ? lower.slice(dot + 1) : '';
    const lang = EXT_LANG[ext];
    const key = (variant.fileNames && variant.fileNames[lower]) || setiTheme.fileNames[lower]
      || (variant.fileExtensions && variant.fileExtensions[ext]) || setiTheme.fileExtensions[ext]
      || (lang && variant.languageIds && variant.languageIds[lang]) || (lang && setiTheme.languageIds[lang])
      || variant.file || setiTheme.file;
    const def = setiTheme.iconDefinitions[key] || setiTheme.iconDefinitions[setiTheme.file];
    return { char: String.fromCodePoint(parseInt(def.fontCharacter.replace(/\\/g, ''), 16)), color: def.fontColor };
  };

  const buildTree = paths => {
    const node = { dirs: new Map(), files: [] };
    for (const p of paths) {
      const parts = p.split('/');
      let cur = node;
      for (let i = 0; i < parts.length - 1; i++) {
        const part = parts[i];
        if (!cur.dirs.has(part)) cur.dirs.set(part, { dirs: new Map(), files: [] });
        cur = cur.dirs.get(part);
      }
      cur.files.push(parts[parts.length - 1]);
    }
    return node;
  };

  const isImmediateParent = dirPath => {
    if (selectedPath == null) return false;
    const idx = selectedPath.lastIndexOf('/');
    if (idx < 0) return false;
    return selectedPath.slice(0, idx) === dirPath;
  };

  const expandAncestors = path => {
    if (!path) return;
    if (path.startsWith('COMMANDS/')) {
      expanded.add(COMMANDS_ROOT_KEY);
      const parts = path.slice('COMMANDS/'.length).split('/');
      for (let i = 1; i < parts.length; i++) {
        expanded.add('COMMANDS/' + parts.slice(0, i).join('/'));
      }
      return;
    }
    if (path.startsWith('SYSTEM/')) {
      expanded.add(SYSTEM_ROOT_KEY);
      const parts = path.slice('SYSTEM/'.length).split('/');
      for (let i = 1; i < parts.length; i++) {
        expanded.add('SYSTEM/' + parts.slice(0, i).join('/'));
      }
      return;
    }
    const parts = path.split('/');
    for (let i = 1; i < parts.length; i++) {
      expanded.add(parts.slice(0, i).join('/'));
    }
  };

  const renderNode = (node, parentPath, depth) => {
    const ul = document.createElement('ul');
    ul.className = depth === 0 ? 'root' : 'children';
    if (depth > 0) {
      const guide = document.createElement('div');
      guide.className = 'guide ' + (isImmediateParent(parentPath) ? 'on-selected' : 'dim');
      guide.style.left = rowIconLeft(depth - 1) + 'px';
      ul.appendChild(guide);
    }
    const dirNames = [...node.dirs.keys()].sort();
    for (const name of dirNames) {
      const childPath = parentPath ? parentPath + '/' + name : name;
      const li = document.createElement('li');
      const row = document.createElement('div');
      row.className = 'row dir';
      row.style.paddingLeft = rowIconLeft(depth) + 'px';
      const caret = document.createElement('span');
      caret.className = 'caret';
      if (expanded.has(childPath)) caret.classList.add('expanded');
      row.appendChild(caret);
      const label = document.createElement('span');
      label.textContent = name;
      row.appendChild(label);
      if (selectedType === 'dir' && selectedPath === childPath) row.classList.add('selected');
      row.onclick = () => {
        selectedPath = childPath;
        selectedType = 'dir';
        if (expanded.has(childPath)) expanded.delete(childPath);
        else expanded.add(childPath);
        render();
      };
      li.appendChild(row);
      if (expanded.has(childPath)) {
        li.appendChild(renderNode(node.dirs.get(name), childPath, depth + 1));
      }
      ul.appendChild(li);
    }
    const files = [...node.files].sort();
    for (const name of files) {
      const childPath = parentPath ? parentPath + '/' + name : name;
      const li = document.createElement('li');
      const row = document.createElement('div');
      row.className = 'row file';
      row.style.paddingLeft = rowIconLeft(depth) + 'px';
      const icon = document.createElement('span');
      icon.className = 'file-icon';
      const glyph = fileIconFor(name);
      icon.textContent = glyph.char;
      icon.style.color = glyph.color;
      row.appendChild(icon);
      const label = document.createElement('span');
      label.textContent = name;
      row.appendChild(label);
      if (selectedType === 'file' && selectedPath === childPath) row.classList.add('selected');
      row.onclick = () => {
        selectedPath = childPath;
        selectedType = 'file';
        parent.postMessage({ type: 'vfs:open', name: childPath }, '*');
        render();
      };
      li.appendChild(row);
      ul.appendChild(li);
    }
    return ul;
  };

  const renderRoot = (newRoot, rootKey, rootLabel, tree, basePath) => {
    const li = document.createElement('li');
    const row = document.createElement('div');
    row.className = 'row dir root-row';
    row.style.paddingLeft = rowIconLeft(0) + 'px';
    const caret = document.createElement('span');
    caret.className = 'caret';
    if (expanded.has(rootKey)) caret.classList.add('expanded');
    row.appendChild(caret);
    const label = document.createElement('span');
    label.textContent = (rootLabel || '').toUpperCase();
    row.appendChild(label);
    if (selectedType === 'dir' && selectedPath === rootKey) row.classList.add('selected');
    row.onclick = () => {
      selectedPath = rootKey;
      selectedType = 'dir';
      if (expanded.has(rootKey)) expanded.delete(rootKey);
      else expanded.add(rootKey);
      render();
    };
    li.appendChild(row);
    if (expanded.has(rootKey)) li.appendChild(renderNode(tree, basePath, 1));
    newRoot.appendChild(li);
  };

  const render = ({ revealSelected = false } = {}) => {
    const newRoot = document.createElement('ul');
    newRoot.className = 'root';
    newRoot.id = 'files';
    renderRoot(newRoot, ROOT_KEY, rootName, buildTree(fileNames), '');
    const commandLeaves = commandNames.map(p => p.slice('COMMANDS/'.length));
    renderRoot(newRoot, COMMANDS_ROOT_KEY, 'COMMANDS', buildTree(commandLeaves), 'COMMANDS');
    const systemLeaves = systemNames.map(p => p.slice('SYSTEM/'.length));
    renderRoot(newRoot, SYSTEM_ROOT_KEY, 'SYSTEM', buildTree(systemLeaves), 'SYSTEM');
    document.getElementById('files').replaceWith(newRoot);
    if (revealSelected) {
      requestAnimationFrame(() => {
        document.querySelector('.row.file.selected')?.scrollIntoView({ block: 'nearest' });
      });
    }
  };

  addEventListener('message', e => {
    if (e.data?.type === 'vfs:files') {
      fileNames = e.data.files;
      render();
    } else if (e.data?.type === 'commands:files') {
      commandNames = Object.keys(e.data.files || {}).sort();
      render();
    } else if (e.data?.type === 'system:files') {
      systemNames = Object.keys(e.data.files || {}).sort();
      render();
    } else if (e.data?.type === 'vfs:reset') {
      fileNames = [];
      selectedPath = null;
      selectedType = null;
      expanded.clear();
      expanded.add(ROOT_KEY);
      render();
    } else if (e.data?.type === 'vfs:selected') {
      selectedPath = e.data.name;
      selectedType = selectedPath ? 'file' : null;
      expandAncestors(selectedPath);
      render({ revealSelected: true });
    } else if (e.data?.type === 'settings:directory') {
      const value = e.data.value || '';
      const parts = value.replace(/[\/\\]+$/, '').split(/[\/\\]/);
      rootName = parts[parts.length - 1] || value;
      render();
    } else if (e.data?.type === 'settings:theme') {
      themeVariant = e.data.value === 'light' ? 'light' : 'dark';
      render();
    }
  });
  const clearSelection = () => {
    selectedPath = null;
    selectedType = null;
    render();
  };
  const setFocused = v => document.body.classList.toggle('focused', v);
  addEventListener('focus', () => setFocused(true));
  addEventListener('blur', () => setFocused(false));
  document.addEventListener('mousedown', event => {
    setFocused(true);
    if (!event.target.closest('.row')) clearSelection();
  });
  setFocused(document.hasFocus());

  const treeView = document.getElementById('treeView');
  treeView.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
  treeView.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));

  const views = {
    files: { btn: document.getElementById('filesBtn'), view: treeView, display: 'flex' },
    search: { btn: document.getElementById('searchBtn'), view: document.getElementById('searchView'), display: 'block' },
    deploy: { btn: document.getElementById('deployBtn'), view: document.getElementById('deployView'), display: 'block' },
    extensions: { btn: document.getElementById('extensionsBtn'), view: document.getElementById('extensionsView'), display: 'block' },
  };
  const setView = active => {
    for (const [name, v] of Object.entries(views)) {
      const on = name === active;
      v.btn.classList.toggle('active', on);
      v.view.style.display = on ? v.display : 'none';
    }
  };
  for (const name of Object.keys(views)) views[name].btn.onclick = () => setView(name);

  parent.postMessage({ type: 'vfs:list' }, '*');
</script>
