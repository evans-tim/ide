<!doctype html>
<title>Left</title>
<style>
  html, body { margin: 0; height: 100%; font: 13px -apple-system, sans-serif; background: var(--sideBar-background); color: var(--sideBar-foreground); }
  ul { list-style: none; margin: 0; padding: 4px 0; }
  li { padding: 2px 12px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  li:hover { background: var(--list-hoverBackground); color: var(--list-hoverForeground); }
  li.selected { background: var(--list-inactiveSelectionBackground); color: var(--list-inactiveSelectionForeground); }
  body.focused li.selected { background: var(--list-activeSelectionBackground); color: var(--list-activeSelectionForeground); }
</style>
<ul id="files"></ul>
<script>
  const ul = document.getElementById('files');
  let fileNames = [];
  let selectedName = null;
  const render = () => {
    ul.innerHTML = '';
    for (const name of fileNames) {
      const li = document.createElement('li');
      li.dataset.name = name;
      if (selectedName === name) li.classList.add('selected');
      li.textContent = name;
      li.onclick = () => {
        selectedName = name;
        parent.postMessage({ type: 'vfs:open', name }, '*');
        render();
      };
      ul.appendChild(li);
    }
  };
  addEventListener('message', e => {
    if (e.data?.type === 'vfs:files') {
      fileNames = e.data.files;
      render();
    }
  });
  const setFocused = v => document.body.classList.toggle('focused', v);
  addEventListener('focus', () => setFocused(true));
  addEventListener('blur', () => setFocused(false));
  document.addEventListener('mousedown', () => setFocused(true));
  setFocused(document.hasFocus());
  parent.postMessage({ type: 'vfs:list' }, '*');
</script>
