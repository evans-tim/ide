<!doctype html>
<title>IDE</title>
<style>
  :root {
    --ide-font-ui: -apple-system, BlinkMacSystemFont, "Segoe WPC", "Segoe UI", sans-serif;
    --ide-font-editor: Menlo, Monaco, "Courier New", monospace;
    --ide-font-size: 13px;
    --ide-line-height: 18px;
  }
  html, body { margin: 0; }
  body {
    position: fixed; inset: 0;
    display: grid;
    grid-template-columns:
      minmax(0, var(--lw, 15%)) var(--gl, 2px)
      minmax(0, 1fr) var(--gr, 2px)
      minmax(0, var(--rw, 20%));
    grid-template-rows:
      32px
      minmax(0, 1fr) var(--gb, 2px)
      minmax(0, var(--bh, 20%))
      20px;
    font: var(--ide-font-size) var(--ide-font-ui);
    color: var(--foreground);
  }
  #topBar    { grid-row: 1; grid-column: 1 / 6; background: var(--titleBar-activeBackground, var(--sideBar-background)); border-bottom: 1px solid var(--editorGroup-border); display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; box-sizing: border-box; }
  #bottomBar { grid-row: 5; grid-column: 1 / 6; background: var(--statusBar-background, var(--sideBar-background)); border-top: 1px solid var(--editorGroup-border); display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; box-sizing: border-box; }
  .topbarControl { width: 20px; height: 20px; border: 0; border-radius: 5px; padding: 0; display: flex; align-items: center; justify-content: center; background: transparent; color: inherit; cursor: pointer; }
  .topbarControl:hover { background: var(--list-inactiveSelectionBackground); }
  .iconMask { display: block; flex: none; background: currentColor; -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; -webkit-mask-position: center; mask-position: center; -webkit-mask-size: contain; mask-size: contain; }
  .settingsGearIcon { width: 16px; height: 16px; -webkit-mask-image: url("icons/settings-gear.svg"); mask-image: url("icons/settings-gear.svg"); }
  #leftWrap, #rightWrap, #bottomWrap, #canvasWrap { min-width: 0; min-height: 0; overflow: hidden; position: relative; }
  #leftWrap   { grid-row: 2 / 5; grid-column: 1; }
  #rightWrap  { grid-row: 2 / 5; grid-column: 5; }
  #canvasWrap { grid-row: 2; grid-column: 3; }
  #bottomWrap { grid-row: 4; grid-column: 3; }
  iframe.pane { position: absolute; inset: 0; width: 100%; height: 100%; display: block; border: 0; }

  .gutter { background: color-mix(in srgb, var(--editor-background) 88%, var(--editor-foreground)); position: relative; z-index: 1; }
  .gutter::before { content: ""; position: absolute; background: var(--editorWidget-resizeBorder, var(--activityBarBadge-background)); opacity: 0; transition: opacity 0.15s ease-out; }
  .gutter:hover::before, .gutter.dragging::before { opacity: 1; transition: opacity 0.10s ease-in 0.2s; }
  #gL, #gR { grid-row: 2 / 5; cursor: col-resize; }
  #gL { grid-column: 2; } #gR { grid-column: 4; }
  #gL::before, #gR::before { top: 0; bottom: 0; left: -1px; right: -1px; }
  #gB { grid-row: 3; grid-column: 3; cursor: row-resize; }
  #gB::before { left: 0; right: 0; top: -1px; bottom: -1px; }
  body.dragging iframe.pane { pointer-events: none; }
</style>
<div id="topBar"><button id="settingsButton" class="topbarControl" type="button" aria-label="Settings"><span class="iconMask settingsGearIcon" aria-hidden="true"></span></button></div>
<div id="leftWrap"><iframe class="pane" src="left.html"></iframe></div>
<div id="gL" class="gutter"></div>
<div id="canvasWrap"><iframe class="pane" src="canvas.html"></iframe></div>
<div id="gB" class="gutter"></div>
<div id="bottomWrap"><iframe class="pane" src="bottom.html"></iframe></div>
<div id="gR" class="gutter"></div>
<div id="rightWrap"><iframe class="pane" src="right.html"></iframe></div>
<div id="bottomBar"></div>
<script>
  const root = document.documentElement;
  const savedSize = { lw: null, rw: null, bh: null };
  const canvasFrame = document.querySelector('#canvasWrap iframe');
  const rightFrame = document.querySelector('#rightWrap iframe');
  const settingsButton = document.getElementById('settingsButton');
  let mountedDirectory = '';
  let browserVfs = null;

  const themeFiles = {
    light: 'cursor-light-theme.json',
    dark: 'cursor-dark-midnight-theme.json'
  };
  let activeTheme = 'light';
  let themeCss = '';
  let themeRequest = 0;
  const injectTheme = doc => {
    if (!themeCss || !doc || !doc.head) return;
    let s = doc.getElementById('__theme');
    if (!s) { s = doc.createElement('style'); s.id = '__theme'; doc.head.appendChild(s); }
    s.textContent = themeCss;
    for (const f of doc.querySelectorAll('iframe')) {
      f.contentWindow?.postMessage({ type: 'settings:theme', value: activeTheme }, '*');
      try {
        injectTheme(f.contentDocument);
      } catch {
      }
      f.addEventListener('load', () => injectTheme(f.contentDocument), { once: true });
    }
  };
  const sendTheme = target => target.postMessage({ type: 'settings:theme', value: activeTheme }, '*');
  const broadcastTheme = () => {
    for (const f of panes()) sendTheme(f.contentWindow);
  };
  const applyTheme = name => {
    if (!themeFiles[name]) return;
    activeTheme = name;
    const request = ++themeRequest;
    fetch(themeFiles[name]).then(r => r.json()).then(theme => {
      if (request !== themeRequest) return;
      const decls = Object.entries(theme.colors).map(([k, v]) => `--${k.replace(/\./g, '-')}:${v};`).join('');
      const fonts = getComputedStyle(root);
      const fontDecls = [
        `--ide-font-ui:${fonts.getPropertyValue('--ide-font-ui').trim()}`,
        `--ide-font-editor:${fonts.getPropertyValue('--ide-font-editor').trim()}`,
        `--ide-font-size:${fonts.getPropertyValue('--ide-font-size').trim()}`,
        `--ide-line-height:${fonts.getPropertyValue('--ide-line-height').trim()}`
      ].join(';');
      themeCss = `:root{${fontDecls};${decls}}`;
      for (const [k, v] of Object.entries(theme.colors)) {
        root.style.setProperty('--' + k.replace(/\./g, '-'), v);
      }
      for (const f of panes()) injectTheme(f.contentDocument);
      broadcastTheme();
    });
  };
  applyTheme(activeTheme);
  const panes = () => [...document.querySelectorAll('iframe.pane')];
  const sendDirectory = target => {
    if (mountedDirectory) target.postMessage({ type: 'settings:directory', value: mountedDirectory }, '*');
  };
  const loadFiles = async () => {
    if (browserVfs) return Object.keys(browserVfs).sort();
    const res = await fetch('/api/files');
    const data = await res.json();
    return data.files || [];
  };
  const sendFiles = async target => {
    target.postMessage({ type: 'vfs:files', files: await loadFiles() }, '*');
  };
  const resetMountedWorkspace = async () => {
    broadcast({ type: 'vfs:reset' });
    broadcast({ type: 'right:reset' });
    broadcast({ type: 'settings:directory', value: mountedDirectory });
    closePanel('rw', 'gr');
    broadcast({ type: 'vfs:files', files: await loadFiles() });
  };
  const mountDirectory = async message => {
    if (message.files) {
      mountedDirectory = message.value;
      browserVfs = message.files;
      await resetMountedWorkspace();
      return;
    }
    const value = message.value;
    const res = await fetch('/api/mount', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: value })
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || 'Unable to mount directory');
      return;
    }
    mountedDirectory = data.directory;
    browserVfs = null;
    await resetMountedWorkspace();
  };
  fetch('/api/workspace').then(r => r.json()).then(data => {
    mountedDirectory = data.directory;
    broadcast({ type: 'settings:directory', value: mountedDirectory });
  });
  for (const f of panes()) {
    f.addEventListener('load', () => {
      injectTheme(f.contentDocument);
      sendTheme(f.contentWindow);
      sendDirectory(f.contentWindow);
      f.contentDocument.addEventListener('keydown', handleKeydown);
    });
  }

  const broadcast = (msg, from) => {
    for (const f of panes()) {
      if (f.contentWindow !== from) f.contentWindow.postMessage(msg, '*');
    }
  };
  const openFile = async (name, from) => {
    if (browserVfs) {
      broadcast({ type: 'vfs:opened', name, content: browserVfs[name] ?? '' }, from);
      return;
    }
    const res = await fetch('/api/file?path=' + encodeURIComponent(name));
    const data = await res.json();
    broadcast({ type: 'vfs:opened', name, content: data.content ?? '' }, from);
  };
  addEventListener('message', e => {
    const m = e.data;
    if (!m || typeof m !== 'object') return;
    if (m.type === 'vfs:list') {
      sendFiles(e.source);
    } else if (m.type === 'vfs:open') {
      openFile(m.name, e.source);
    } else if (m.type === 'vfs:select') {
      broadcast({ type: 'vfs:selected', name: m.name }, e.source);
    } else if (m.type === 'settings:theme') {
      applyTheme(m.value);
    } else if (m.type === 'settings:directory') {
      mountDirectory(m);
    } else if (m.type === 'settings:ready') {
      sendTheme(e.source);
      sendDirectory(e.source);
    } else if (m.type === 'right:close') {
      closePanel('rw', 'gr');
    }
  });
  settingsButton.addEventListener('click', () => {
    canvasFrame.contentWindow.postMessage({ type: 'settings:open' }, '*');
  });

  const GUTTER = 2, MIN = 32;
  const isClosed = name => root.style.getPropertyValue(`--${name}`) === '0px';
  const openPanel = (name, gutter) => {
    root.style.setProperty(`--${name}`, savedSize[name] || (name === 'lw' ? '15%' : '20%'));
    root.style.setProperty(`--${gutter}`, px(GUTTER));
  };
  const closePanel = (name, gutter) => {
    if (isClosed(name)) return;
    savedSize[name] = root.style.getPropertyValue(`--${name}`) || getComputedStyle(root).getPropertyValue(`--${name}`).trim() || '20%';
    root.style.setProperty(`--${name}`, '0px');
    root.style.setProperty(`--${gutter}`, '0px');
  };
  const togglePanel = (name, gutter) => {
    if (isClosed(name)) {
      openPanel(name, gutter);
    } else {
      closePanel(name, gutter);
    }
  };
  function handleKeydown(e) {
    if (e.repeat) return;
    const key = e.key.toLowerCase();
    if (e.metaKey && !e.ctrlKey && !e.altKey && key === 'i') {
      e.preventDefault();
      if (isClosed('rw')) {
        openPanel('rw', 'gr');
        rightFrame.contentWindow.postMessage({ type: 'right:open' }, '*');
      } else {
        closePanel('rw', 'gr');
      }
    } else if (e.metaKey && !e.ctrlKey && !e.altKey && key === 'b') {
      e.preventDefault();
      togglePanel('lw', 'gl');
    } else if (e.ctrlKey && !e.metaKey && !e.altKey && (e.key === '`' || e.code === 'Backquote')) {
      e.preventDefault();
      togglePanel('bh', 'gb');
    }
  }
  document.addEventListener('keydown', handleKeydown);
  const drag = (el, onMove) => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      const r = el.getBoundingClientRect();
      const offX = e.clientX - (r.left + r.width / 2);
      const offY = e.clientY - (r.top + r.height / 2);
      const move = ev => onMove(ev, offX, offY);
      const up = () => {
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', up);
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        document.body.classList.remove('dragging');
        el.classList.remove('dragging');
      };
      document.body.style.userSelect = 'none';
      document.body.style.cursor = getComputedStyle(el).cursor;
      document.body.classList.add('dragging');
      el.classList.add('dragging');
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
    });
  };
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const px = n => n + 'px';
  const curRW = () => parseFloat(getComputedStyle(root).getPropertyValue('--rw')) || innerWidth * 0.2;
  const curLW = () => parseFloat(getComputedStyle(root).getPropertyValue('--lw')) || innerWidth * 0.2;
  drag(gL, (e, offX) => {
    const max = innerWidth - curRW() - 2 * GUTTER - MIN;
    root.style.setProperty('--lw', px(clamp(e.clientX - offX, MIN, max)));
  });
  drag(gR, (e, offX) => {
    const max = innerWidth - curLW() - 2 * GUTTER - MIN;
    root.style.setProperty('--rw', px(clamp(innerWidth - (e.clientX - offX), MIN, max)));
  });
  drag(gB, (e, offX, offY) => {
    const avail = innerHeight - 32 - 20;
    const max = avail - GUTTER - MIN;
    root.style.setProperty('--bh', px(clamp(innerHeight - 20 - (e.clientY - offY), MIN, max)));
  });
</script>
