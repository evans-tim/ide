<!doctype html>
<title>Settings</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    box-sizing: border-box;
    font: var(--ide-font-size, 13px) var(--ide-font-ui, -apple-system, BlinkMacSystemFont, "Segoe WPC", "Segoe UI", sans-serif);
    background: var(--editor-background, #fff);
    color: var(--editor-foreground, #000);
  }

  body {
    padding: 8px;
  }

  .general-purpose-button {
    margin: 1px;
    padding: 2px 4px;
    border: 1px solid var(--button-border-color, var(--dropdown-border, #d0d0d0));
    border-radius: 3px;
    background: transparent;
    color: inherit;
    font: inherit;
  }

  .general-purpose-button:hover {
    border-color: var(--button-hover-border-color, #b8b8b8);
    cursor: pointer;
  }

  .general-purpose-button:focus {
    margin: 0;
    border: 2px solid var(--button-focus-border-color, #b8b8b8);
    outline: none;
  }

  .dropdown {
    position: relative;
    display: inline-block;
  }

  .dropdown-trigger {
    --button-border-color: var(--dropdown-border, #d0d0d0);
    --button-hover-border-color: color-mix(in srgb, var(--dropdown-border, #d0d0d0) 80%, var(--dropdown-foreground, currentColor));
    --button-focus-border-color: color-mix(in srgb, var(--dropdown-border, #d0d0d0) 75%, var(--dropdown-foreground, currentColor));
    width: 150px;
    box-sizing: border-box;
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
    text-align: left;
  }

  .dropdown-trigger:focus {
    margin: 1px;
    border: 1px solid var(--button-focus-border-color);
    box-shadow: 0 0 0 1px var(--button-focus-border-color);
  }

  .dropdown-label {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .dropdown-icon {
    width: 16px;
    height: 16px;
    flex: 0 0 auto;
    background: currentColor;
    mask: url("icons/chevron-up-down.svg") center / contain no-repeat;
  }

  .dropdown-popup {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    z-index: 1;
    width: 200px;
    box-sizing: border-box;
    border: 1px solid var(--dropdown-border, #d0d0d0);
    border-radius: 4px;
    background: var(--dropdown-background, #fff);
  }

  .dropdown-popup[hidden] {
    display: none;
  }

  .dropdown-option {
    padding: 2px 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--list-deemphasizedForeground, #555);
  }

  .dropdown-option:hover {
    color: var(--list-hoverForeground, #000);
    cursor: pointer;
  }

  .setting-row {
    margin-bottom: 8px;
    padding: 14px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    background: var(--sideBar-background, #f4f4f4);
  }

  .setting-title {
    color: var(--editor-foreground, #000);
  }

  .setting-subtitle {
    margin-top: 3px;
    color: var(--descriptionForeground, #555);
    font-size: 12px;
  }

  .directory-button {
    width: 300px;
    box-sizing: border-box;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    direction: rtl;
    text-align: left;
  }
</style>
<div class="setting-row">
  <div>
    <div class="setting-title">Theme</div>
    <div class="setting-subtitle">Select application color scheme</div>
  </div>
  <div class="dropdown" id="theme">
    <button class="general-purpose-button dropdown-trigger" id="theme-trigger" type="button">
      <span class="dropdown-label" id="theme-label">light</span>
      <span class="dropdown-icon" aria-hidden="true"></span>
    </button>
    <div class="dropdown-popup" id="theme-popup" hidden>
      <div class="dropdown-option" data-value="light">light</div>
      <div class="dropdown-option" data-value="dark">dark</div>
    </div>
  </div>
</div>
<div class="setting-row">
  <div>
    <div class="setting-title">Directory</div>
    <div class="setting-subtitle">Select the directory for the current workspace</div>
  </div>
  <button class="general-purpose-button directory-button" id="directory-button" type="button"></button>
</div>
<script>
  const theme = document.getElementById('theme');
  const trigger = document.getElementById('theme-trigger');
  const label = document.getElementById('theme-label');
  const popup = document.getElementById('theme-popup');
  const directoryButton = document.getElementById('directory-button');
  let currentDirectory = '';

  const setTheme = value => {
    if (value !== 'light' && value !== 'dark') return;
    label.textContent = value;
  };

  const setDirectory = value => {
    currentDirectory = value || '';
    directoryButton.textContent = currentDirectory || 'Choose directory';
    directoryButton.title = currentDirectory;
  };

  const closeDropdown = () => {
    popup.hidden = true;
    trigger.blur();
  };

  trigger.addEventListener('click', () => {
    popup.hidden = false;
  });

  popup.addEventListener('click', event => {
    const option = event.target.closest('.dropdown-option');
    if (!option) return;
    setTheme(option.dataset.value);
    parent.postMessage({ type: 'settings:theme', value: option.dataset.value }, '*');
    popup.hidden = true;
  });

  document.addEventListener('click', event => {
    if (theme.contains(event.target)) return;
    closeDropdown();
  });

  directoryButton.addEventListener('click', async () => {
    if (!window.showDirectoryPicker) {
      alert('Directory picker is not supported in this browser.');
      return;
    }
    const handle = await showDirectoryPicker();
    parent.postMessage({ type: 'settings:directory', value: handle.name }, '*');
  });

  addEventListener('message', event => {
    if (event.data?.type === 'settings:theme') setTheme(event.data.value);
    else if (event.data?.type === 'settings:directory') setDirectory(event.data.value);
  });
  parent.postMessage({ type: 'settings:ready' }, '*');
</script>
