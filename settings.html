<!doctype html>
<title>Settings</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    font: var(--ide-font-size, 13px) var(--ide-font-ui, -apple-system, BlinkMacSystemFont, "Segoe WPC", "Segoe UI", sans-serif);
    background: var(--editor-background, #fff);
    color: var(--editor-foreground, #000);
  }
</style>
<select id="theme">
  <option>light</option>
  <option>dark</option>
</select>
<script>
  const theme = document.getElementById('theme');
  const sendTheme = () => parent.postMessage({ type: 'settings:theme', value: theme.value }, '*');
  theme.addEventListener('change', sendTheme);
  addEventListener('message', event => {
    if (event.data?.type !== 'settings:theme') return;
    if (event.data.value === 'light' || event.data.value === 'dark') theme.value = event.data.value;
  });
  parent.postMessage({ type: 'settings:ready' }, '*');
</script>
