<!doctype html>
<title>Right</title>
<style>
  html, body { margin: 0; height: 100%; font: var(--ide-font-size, 13px) var(--ide-font-ui, -apple-system, BlinkMacSystemFont, "Segoe WPC", "Segoe UI", sans-serif); background: var(--editor-background); color: var(--foreground, var(--editor-foreground)); }
  body { display: flex; flex-direction: column; }
  .topbar {
    box-sizing: border-box;
    height: 32px;
    flex: none;
    display: flex;
    align-items: center;
    background:
      linear-gradient(var(--editorGroup-border), var(--editorGroup-border)) bottom/100% 1px no-repeat,
      var(--titleBar-activeBackground, var(--sideBar-background));
  }
  .tabArea {
    flex: 1;
    position: relative;
    height: 32px;
    min-width: 0;
  }
  .tabs {
    height: 32px;
    display: flex;
    min-width: 0;
    overflow-x: auto;
    overflow-y: hidden;
    overscroll-behavior: none;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tabScrollbar {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 4px;
    opacity: 0;
    pointer-events: none;
    visibility: hidden;
    transition: opacity 0.2s, visibility 0s linear 0.2s;
  }
  .tabArea.hasOverflow:hover .tabScrollbar {
    opacity: 1;
    visibility: visible;
    transition: opacity 0.2s;
  }
  .tabScrollbarThumb {
    position: absolute;
    bottom: 0;
    height: 3px;
    border-radius: 0;
    background: var(--scrollbarSlider-background, #c1c1c1);
    pointer-events: auto;
  }
  .tabScrollbarThumb:hover {
    background: var(--scrollbarSlider-hoverBackground, #a8a8a8);
  }
  .tabScrollbarThumb::before {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
  }
  .tab {
    box-sizing: border-box;
    flex: none;
    max-width: 200px;
    min-width: 0;
    height: 32px;
    padding: 0 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    border-right: 1px solid var(--editorGroup-border);
    border-bottom: 1px solid var(--editorGroup-border);
    background: var(--titleBar-activeBackground, var(--sideBar-background));
    cursor: pointer;
  }
  .tabTitle { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tab:not(.active) { color: var(--tab-inactiveForeground); }
  .tab:not(.active):hover { background: var(--list-inactiveSelectionBackground); }
  .tab .topbarControl { flex: none; }
  .tab:not(.active):not(:hover) .closeControl { visibility: hidden; }
  .tab.active {
    background: var(--editor-background);
    border-bottom-color: var(--editor-background);
  }
  .buttonGroup {
    box-sizing: border-box;
    flex: none;
    height: 32px;
    padding-right: 12px;
    display: flex;
    align-items: center;
    border-left: 1px solid var(--editorGroup-border);
  }
  .iconMask {
    display: block;
    flex: none;
    background: currentColor;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-position: center;
    -webkit-mask-size: contain;
    mask-size: contain;
  }
  .chatIcon {
    width: 16px;
    height: 16px;
    -webkit-mask-image: url("icons/chat.svg");
    mask-image: url("icons/chat.svg");
  }
  .spinnerIcon {
    width: 16px;
    height: 16px;
    -webkit-mask-image: url("icons/spinner.svg");
    mask-image: url("icons/spinner.svg");
  }
  .closeIcon {
    width: 12px;
    height: 12px;
    -webkit-mask-image: url("icons/close.svg");
    mask-image: url("icons/close.svg");
  }
  .topbarControl {
    width: 20px;
    height: 20px;
    border: 0;
    border-radius: 5px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    color: inherit;
    cursor: pointer;
  }
  .topbarControl:hover { background: var(--list-inactiveSelectionBackground); }
  .topbarControl img { width: 12px; height: 12px; display: block; }
  .content { box-sizing: border-box; min-height: 0; flex: 1; padding: 12px 0 12px 12px; display: flex; flex-direction: column; gap: 12px; }
  .messages {
    display: none;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-gutter: stable;
  }
  .messages::-webkit-scrollbar { width: 12px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--scrollbarSlider-background, rgba(121, 121, 121, 0.4)); background-clip: padding-box; border: 2px solid transparent; border-radius: 6px; }
  .messages::-webkit-scrollbar-thumb:hover { background: var(--scrollbarSlider-hoverBackground, rgba(100, 100, 100, 0.7)); background-clip: padding-box; }
  body:not(.submitted) .messages { display: none; }
  body.submitted .messages { display: flex; }
  .turn {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .message {
    box-sizing: border-box;
    position: relative;
    min-height: 18px;
    max-height: 120px;
    padding: 8px 32px 8px 8px;
    border: 1px solid var(--editorGroup-border);
    border-radius: 8px;
    overflow: hidden;
    white-space: pre-wrap;
  }
  .message:hover {
    border-color: var(--focusBorder);
    cursor: pointer;
  }
  .message.overflowing::after {
    content: "";
    position: absolute;
    left: 1px;
    right: 1px;
    bottom: 1px;
    height: 24px;
    border-radius: 0 0 7px 7px;
    background: linear-gradient(to bottom, transparent, var(--editor-background));
    pointer-events: none;
  }
  .messageStop {
    display: none;
    position: absolute;
    right: 6px;
    top: 6px;
    width: 18px;
    height: 18px;
    padding: 0;
    border: 0;
    border-radius: 50%;
    background: rgba(20, 20, 20, 0.68);
  }
  .message.responding:hover .messageStop {
    display: block;
    cursor: pointer;
  }
  .messageStop:hover {
    background: rgba(20, 20, 20, 0.58);
  }
  .messageStop img { width: 18px; height: 18px; display: block; }
  .response {
    padding: 0 8px;
  }
  .response.planning {
    display: inline-block;
    width: fit-content;
    color: transparent;
    background-image:
      linear-gradient(90deg, transparent 35%, var(--foreground, var(--editor-foreground)) 50%, transparent 65%),
      linear-gradient(var(--tab-inactiveForeground), var(--tab-inactiveForeground));
    background-size: 250% 100%, auto;
    background-position: 100% center, center;
    background-repeat: no-repeat;
    -webkit-background-clip: text;
    background-clip: text;
    animation: planningShimmer 1s linear infinite;
  }
  @keyframes planningShimmer {
    to { background-position: 0% center, center; }
  }
  .prompt {
    box-sizing: border-box;
    position: relative;
    margin-right: 12px;
    height: 120px;
    border: 1px solid var(--editorGroup-border);
    border-radius: 8px;
    background: var(--input-background);
    overflow: hidden;
  }
  body.submitted .content > .prompt {
    margin-top: auto;
  }
  .editPrompt {
    margin-right: 0;
  }
  textarea, .editor {
    box-sizing: border-box;
    width: 100%;
    height: calc(100% - 28px);
    padding: 8px;
    border: 0;
    outline: 0;
    resize: none;
    background: transparent;
    color: var(--input-foreground);
    font: inherit;
    overflow-y: auto;
    scrollbar-gutter: stable;
  }
  .editor { white-space: pre-wrap; overflow-wrap: break-word; word-break: break-word; }
  .editor:empty::before { content: ""; }
  textarea::-webkit-scrollbar, .editor::-webkit-scrollbar { width: 12px; }
  textarea::-webkit-scrollbar-track, .editor::-webkit-scrollbar-track { background: transparent; }
  textarea::-webkit-scrollbar-thumb, .editor::-webkit-scrollbar-thumb { background: var(--scrollbarSlider-background, rgba(121, 121, 121, 0.4)); background-clip: padding-box; border: 2px solid transparent; border-radius: 6px; }
  textarea::-webkit-scrollbar-thumb:hover, .editor::-webkit-scrollbar-thumb:hover { background: var(--scrollbarSlider-hoverBackground, rgba(100, 100, 100, 0.7)); background-clip: padding-box; }
  .mention {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 0 3px;
    border-radius: 4px;
    background: var(--cursor-bg-cyan-secondary, rgb(235, 239, 240));
    color: var(--cursor-text-cyan-primary, rgb(111, 144, 155));
    white-space: nowrap;
    user-select: none;
  }
  .mention .fileIcon { width: 16px; height: 16px; flex: none; font-family: "seti"; font-size: 16px; line-height: 16px; text-align: center; }
  .mention:not(.mention-readonly):hover { cursor: pointer; filter: brightness(1.02)}
  .mention-readonly { cursor: default; }
  .mention-readonly:hover { filter: none; }
  .mention-readonly .mentionClose { pointer-events: none; }
  .mention .mentionClose {
    width: 16px;
    height: 16px;
    flex: none;
    display: none;
    background: var(--cursor-text-cyan-primary, rgb(111, 144, 155));
    -webkit-mask-image: url("icons/close.svg");
    mask-image: url("icons/close.svg");
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-position: center;
    -webkit-mask-size: contain;
    mask-size: contain;
  }
  .mention:not(.mention-readonly):hover .fileIcon { display: none; }
  .mention:not(.mention-readonly):hover .mentionClose { display: block; }
  .mentionTooltip {
    display: none;
    position: fixed;
    padding: 4px;
    white-space: nowrap;
    text-align: left;
    z-index: 100;
    color: var(--foreground, var(--editor-foreground));
    background: var(--editorHoverWidget-background, var(--editor-background));
    border: 1px solid var(--editorHoverWidget-border, var(--editorGroup-border));
    border-radius: 4px;
    box-shadow: 0 0 3px rgba(0, 0, 0, 0.12);
    user-select: none;
    pointer-events: none;
  }
  .promptFooter {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 28px;
    cursor: default;
  }
  .send {
    position: absolute;
    right: 4px;
    bottom: 4px;
    width: 18px;
    height: 18px;
    padding: 0;
    border: 0;
    border-radius: 50%;
    background: rgba(20, 20, 20, 0.68);
    cursor: default;
  }
  .send:hover { cursor: pointer; background: rgba(20, 20, 20, 0.58); }
  .send img { width: 18px; height: 18px; display: block; }
  @font-face { font-family: "seti"; src: url(icons/seti.woff) format("woff"); }
  .mentionMenu {
    position: absolute;
    width: 200px;
    z-index: 10;
    background: var(--editorSuggestWidget-background, var(--editor-background));
    border: 1px solid var(--editorSuggestWidget-border, var(--editorGroup-border));
    box-shadow: -1px 1px 3px rgba(0, 0, 0, 0.12), 1px 1px 3px rgba(0, 0, 0, 0.12);
  }
  .mentionItem {
    box-sizing: border-box;
    margin: 2px;
    padding: 2px 4px;
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
  }
  .mentionItem.highlighted { background: var(--editorSuggestWidget-selectedBackground, var(--list-activeSelectionBackground)); border-radius: 4px; }
  .mentionItem .fileIcon { width: 16px; height: 16px; flex: none; font-family: "seti"; font-size: 16px; line-height: 16px; text-align: center; }
  .mentionItem .mentionName { color: var(--editorSuggestWidget-foreground, var(--foreground, var(--editor-foreground))); flex: 0 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .mentionItem .mentionPath { color: var(--descriptionForeground, var(--tab-inactiveForeground)); font-size: 0.9em; overflow: hidden; text-overflow: ellipsis; flex: 1000000 1 0; min-width: 0; }
</style>
<div class="topbar"><div class="tabArea"><div class="tabs"></div><div class="tabScrollbar"><div class="tabScrollbarThumb"></div></div></div><div class="buttonGroup"><button class="topbarControl addControl" type="button" aria-label="Add"><img src="icons/add.svg" alt=""></button></div></div>
<div class="content">
  <div class="messages"></div>
  <div class="prompt">
    <div class="editor" contenteditable="true"></div>
    <div class="promptFooter">
      <button class="send" type="button" aria-label="Send"><img src="icons/arrow-up.svg" alt=""></button>
    </div>
  </div>
</div>
<div class="mentionMenu" style="display: none;"></div>
<script>
  const tabsEl = document.querySelector('.tabs');
  const tabArea = document.querySelector('.tabArea');
  const tabScrollbarThumb = document.querySelector('.tabScrollbarThumb');
  const messages = document.querySelector('.messages');
  const editor = document.querySelector('.prompt > .editor');
  const sendButton = document.querySelector('.send');
  const sendIcon = sendButton.querySelector('img');
  const mentionMenu = document.querySelector('.mentionMenu');

  let openTabNames = [];
  let workspaceFiles = [];
  let setiTheme = null;
  let themeVariant = 'dark';
  const EXT_LANG = {
    js: 'javascript', mjs: 'javascript', cjs: 'javascript', jsx: 'javascript',
    ts: 'typescript', tsx: 'typescriptreact', html: 'html', htm: 'html',
    md: 'markdown', txt: 'plaintext', css: 'css', json: 'json'
  };
  fetch('icons/vs-seti-icon-theme.json').then(r => r.json()).then(t => { setiTheme = t; });

  function fileIconFor(path) {
    if (!setiTheme) return { char: '', color: 'inherit' };
    const light = themeVariant === 'light';
    const variant = light ? (setiTheme.light || {}) : {};
    const name = path.split('/').pop().toLowerCase();
    const dot = name.lastIndexOf('.');
    const ext = dot >= 0 ? name.slice(dot + 1) : '';
    const lang = EXT_LANG[ext];
    const key = (variant.fileNames && variant.fileNames[name]) || setiTheme.fileNames[name]
      || (variant.fileExtensions && variant.fileExtensions[ext]) || setiTheme.fileExtensions[ext]
      || (lang && variant.languageIds && variant.languageIds[lang]) || (lang && setiTheme.languageIds[lang])
      || variant.file || setiTheme.file;
    const def = setiTheme.iconDefinitions[key] || setiTheme.iconDefinitions[setiTheme.file];
    return { char: String.fromCodePoint(parseInt(def.fontCharacter.replace(/\\/g, ''), 16)), color: def.fontColor };
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function parentPathOf(path) {
    const idx = path.lastIndexOf('/');
    return idx >= 0 ? path.slice(0, idx) : '';
  }

  function createMentionSpan(path, options = {}) {
    const { removable = true, hostEditor = editor, onChange = null } = options;
    const span = document.createElement('span');
    span.className = 'mention';
    span.contentEditable = 'false';
    span.dataset.path = path;

    const icon = document.createElement('span');
    icon.className = 'fileIcon';
    icon.setAttribute('aria-hidden', 'true');
    const glyph = fileIconFor(path);
    icon.textContent = glyph.char;
    icon.style.color = glyph.color;

    const closeEl = document.createElement('span');
    closeEl.className = 'mentionClose';
    closeEl.setAttribute('aria-hidden', 'true');
    if (removable) {
      closeEl.addEventListener('mousedown', event => {
        event.preventDefault();
        event.stopPropagation();
        const next = span.nextSibling;
        span.remove();
        tooltip.remove();
        if (next && next.nodeType === Node.TEXT_NODE && next.textContent === '\u00a0') next.remove();
        if (onChange) onChange();
        if (hostEditor) hostEditor.focus();
      });
    }

    const nameEl = document.createElement('span');
    nameEl.textContent = path.split('/').pop();

    const tooltip = document.createElement('div');
    tooltip.className = 'mentionTooltip';
    tooltip.textContent = path;
    document.body.append(tooltip);
    span._tooltip = tooltip;

    if (removable) {
      span.addEventListener('mouseenter', () => {
        const rect = span.getBoundingClientRect();
        tooltip.style.display = 'block';
        tooltip.style.left = rect.left + 'px';
        tooltip.style.top = (rect.top - tooltip.offsetHeight) + 'px';
      });
      span.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

      span.addEventListener('click', event => {
        if (event.target === closeEl) return;
        parent.postMessage({ type: 'vfs:open', name: path }, '*');
      });
    }

    if (!removable) span.classList.add('mention-readonly');
    span.append(icon, closeEl, nameEl);
    return span;
  }

  function rehydrateMentions(container, options = {}) {
    for (const placeholder of [...container.querySelectorAll('.mention')]) {
      const span = createMentionSpan(placeholder.dataset.path, options);
      placeholder.replaceWith(span);
    }
  }

  function editorText() {
    let text = '';
    for (const node of editor.childNodes) {
      if (node.nodeType === Node.TEXT_NODE) text += node.textContent;
      else if (node.classList && node.classList.contains('mention')) text += '@' + node.dataset.path;
      else if (node.nodeName === 'BR') text += '\n';
      else text += node.textContent;
    }
    return text;
  }

  function clearEditor() {
    editor.replaceChildren();
    activeTab().draft = '';
  }

  function caretCoordinates() {
    const selection = window.getSelection();
    if (!selection.rangeCount) return { x: 0, y: 0 };
    const range = selection.getRangeAt(0).cloneRange();
    range.collapse(true);
    let rect = range.getClientRects()[0];
    if (!rect) {
      const marker = document.createElement('span');
      marker.textContent = '\u200b';
      range.insertNode(marker);
      rect = marker.getBoundingClientRect();
      marker.remove();
    }
    return { x: rect.left, y: rect.bottom };
  }

  function atCoordinates() {
    const match = findMentionQuery();
    if (!match) return null;
    const range = document.createRange();
    range.setStart(match.node, match.at);
    range.setEnd(match.node, match.at + 1);
    const rect = range.getClientRects()[0] || range.getBoundingClientRect();
    if (!rect || (rect.left === 0 && rect.bottom === 0)) return null;
    return { x: rect.left, y: rect.bottom };
  }

  function closeMentionMenu() {
    mentionMenu.style.display = 'none';
    mentionMenu.replaceChildren();
  }

  function openMentionMenu(query) {
    const items = query
      ? workspaceFiles.filter(name => name.split('/').pop().startsWith(query))
      : openTabNames;
    if (items.length === 0) {
      closeMentionMenu();
      return;
    }
    mentionMenu.replaceChildren(...items.map((name, index) => {
      const item = document.createElement('div');
      item.className = index === 0 ? 'mentionItem highlighted' : 'mentionItem';
      item.dataset.path = name;
      item.addEventListener('mouseenter', () => {
        for (const other of mentionMenu.children) other.classList.remove('highlighted');
        item.classList.add('highlighted');
      });
      item.addEventListener('mousedown', event => {
        event.preventDefault();
        selectMention(name);
      });

      const icon = document.createElement('span');
      icon.className = 'fileIcon';
      icon.setAttribute('aria-hidden', 'true');
      const glyph = fileIconFor(name);
      icon.textContent = glyph.char;
      icon.style.color = glyph.color;

      const nameEl = document.createElement('span');
      nameEl.className = 'mentionName';
      nameEl.textContent = name.split('/').pop();

      item.append(icon, nameEl);

      const parent = parentPathOf(name);
      if (parent) {
        const pathEl = document.createElement('span');
        pathEl.className = 'mentionPath';
        pathEl.textContent = parent;
        item.append(pathEl);
      }
      return item;
    }));

    const coords = atCoordinates() || caretCoordinates();
    mentionMenu.style.left = coords.x + 'px';
    mentionMenu.style.top = (coords.y + 4) + 'px';
    mentionMenu.style.display = 'block';
  }

  function findMentionQuery() {
    const selection = window.getSelection();
    if (!selection.rangeCount) return null;
    const range = selection.getRangeAt(0);
    if (!range.collapsed) return null;
    const node = range.startContainer;
    if (node.nodeType !== Node.TEXT_NODE || !editor.contains(node)) return null;
    const text = node.textContent.slice(0, range.startOffset);
    const at = text.lastIndexOf('@');
    if (at === -1) return null;
    const query = text.slice(at + 1);
    if (/\s/.test(query)) return null;
    return { node, at, end: range.startOffset, query };
  }

  function selectMention(path) {
    const match = findMentionQuery();
    closeMentionMenu();
    if (!match) return;

    const range = document.createRange();
    range.setStart(match.node, match.at);
    range.setEnd(match.node, match.end);
    range.deleteContents();

    const span = createMentionSpan(path);
    range.insertNode(span);

    const after = document.createTextNode('\u00a0');
    span.after(after);

    const selection = window.getSelection();
    const caret = document.createRange();
    caret.setStart(after, after.length);
    caret.collapse(true);
    selection.removeAllRanges();
    selection.addRange(caret);

    editor.focus();
    activeTab().draft = editor.innerHTML;
  }

  const tabs = [createTab(1)];
  const DEFAULT_RESPONSE = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.';
  const DEFAULT_RESPONSE_TOKENS = DEFAULT_RESPONSE.split(' ');
  let activeTabId = 1;
  let nextTabId = 2;
  let activeTabHistory = [1];

  function createTab(id) {
    return {
      id,
      title: 'New Agent',
      draft: '',
      editingTurnIndex: null,
      editingDraft: '',
      turns: [],
    };
  }

  function activeTab() {
    return tabs.find(tab => tab.id === activeTabId);
  }

  function saveActiveDraft() {
    const tab = activeTab();
    if (tab) tab.draft = editor.innerHTML;
  }

  function respondingTurn(tab) {
    return tab.turns.find(turn => turn.responding) || null;
  }

  function setComposerState(isStop) {
    sendButton.setAttribute('aria-label', isStop ? 'Stop' : 'Send');
    sendIcon.src = isStop ? 'icons/stop-rounded.svg' : 'icons/arrow-up.svg';
  }

  function setChatTitleFromPrompt(tab, promptText) {
    if (tab.title !== 'New Agent') return;
    tab.title = promptText;
  }

  function clearTurnTimers(turn) {
    clearTimeout(turn.planningTimer);
    clearTimeout(turn.streamTimer);
  }

  function createTurn(text, html) {
    return {
      text,
      html: html != null ? html : escapeHtml(text),
      responseText: 'Planning next moves',
      responseTokens: [],
      responding: true,
      planningTimer: null,
      streamTimer: null,
    };
  }

  function startTurnResponse(tab, turn) {
    renderActiveTab();
    turn.planningTimer = setTimeout(() => streamResponse(tab, turn), 5000);
  }

  function createEditComposer(tab, turn, index) {
    const prompt = document.createElement('div');
    prompt.className = 'prompt editPrompt';

    const editTextarea = document.createElement('textarea');
    editTextarea.value = tab.editingDraft;
    editTextarea.addEventListener('input', () => {
      tab.editingDraft = editTextarea.value;
      resizeEditComposer(editTextarea);
    });
    editTextarea.addEventListener('keydown', event => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        submitEditedTurn(tab, index);
      }
    });

    const footer = document.createElement('div');
    footer.className = 'promptFooter';

    const button = document.createElement('button');
    button.className = 'send';
    button.type = 'button';
    button.setAttribute('aria-label', 'Send');
    button.innerHTML = '<img src="icons/arrow-up.svg" alt="">';
    button.addEventListener('click', () => submitEditedTurn(tab, index));

    footer.append(button);
    prompt.append(editTextarea, footer);
    prompt.addEventListener('focusout', event => {
      if (prompt.contains(event.relatedTarget)) return;
      if (tab.editingTurnIndex !== index) return;
      cancelEditTurn(tab);
    });
    requestAnimationFrame(() => resizeEditComposer(editTextarea));
    return prompt;
  }

  function resizeEditComposer(editTextarea) {
    const maxTextAreaHeight = 92;
    editTextarea.style.height = 'auto';
    const textAreaHeight = Math.min(editTextarea.scrollHeight, maxTextAreaHeight);
    editTextarea.style.height = textAreaHeight + 'px';
    editTextarea.style.overflowY = editTextarea.scrollHeight > maxTextAreaHeight ? 'auto' : 'hidden';
    editTextarea.parentElement.style.height = textAreaHeight + 28 + 'px';
  }

  function editTurn(tab, index) {
    tab.editingTurnIndex = index;
    tab.editingDraft = tab.turns[index].text;
    renderActiveTab();
    const editTextarea = messages.querySelector('.editPrompt textarea');
    if (editTextarea) {
      editTextarea.focus();
      editTextarea.setSelectionRange(editTextarea.value.length, editTextarea.value.length);
    }
  }

  function cancelEditTurn(tab) {
    tab.editingTurnIndex = null;
    tab.editingDraft = '';
    renderActiveTab();
  }

  function renderTabs() {
    tabsEl.replaceChildren(...tabs.map(tab => {
      const tabEl = document.createElement('div');
      tabEl.className = tab.id === activeTabId ? 'tab active' : 'tab';
      const iconClass = respondingTurn(tab) ? 'spinnerIcon' : 'chatIcon';
      tabEl.innerHTML = `<span class="iconMask ${iconClass}" aria-hidden="true"></span><span class="tabTitle"></span><button class="topbarControl closeControl" type="button" aria-label="Close"><span class="iconMask closeIcon" aria-hidden="true"></span></button>`;
      tabEl.querySelector('.tabTitle').textContent = tab.title;
      tabEl.addEventListener('click', () => switchTab(tab.id));
      tabEl.querySelector('.closeControl').addEventListener('click', event => {
        event.stopPropagation();
        closeTab(tab.id);
      });
      return tabEl;
    }));
    requestAnimationFrame(updateTabScrollbar);
  }

  function updateTabScrollbar() {
    const maxScroll = tabsEl.scrollWidth - tabsEl.clientWidth;
    const hasOverflow = maxScroll > 0;
    tabArea.classList.toggle('hasOverflow', hasOverflow);
    if (!hasOverflow) return;
    const thumbWidth = Math.max(16, tabsEl.clientWidth * tabsEl.clientWidth / tabsEl.scrollWidth);
    const thumbLeft = tabsEl.scrollLeft * (tabsEl.clientWidth - thumbWidth) / maxScroll;
    tabScrollbarThumb.style.width = thumbWidth + 'px';
    tabScrollbarThumb.style.transform = `translateX(${thumbLeft}px)`;
  }

  function renderConversation(tab) {
    messages.replaceChildren();

    tab.turns.forEach((turn, index) => {
      const turnEl = document.createElement('div');
      turnEl.className = 'turn';

      let message;
      if (tab.editingTurnIndex === index) {
        message = createEditComposer(tab, turn, index);
      } else {
        message = document.createElement('div');
        message.className = turn.responding ? 'message responding' : 'message';
        message.innerHTML = turn.html != null ? turn.html : escapeHtml(turn.text);
        rehydrateMentions(message, { removable: false });
        message.addEventListener('mousedown', event => {
          if (tab.editingTurnIndex === null || tab.editingTurnIndex === index) return;
          event.preventDefault();
          editTurn(tab, index);
        });
        message.addEventListener('click', () => editTurn(tab, index));

        const stopButton = document.createElement('button');
        stopButton.className = 'messageStop';
        stopButton.type = 'button';
        stopButton.setAttribute('aria-label', 'Stop');
        stopButton.innerHTML = '<img src="icons/stop-rounded.svg" alt="">';
        stopButton.addEventListener('mousedown', event => event.stopPropagation());
        stopButton.addEventListener('click', event => {
          event.stopPropagation();
          completeResponse(tab, turn);
        });
        message.append(stopButton);
      }

      const response = document.createElement('div');
      response.className = 'response';
      if (turn.responseText === 'Planning next moves') response.classList.add('planning');
      response.textContent = turn.responseText;

      turnEl.append(message, response);
      messages.append(turnEl);
      if (message.classList.contains('message') && message.scrollHeight > message.clientHeight) {
        message.classList.add('overflowing');
      }
    });

    messages.scrollTop = messages.scrollHeight;
  }

  function renderActiveTab() {
    const tab = activeTab();
    if (!tab) return;
    for (const tooltip of document.querySelectorAll('.mentionTooltip')) tooltip.remove();
    renderTabs();
    renderConversation(tab);
    editor.innerHTML = tab.draft || '';
    rehydrateMentions(editor, { removable: true, hostEditor: editor, onChange: () => { activeTab().draft = editor.innerHTML; } });
    document.body.classList.toggle('submitted', tab.turns.length > 0);
    setComposerState(Boolean(respondingTurn(tab)));
  }

  function completeResponse(tab, turn) {
    if (!turn) return;
    clearTurnTimers(turn);
    turn.responseText = DEFAULT_RESPONSE;
    turn.responding = false;
    if (tab.id === activeTabId) {
      renderActiveTab();
    }
  }

  function submitEditedTurn(tab, index) {
    const text = tab.editingDraft;
    if (!text.trim()) return;

    for (const turn of tab.turns.slice(index)) clearTurnTimers(turn);
    tab.turns.splice(index + 1);

    const turn = tab.turns[index];
    turn.text = text;
    turn.responseText = 'Planning next moves';
    turn.responseTokens = [];
    turn.responding = true;
    turn.planningTimer = null;
    turn.streamTimer = null;
    tab.editingTurnIndex = null;
    tab.editingDraft = '';

    setChatTitleFromPrompt(tab, text);
    startTurnResponse(tab, turn);
  }

  function streamResponse(tab, turn) {
    clearTimeout(turn.streamTimer);
    turn.responseTokens.push(DEFAULT_RESPONSE_TOKENS[turn.responseTokens.length]);
    turn.responseText = turn.responseTokens.join(' ');

    if (turn.responseTokens.length === DEFAULT_RESPONSE_TOKENS.length) {
      turn.responding = false;
    } else {
      turn.streamTimer = setTimeout(() => streamResponse(tab, turn), 50);
    }

    if (tab.id === activeTabId) {
      renderActiveTab();
    }
  }

  function switchTab(id) {
    if (id === activeTabId) return;
    saveActiveDraft();
    activeTabId = id;
    activeTabHistory = activeTabHistory.filter(tabId => tabId !== id);
    activeTabHistory.push(id);
    renderActiveTab();
  }

  function addTab() {
    saveActiveDraft();
    const tab = createTab(nextTabId++);
    tabs.push(tab);
    activeTabId = tab.id;
    activeTabHistory = activeTabHistory.filter(tabId => tabId !== tab.id);
    activeTabHistory.push(tab.id);
    renderActiveTab();
    editor.focus();
  }

  function closeTab(id) {
    const index = tabs.findIndex(tab => tab.id === id);
    if (index === -1) return;

    const [closedTab] = tabs.splice(index, 1);
    for (const turn of closedTab.turns) clearTurnTimers(turn);
    activeTabHistory = activeTabHistory.filter(tabId => tabId !== id);

    if (tabs.length === 0) {
      activeTabId = null;
      messages.replaceChildren();
      editor.replaceChildren();
      document.body.classList.remove('submitted');
      setComposerState(false);
      renderTabs();
      parent.postMessage({ type: 'right:close' }, '*');
      return;
    }

    if (id === activeTabId) {
      activeTabId = activeTabHistory[activeTabHistory.length - 1] || tabs[tabs.length - 1].id;
    }

    renderActiveTab();
  }

  function resetWorkspace() {
    for (const tab of tabs) {
      for (const turn of tab.turns) clearTurnTimers(turn);
    }
    tabs.length = 0;
    activeTabId = null;
    activeTabHistory = [];
    messages.replaceChildren();
    editor.replaceChildren();
    document.body.classList.remove('submitted');
    setComposerState(false);
    renderTabs();
  }

  function ensureTabForOpen() {
    if (tabs.length > 0) {
      renderActiveTab();
      editor.focus();
      return;
    }

    const tab = createTab(nextTabId++);
    tabs.push(tab);
    activeTabId = tab.id;
    activeTabHistory = [tab.id];
    renderActiveTab();
    editor.focus();
  }

  function submitChat() {
    const tab = activeTab();
    if (respondingTurn(tab)) return;

    const text = editorText();
    if (!text.trim()) return;

    const html = editor.innerHTML;
    setChatTitleFromPrompt(tab, text);
    tab.draft = '';
    editor.replaceChildren();

    const turn = createTurn(text, html);
    tab.turns.push(turn);
    startTurnResponse(tab, turn);
  }

  function cleanupOrphanedTooltips() {
    for (const tooltip of document.querySelectorAll('.mentionTooltip')) {
      const owner = [...editor.querySelectorAll('.mention')].find(span => span._tooltip === tooltip);
      if (!owner) tooltip.remove();
    }
  }

  editor.addEventListener('input', () => {
    cleanupOrphanedTooltips();
    activeTab().draft = editor.innerHTML;
    const match = findMentionQuery();
    if (match) openMentionMenu(match.query);
    else closeMentionMenu();
  });

  editor.addEventListener('keydown', (event) => {
    const menuOpen = mentionMenu.style.display === 'block';
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      if (menuOpen) {
        const highlighted = mentionMenu.querySelector('.mentionItem.highlighted');
        if (highlighted) selectMention(highlighted.dataset.path);
        return;
      }
      submitChat();
    } else if (event.key === 'Escape' && menuOpen) {
      closeMentionMenu();
    }
  });

  tabsEl.addEventListener('scroll', updateTabScrollbar);
  tabsEl.addEventListener('wheel', event => {
    if (tabsEl.scrollWidth <= tabsEl.clientWidth) return;
    event.preventDefault();
    tabsEl.scrollLeft += event.deltaX || event.deltaY;
  }, { passive: false });
  tabScrollbarThumb.addEventListener('mousedown', event => {
    event.preventDefault();
    const maxScroll = tabsEl.scrollWidth - tabsEl.clientWidth;
    const thumbWidth = tabScrollbarThumb.getBoundingClientRect().width;
    const maxThumbLeft = tabsEl.clientWidth - thumbWidth;
    if (maxScroll <= 0 || maxThumbLeft <= 0) return;
    const startX = event.clientX;
    const startScrollLeft = tabsEl.scrollLeft;
    const move = moveEvent => {
      tabsEl.scrollLeft = startScrollLeft + (moveEvent.clientX - startX) * maxScroll / maxThumbLeft;
    };
    const up = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      document.body.style.userSelect = '';
    };
    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
  addEventListener('resize', updateTabScrollbar);
  addEventListener('message', event => {
    const message = event.data;
    if (!message || typeof message !== 'object') return;
    if (message.type === 'right:open') ensureTabForOpen();
    else if (message.type === 'right:reset') resetWorkspace();
    else if (message.type === 'canvas:tabs') openTabNames = message.names || [];
    else if (message.type === 'vfs:files') workspaceFiles = message.files || [];
    else if (message.type === 'settings:theme') themeVariant = message.value === 'light' ? 'light' : 'dark';
  });

  sendButton.addEventListener('click', () => {
    const tab = activeTab();
    const turn = respondingTurn(tab);
    if (turn) {
      completeResponse(tab, turn);
      return;
    }

    submitChat();
  });

  document.querySelector('.addControl').addEventListener('click', addTab);
  renderActiveTab();
  parent.postMessage({ type: 'canvas:tabs:request' }, '*');
  parent.postMessage({ type: 'vfs:list' }, '*');
</script>
