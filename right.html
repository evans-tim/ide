<!doctype html>
<title>Right</title>
<style>
  html, body { margin: 0; height: 100%; font: var(--ide-font-size, 13px) var(--ide-font-ui, -apple-system, BlinkMacSystemFont, "Segoe WPC", "Segoe UI", sans-serif); background: var(--editor-background); color: var(--sideBar-foreground); }
  body { display: flex; flex-direction: column; }
  .topbar {
    box-sizing: border-box;
    height: 32px;
    flex: none;
    display: flex;
    align-items: center;
    background: var(--titleBar-activeBackground, var(--sideBar-background));
    border-bottom: 1px solid var(--editorGroup-border);
  }
  .tabArea {
    flex: 1;
    position: relative;
    height: 32px;
    min-width: 0;
  }
  .tabs {
    height: 32px;
    display: flex;
    min-width: 0;
    overflow-x: auto;
    overflow-y: hidden;
    overscroll-behavior: none;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tabScrollbar {
    display: none;
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 4px;
    pointer-events: none;
  }
  .tabArea.hasOverflow .tabScrollbar { display: block; }
  .tabScrollbarThumb {
    position: absolute;
    bottom: 0;
    height: 3px;
    border-radius: 0;
    background: var(--scrollbarSlider-background, #c1c1c1);
    pointer-events: auto;
  }
  .tabScrollbarThumb:hover {
    background: var(--scrollbarSlider-hoverBackground, #a8a8a8);
  }
  .tabScrollbarThumb::before {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
  }
  .tab {
    box-sizing: border-box;
    flex: none;
    height: 32px;
    margin-bottom: -1px;
    padding: 0 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    border-left: 1px solid var(--editorGroup-border);
    border-right: 1px solid var(--editorGroup-border);
    border-bottom: 1px solid var(--editorGroup-border);
    background: var(--titleBar-activeBackground, var(--sideBar-background));
    cursor: pointer;
  }
  .tab span { white-space: nowrap; }
  .tab.active {
    background: var(--editor-background);
    border-bottom-color: var(--editor-background);
  }
  .buttonGroup {
    box-sizing: border-box;
    flex: none;
    height: 32px;
    padding-right: 12px;
    display: flex;
    align-items: center;
    border-left: 1px solid var(--editorGroup-border);
  }
  .chatIcon { width: 16px; height: 16px; display: block; }
  .topbarControl {
    width: 20px;
    height: 20px;
    border: 0;
    border-radius: 5px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    cursor: pointer;
  }
  .topbarControl:hover { background: var(--list-inactiveSelectionBackground); }
  .topbarControl img { width: 12px; height: 12px; display: block; }
  .content { box-sizing: border-box; min-height: 0; flex: 1; padding: 12px 0 12px 12px; display: flex; flex-direction: column; gap: 12px; }
  .messages {
    display: none;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-gutter: stable;
  }
  .messages::-webkit-scrollbar { width: 12px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--scrollbarSlider-background, rgba(121, 121, 121, 0.4)); background-clip: padding-box; border: 2px solid transparent; border-radius: 6px; }
  .messages::-webkit-scrollbar-thumb:hover { background: var(--scrollbarSlider-hoverBackground, rgba(100, 100, 100, 0.7)); background-clip: padding-box; }
  body:not(.submitted) .messages { display: none; }
  body.submitted .messages { display: flex; }
  .turn {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .message {
    position: relative;
    min-height: 18px;
    padding: 8px 32px 8px 8px;
    border: 1px solid var(--editorGroup-border);
    border-radius: 8px;
    white-space: pre-wrap;
  }
  .messageStop {
    display: none;
    position: absolute;
    right: 6px;
    top: 6px;
    width: 18px;
    height: 18px;
    padding: 0;
    border: 0;
    border-radius: 50%;
    background: rgba(20, 20, 20, 0.68);
  }
  .message.responding:hover .messageStop {
    display: block;
    cursor: pointer;
  }
  .messageStop:hover {
    background: rgba(20, 20, 20, 0.58);
  }
  .messageStop img { width: 18px; height: 18px; display: block; }
  .response {
    padding: 0 8px;
    color: var(--descriptionForeground);
  }
  .prompt {
    position: relative;
    margin-right: 12px;
    height: 120px;
    border: 1px solid var(--editorGroup-border);
    border-radius: 8px;
    background: var(--input-background);
    overflow: hidden;
  }
  body.submitted .prompt {
    margin-top: auto;
  }
  textarea {
    box-sizing: border-box;
    width: 100%;
    height: calc(100% - 28px);
    padding: 8px;
    border: 0;
    outline: 0;
    resize: none;
    background: transparent;
    color: var(--input-foreground);
    font: inherit;
    overflow-y: auto;
    scrollbar-gutter: stable;
  }
  textarea::-webkit-scrollbar { width: 12px; }
  textarea::-webkit-scrollbar-track { background: transparent; }
  textarea::-webkit-scrollbar-thumb { background: var(--scrollbarSlider-background, rgba(121, 121, 121, 0.4)); background-clip: padding-box; border: 2px solid transparent; border-radius: 6px; }
  textarea::-webkit-scrollbar-thumb:hover { background: var(--scrollbarSlider-hoverBackground, rgba(100, 100, 100, 0.7)); background-clip: padding-box; }
  .promptFooter {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 28px;
    cursor: default;
  }
  .send {
    position: absolute;
    right: 4px;
    bottom: 4px;
    width: 18px;
    height: 18px;
    padding: 0;
    border: 0;
    border-radius: 50%;
    background: rgba(20, 20, 20, 0.68);
    cursor: default;
  }
  .send:hover { cursor: pointer; background: rgba(20, 20, 20, 0.58); }
  .send img { width: 18px; height: 18px; display: block; }
</style>
<div class="topbar"><div class="tabArea"><div class="tabs"></div><div class="tabScrollbar"><div class="tabScrollbarThumb"></div></div></div><div class="buttonGroup"><button class="topbarControl addControl" type="button" aria-label="Add"><img src="icons/add.svg" alt=""></button></div></div>
<div class="content">
  <div class="messages"></div>
  <div class="prompt">
    <textarea></textarea>
    <div class="promptFooter">
      <button class="send" type="button" aria-label="Send"><img src="icons/arrow-up.svg" alt=""></button>
    </div>
  </div>
</div>
<script>
  const tabsEl = document.querySelector('.tabs');
  const tabArea = document.querySelector('.tabArea');
  const tabScrollbarThumb = document.querySelector('.tabScrollbarThumb');
  const messages = document.querySelector('.messages');
  const textarea = document.querySelector('textarea');
  const sendButton = document.querySelector('.send');
  const sendIcon = sendButton.querySelector('img');
  const tabs = [createTab(1)];
  let activeTabId = 1;
  let nextTabId = 2;
  let activeTabHistory = [1];

  function createTab(id) {
    return {
      id,
      title: 'New Agent',
      draft: '',
      turns: [],
    };
  }

  function activeTab() {
    return tabs.find(tab => tab.id === activeTabId);
  }

  function saveActiveDraft() {
    const tab = activeTab();
    if (tab) tab.draft = textarea.value;
  }

  function respondingTurn(tab) {
    return tab.turns.find(turn => turn.responding) || null;
  }

  function setComposerState(isStop) {
    sendButton.setAttribute('aria-label', isStop ? 'Stop' : 'Send');
    sendIcon.src = isStop ? 'icons/stop-rounded.svg' : 'icons/arrow-up.svg';
  }

  function renderTabs() {
    tabsEl.replaceChildren(...tabs.map(tab => {
      const tabEl = document.createElement('div');
      tabEl.className = tab.id === activeTabId ? 'tab active' : 'tab';
      tabEl.innerHTML = '<img class="chatIcon" src="icons/chat.svg" alt=""><span></span><button class="topbarControl closeControl" type="button" aria-label="Close"><img src="icons/close.svg" alt=""></button>';
      tabEl.querySelector('span').textContent = tab.title;
      tabEl.addEventListener('click', () => switchTab(tab.id));
      tabEl.querySelector('.closeControl').addEventListener('click', event => {
        event.stopPropagation();
        closeTab(tab.id);
      });
      return tabEl;
    }));
    requestAnimationFrame(updateTabScrollbar);
  }

  function updateTabScrollbar() {
    const maxScroll = tabsEl.scrollWidth - tabsEl.clientWidth;
    const hasOverflow = maxScroll > 0;
    tabArea.classList.toggle('hasOverflow', hasOverflow);
    if (!hasOverflow) return;
    const thumbWidth = Math.max(16, tabsEl.clientWidth * tabsEl.clientWidth / tabsEl.scrollWidth);
    const thumbLeft = tabsEl.scrollLeft * (tabsEl.clientWidth - thumbWidth) / maxScroll;
    tabScrollbarThumb.style.width = thumbWidth + 'px';
    tabScrollbarThumb.style.transform = `translateX(${thumbLeft}px)`;
  }

  function renderConversation(tab) {
    messages.replaceChildren();

    for (const turn of tab.turns) {
      const turnEl = document.createElement('div');
      turnEl.className = 'turn';

      const message = document.createElement('div');
      message.className = turn.responding ? 'message responding' : 'message';
      message.textContent = turn.text;

      const stopButton = document.createElement('button');
      stopButton.className = 'messageStop';
      stopButton.type = 'button';
      stopButton.setAttribute('aria-label', 'Stop');
      stopButton.innerHTML = '<img src="icons/stop-rounded.svg" alt="">';
      stopButton.addEventListener('click', () => completeResponse(tab, turn));
      message.append(stopButton);

      const response = document.createElement('div');
      response.className = 'response';
      response.textContent = turn.responseText;

      turnEl.append(message, response);
      messages.append(turnEl);
    }

    messages.scrollTop = messages.scrollHeight;
  }

  function renderActiveTab() {
    const tab = activeTab();
    if (!tab) return;
    renderTabs();
    renderConversation(tab);
    textarea.value = tab.draft;
    document.body.classList.toggle('submitted', tab.turns.length > 0);
    setComposerState(Boolean(respondingTurn(tab)));
  }

  function completeResponse(tab, turn) {
    if (!turn) return;
    clearTimeout(turn.timer);
    turn.responseText = 'Hello.';
    turn.responding = false;
    if (tab.id === activeTabId) {
      renderActiveTab();
    }
  }

  function switchTab(id) {
    if (id === activeTabId) return;
    saveActiveDraft();
    activeTabId = id;
    activeTabHistory = activeTabHistory.filter(tabId => tabId !== id);
    activeTabHistory.push(id);
    renderActiveTab();
  }

  function addTab() {
    saveActiveDraft();
    const tab = createTab(nextTabId++);
    tabs.push(tab);
    activeTabId = tab.id;
    activeTabHistory = activeTabHistory.filter(tabId => tabId !== tab.id);
    activeTabHistory.push(tab.id);
    renderActiveTab();
    textarea.focus();
  }

  function closeTab(id) {
    const index = tabs.findIndex(tab => tab.id === id);
    if (index === -1) return;

    const [closedTab] = tabs.splice(index, 1);
    for (const turn of closedTab.turns) clearTimeout(turn.timer);
    activeTabHistory = activeTabHistory.filter(tabId => tabId !== id);

    if (tabs.length === 0) {
      activeTabId = null;
      messages.replaceChildren();
      textarea.value = '';
      document.body.classList.remove('submitted');
      setComposerState(false);
      renderTabs();
      parent.postMessage({ type: 'right:close' }, '*');
      return;
    }

    if (id === activeTabId) {
      activeTabId = activeTabHistory[activeTabHistory.length - 1] || tabs[tabs.length - 1].id;
    }

    renderActiveTab();
  }

  function ensureTabForOpen() {
    if (tabs.length > 0) {
      renderActiveTab();
      textarea.focus();
      return;
    }

    const tab = createTab(nextTabId++);
    tabs.push(tab);
    activeTabId = tab.id;
    activeTabHistory = [tab.id];
    renderActiveTab();
    textarea.focus();
  }

  function submitChat() {
    const tab = activeTab();
    if (respondingTurn(tab)) return;

    const text = textarea.value;
    if (!text.trim()) return;

    tab.draft = '';
    textarea.value = '';

    const turn = {
      text,
      responseText: 'Planning next moves',
      responding: true,
      timer: null,
    };
    tab.turns.push(turn);
    renderActiveTab();

    turn.timer = setTimeout(() => completeResponse(tab, turn), 1000);
  }

  textarea.addEventListener('input', () => {
    activeTab().draft = textarea.value;
  });

  textarea.addEventListener('keydown', (event) => {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      submitChat();
    }
  });

  tabsEl.addEventListener('scroll', updateTabScrollbar);
  tabsEl.addEventListener('wheel', event => {
    if (tabsEl.scrollWidth <= tabsEl.clientWidth) return;
    event.preventDefault();
    tabsEl.scrollLeft += event.deltaX || event.deltaY;
  }, { passive: false });
  tabScrollbarThumb.addEventListener('mousedown', event => {
    event.preventDefault();
    const maxScroll = tabsEl.scrollWidth - tabsEl.clientWidth;
    const thumbWidth = tabScrollbarThumb.getBoundingClientRect().width;
    const maxThumbLeft = tabsEl.clientWidth - thumbWidth;
    if (maxScroll <= 0 || maxThumbLeft <= 0) return;
    const startX = event.clientX;
    const startScrollLeft = tabsEl.scrollLeft;
    const move = moveEvent => {
      tabsEl.scrollLeft = startScrollLeft + (moveEvent.clientX - startX) * maxScroll / maxThumbLeft;
    };
    const up = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      document.body.style.userSelect = '';
    };
    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
  addEventListener('resize', updateTabScrollbar);
  addEventListener('message', event => {
    const message = event.data;
    if (!message || typeof message !== 'object') return;
    if (message.type === 'right:open') ensureTabForOpen();
  });

  sendButton.addEventListener('click', () => {
    const tab = activeTab();
    const turn = respondingTurn(tab);
    if (turn) {
      completeResponse(tab, turn);
      return;
    }

    submitChat();
  });

  document.querySelector('.addControl').addEventListener('click', addTab);
  renderActiveTab();
</script>
