<title>Right</title>
<style>

  .mentionItem .mentionName { color: var(--editorSuggestWidget-foreground, var(--foreground, var(--editor-foreground))); flex: 0 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; }

  .command {
    position: relative;

<div class="topbar"><div class="tabArea"><div class="tabs"></div><div class="tabScrollbar"><div class="tabScrollbarThumb"></div></div></div><div class="buttonGroup"><button class="topbarControl addControl" type="button" aria-label="Add"><img src="icons/add.svg" alt=""></button><button class="topbarControl clockControl" type="button" aria-label="History"><span class="iconMask clockIcon"></span></button></div></div>
<div class="content">
  <div class="messages"></div>
  <div class="prompt">
    <div class="editor" contenteditable="true"></div>
    <div class="promptFooter">
      <div class="agentChooser" id="agentChooser">
        <span class="agentChooserName" id="agentChooserName"></span>
        <svg class="agentChooserChevron" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <button class="send" type="button" aria-label="Send"><img src="icons/arrow-up.svg" alt=""></button>
    </div>
  </div>
</div>
<div class="mentionMenu" style="display: none;"></div>
<div class="commandMenu mentionMenu" style="display: none;"></div>
<div class="historyMenu" style="display: none;"></div>
<div class="agentChooserMenu" id="agentChooserMenu" style="display: none;"></div>
<script>
  const MODELS = [
    { id: 'claude-opus-4-8', name: 'Claude Opus 4.8' },
    { id: 'claude-sonnet-4-6', name: 'Claude Sonnet 4.6' },
    { id: 'claude-haiku-4-5', name: 'Claude Haiku 4.5' },
  ];
  let selectedModel = 'claude-sonnet-4-6';

  const agentChooserEl = document.getElementById('agentChooser');
  const agentChooserNameEl = document.getElementById('agentChooserName');
  const agentChooserMenuEl = document.getElementById('agentChooserMenu');

  function updateAgentChooserDisplay() {
    const m = MODELS.find(m => m.id === selectedModel);
    agentChooserNameEl.textContent = m ? m.name : selectedModel;
  }
  updateAgentChooserDisplay();

  function openAgentChooserMenu() {
    agentChooserMenuEl.replaceChildren(...MODELS.map((m, i) => {
      const item = document.createElement('div');
      item.className = i === 0 ? 'agentChooserItem highlighted' : 'agentChooserItem';
      item.textContent = m.name;
      item.dataset.id = m.id;
      item.addEventListener('mouseenter', () => {
        for (const other of agentChooserMenuEl.children) other.classList.remove('highlighted');
        item.classList.add('highlighted');
      });
      item.addEventListener('mousedown', event => {
        event.preventDefault();
        selectedModel = m.id;
        updateAgentChooserDisplay();
        closeAgentChooserMenu();
      });
      return item;
    }));
    const rect = agentChooserEl.getBoundingClientRect();
    agentChooserMenuEl.style.display = 'block';
    agentChooserMenuEl.style.left = rect.left + 'px';
    const menuH = agentChooserMenuEl.offsetHeight;
    const spaceBelow = window.innerHeight - rect.bottom;
    if (spaceBelow >= menuH + 4) {
      agentChooserMenuEl.style.top = (rect.bottom + 4) + 'px';
    } else {
      agentChooserMenuEl.style.top = (rect.top - menuH - 4) + 'px';
    }
  }

  function closeAgentChooserMenu() {
    agentChooserMenuEl.style.display = 'none';
  }

  agentChooserEl.addEventListener('click', event => {
    event.stopPropagation();
    if (agentChooserMenuEl.style.display === 'block') closeAgentChooserMenu();
    else openAgentChooserMenu();
  });
  document.addEventListener('mousedown', event => {
    if (agentChooserMenuEl.style.display !== 'block') return;
    if (agentChooserMenuEl.contains(event.target) || agentChooserEl.contains(event.target)) return;
    closeAgentChooserMenu();
  });
  document.addEventListener('keydown', event => {
    if (agentChooserMenuEl.style.display !== 'block') return;
    if (event.key === 'Enter') {
      event.preventDefault();
      const highlighted = agentChooserMenuEl.querySelector('.agentChooserItem.highlighted');
      if (highlighted) { selectedModel = highlighted.dataset.id; updateAgentChooserDisplay(); closeAgentChooserMenu(); }
    } else if (event.key === 'Escape') {
      closeAgentChooserMenu();
    }
  });
  const tabsEl = document.querySelector('.tabs');
  const tabArea = document.querySelector('.tabArea');
  const tabScrollbarThumb = document.querySelector('.tabScrollbarThumb');
  const messages = document.querySelector('.messages');
  const editor = document.querySelector('.prompt > .editor');
  const sendButton = document.querySelector('.send');
  const sendIcon = sendButton.querySelector('img');
  const mentionMenu = document.querySelector('.mentionMenu:not(.commandMenu)');
  const commandMenu = document.querySelector('.commandMenu');
  let activeEditor = editor;

  let COMMANDS = [
    { title: 'index', body: 'Single sentence responses only.' },
    { title: 'deobfuscation', body: 'The core problem is detecting and efficiently resolving cascading semantic reinterpretations of code primitives as higher-level usage contexts are discovered during bottom up deobfuscation. ' },
    { title: 'density', body: 'The core problem is organizing code to maximize local dependency density so that related definitions, usages, and their semantic relationships appear within LLM context windows, enabling accurate prediction of code behavior without long-range reasoning.' },
  ];
  const commandByTitle = title => COMMANDS.find(command => command.title === title) || null;
  const setCommandsFromVfs = files => {
    COMMANDS = Object.keys(files || {}).sort().map(path => ({
      title: path.slice('COMMANDS/'.length).replace(/\.md$/, ''),
      body: files[path],
    }));
  };

  let openTabNames = [];
  let workspaceFiles = [];
  let setiTheme = null;
  let themeVariant = 'dark';
  const EXT_LANG = {
    js: 'javascript', mjs: 'javascript', cjs: 'javascript', jsx: 'javascript',
    ts: 'typescript', tsx: 'typescriptreact', html: 'html', htm: 'html',
    md: 'markdown', txt: 'plaintext', css: 'css', json: 'json'
  };
  fetch('icons/vs-seti-icon-theme.json').then(r => r.json()).then(t => { setiTheme = t; });

  function fileIconFor(path) {
    if (!setiTheme) return { char: '', color: 'inherit' };
    const light = themeVariant === 'light';
    const variant = light ? (setiTheme.light || {}) : {};
    const name = path.split('/').pop().toLowerCase();
    const dot = name.lastIndexOf('.');
    const ext = dot >= 0 ? name.slice(dot + 1) : '';
    const lang = EXT_LANG[ext];
    const key = (variant.fileNames && variant.fileNames[name]) || setiTheme.fileNames[name]
      || (variant.fileExtensions && variant.fileExtensions[ext]) || setiTheme.fileExtensions[ext]
      || (lang && variant.languageIds && variant.languageIds[lang]) || (lang && setiTheme.languageIds[lang])
      || variant.file || setiTheme.file;
    const def = setiTheme.iconDefinitions[key] || setiTheme.iconDefinitions[setiTheme.file];
    return { char: String.fromCodePoint(parseInt(def.fontCharacter.replace(/\\/g, ''), 16)), color: def.fontColor };
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function parentPathOf(path) {
    const idx = path.lastIndexOf('/');
    return idx >= 0 ? path.slice(0, idx) : '';
  }

  function createMentionSpan(path, options = {}) {
    const { removable = true, hostEditor = editor, onChange = null } = options;
    const span = document.createElement('span');
    span.className = 'mention';
    span.contentEditable = 'false';
    span.dataset.path = path;

    const icon = document.createElement('span');
    icon.className = 'fileIcon';
    icon.setAttribute('aria-hidden', 'true');
    const glyph = fileIconFor(path);
    icon.textContent = glyph.char;
    icon.style.color = glyph.color;

    const closeEl = document.createElement('span');
    closeEl.className = 'mentionClose';
    closeEl.setAttribute('aria-hidden', 'true');
    if (removable) {
      closeEl.addEventListener('mousedown', event => {
        event.preventDefault();
        event.stopPropagation();
        const next = span.nextSibling;
        span.remove();
        tooltip.remove();
        if (next && next.nodeType === Node.TEXT_NODE && next.textContent === '\u00a0') next.remove();
        if (onChange) onChange();
        if (hostEditor) hostEditor.focus();
      });
    }

    const nameEl = document.createElement('span');
    nameEl.textContent = path.split('/').pop();

    const tooltip = document.createElement('div');
    tooltip.className = 'mentionTooltip';
    tooltip.textContent = path;
    document.body.append(tooltip);
    span._tooltip = tooltip;

    if (removable) {
      span.addEventListener('mouseenter', () => {
        const rect = span.getBoundingClientRect();
        tooltip.style.display = 'block';
        tooltip.style.left = rect.left + 'px';
        tooltip.style.top = (rect.top - tooltip.offsetHeight) + 'px';
      });
      span.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

      span.addEventListener('click', event => {
        if (event.target === closeEl) return;
        parent.postMessage({ type: 'vfs:open', name: path }, '*');
      });
    }

    if (!removable) span.classList.add('mention-readonly');
    span.append(icon, closeEl, nameEl);
    return span;
  }

  function rehydrateMentions(container, options = {}) {
    for (const placeholder of [...container.querySelectorAll('.mention')]) {
      const span = createMentionSpan(placeholder.dataset.path, options);
      placeholder.replaceWith(span);
    }
    for (const placeholder of [...container.querySelectorAll('.command')]) {
      const span = createCommandSpan(placeholder.dataset.title, options);
      placeholder.replaceWith(span);
    }
  }

  function createCommandSpan(title, options = {}) {
    const { removable = true } = options;
    const span = document.createElement('span');
    span.className = removable ? 'command' : 'command command-readonly';
    span.contentEditable = 'false';
    span.dataset.title = title;
    span.textContent = '/' + title;

    if (removable) {
      span.addEventListener('click', event => { event.preventDefault(); });
    }
    return span;
  }

  function editorText(editorEl = editor) {
    let text = '';
    for (const node of editorEl.childNodes) {
      if (node.nodeType === Node.TEXT_NODE) text += node.textContent;
      else if (node.classList && node.classList.contains('mention')) text += '@' + node.dataset.path;
      else if (node.classList && node.classList.contains('command')) text += '/' + node.dataset.title;
      else if (node.nodeName === 'BR') text += '\n';
      else text += node.textContent;
    }
    return text;
  }

  function clearEditor() {
    editor.replaceChildren();
    activeTab().draft = '';
  }

  function caretCoordinates() {
    const selection = window.getSelection();
    if (!selection.rangeCount) return { x: 0, y: 0 };
    const range = selection.getRangeAt(0).cloneRange();
    range.collapse(true);
    let rect = range.getClientRects()[0];
    if (!rect) {
      const marker = document.createElement('span');
      marker.textContent = '\u200b';
      range.insertNode(marker);
      rect = marker.getBoundingClientRect();
      marker.remove();
    }
    return { x: rect.left, y: rect.bottom };
  }

  function atCoordinates() {
    const match = findMentionQuery();
    if (!match) return null;
    const range = document.createRange();
    range.setStart(match.node, match.at);
    range.setEnd(match.node, match.at + 1);
    const rect = range.getClientRects()[0] || range.getBoundingClientRect();
    if (!rect || (rect.left === 0 && rect.bottom === 0)) return null;
    return { x: rect.left, y: rect.bottom };
  }

  function closeMentionMenu() {
    mentionMenu.style.display = 'none';
    mentionMenu.replaceChildren();
  }

  function openMentionMenu(query) {
    const items = query
      ? workspaceFiles.filter(name => name.split('/').pop().startsWith(query))
      : openTabNames;
    if (items.length === 0) {
      closeMentionMenu();
      return;
    }
    mentionMenu.replaceChildren(...items.map((name, index) => {
      const item = document.createElement('div');
      item.className = index === 0 ? 'mentionItem highlighted' : 'mentionItem';
      item.dataset.path = name;
      item.addEventListener('mouseenter', () => {
        for (const other of mentionMenu.children) other.classList.remove('highlighted');
        item.classList.add('highlighted');
      });
      item.addEventListener('mousedown', event => {
        event.preventDefault();
        selectMention(name);
      });

      const icon = document.createElement('span');
      icon.className = 'fileIcon';
      icon.setAttribute('aria-hidden', 'true');
      const glyph = fileIconFor(name);
      icon.textContent = glyph.char;
      icon.style.color = glyph.color;

      const nameEl = document.createElement('span');
      nameEl.className = 'mentionName';
      nameEl.textContent = name.split('/').pop();

      item.append(icon, nameEl);

      const parent = parentPathOf(name);
      if (parent) {
        const pathEl = document.createElement('span');
        pathEl.className = 'mentionPath';
        pathEl.textContent = parent;
        item.append(pathEl);
      }
      return item;
    }));

    const coords = atCoordinates() || caretCoordinates();
    mentionMenu.style.left = coords.x + 'px';
    mentionMenu.style.top = (coords.y + 4) + 'px';
    mentionMenu.style.display = 'block';
  }

  function findMentionQuery() {
    const selection = window.getSelection();
    if (!selection.rangeCount) return null;
    const range = selection.getRangeAt(0);
    if (!range.collapsed) return null;
    const node = range.startContainer;
    if (node.nodeType !== Node.TEXT_NODE || !activeEditor.contains(node)) return null;
    const text = node.textContent.slice(0, range.startOffset);
    const at = text.lastIndexOf('@');
    if (at === -1) return null;
    const query = text.slice(at + 1);
    if (/\s/.test(query)) return null;
    return { node, at, end: range.startOffset, query };
  }

  function selectMention(path) {
    const match = findMentionQuery();
    closeMentionMenu();
    if (!match) return;

    const range = document.createRange();
    range.setStart(match.node, match.at);
    range.setEnd(match.node, match.end);
    range.deleteContents();

    const span = createMentionSpan(path, activeEditorOptions());
    range.insertNode(span);

    const after = document.createTextNode('\u00a0');
    span.after(after);

    const selection = window.getSelection();
    const caret = document.createRange();
    caret.setStart(after, after.length);
    caret.collapse(true);
    selection.removeAllRanges();
    selection.addRange(caret);

    activeEditor.focus();
    persistActiveEditor();
  }

  function findCommandQuery() {
    const selection = window.getSelection();
    if (!selection.rangeCount) return null;
    const range = selection.getRangeAt(0);
    if (!range.collapsed) return null;
    const node = range.startContainer;
    if (node.nodeType !== Node.TEXT_NODE || !activeEditor.contains(node)) return null;
    const text = node.textContent.slice(0, range.startOffset);
    const at = text.lastIndexOf('/');
    if (at === -1) return null;
    const query = text.slice(at + 1);
    if (/\s/.test(query)) return null;
    return { node, at, end: range.startOffset, query };
  }

  function slashCoordinates() {
    const match = findCommandQuery();
    if (!match) return null;
    const range = document.createRange();
    range.setStart(match.node, match.at);
    range.setEnd(match.node, match.at + 1);
    const rect = range.getClientRects()[0] || range.getBoundingClientRect();
    if (!rect || (rect.left === 0 && rect.bottom === 0)) return null;
    return { x: rect.left, y: rect.bottom };
  }

  function closeCommandMenu() {
    commandMenu.style.display = 'none';
    commandMenu.replaceChildren();
  }

  function openCommandMenu(query) {
    const items = COMMANDS.filter(command => command.title.startsWith(query));
    if (items.length === 0) {
      closeCommandMenu();
      return;
    }
    commandMenu.replaceChildren(...items.map((command, index) => {
      const item = document.createElement('div');
      item.className = index === 0 ? 'commandItem highlighted' : 'commandItem';
      item.dataset.title = command.title;
      item.addEventListener('mouseenter', () => {
        for (const other of commandMenu.children) other.classList.remove('highlighted');
        item.classList.add('highlighted');
        showCommandItemPreview(item, command);
      });
      item.addEventListener('mouseleave', () => { commandItemPreview.style.display = 'none'; });
      item.addEventListener('mousedown', event => {
        event.preventDefault();
        selectCommand(command.title);
      });

      const titleEl = document.createElement('div');
      titleEl.className = 'commandTitle';
      titleEl.textContent = command.title;
      const bodyEl = document.createElement('div');
      bodyEl.className = 'commandBody';
      bodyEl.textContent = command.body;
      item.append(titleEl, bodyEl);
      return item;
    }));

    const coords = slashCoordinates() || caretCoordinates();
    commandMenu.style.left = coords.x + 'px';
    commandMenu.style.top = (coords.y + 4) + 'px';
    commandMenu.style.display = 'block';
  }

  const commandItemPreview = document.createElement('div');
  commandItemPreview.className = 'commandPreview';
  commandItemPreview.innerHTML = '<div class="commandTitle"></div><div class="commandBody"></div>';
  document.body.append(commandItemPreview);

  function showCommandItemPreview(item, command) {
    commandItemPreview.querySelector('.commandTitle').textContent = command.title;
    commandItemPreview.querySelector('.commandBody').textContent = command.body;
    const rect = item.getBoundingClientRect();
    commandItemPreview.style.display = 'block';
    commandItemPreview.style.left = (rect.left + commandMenu.offsetWidth) + 'px';
    commandItemPreview.style.top = (rect.top + rect.height / 2 - commandItemPreview.offsetHeight / 2) + 'px';
  }

  function selectCommand(title) {
    const match = findCommandQuery();
    closeCommandMenu();
    commandItemPreview.style.display = 'none';
    if (!match) return;

    const range = document.createRange();
    range.setStart(match.node, match.at);
    range.setEnd(match.node, match.end);
    range.deleteContents();

    const span = createCommandSpan(title, activeEditorOptions());
    range.insertNode(span);

    const after = document.createTextNode('\u00a0');
    span.after(after);

    const selection = window.getSelection();
    const caret = document.createRange();
    caret.setStart(after, after.length);
    caret.collapse(true);
    selection.removeAllRanges();
    selection.addRange(caret);

    activeEditor.focus();
    persistActiveEditor();
  }

  function activeEditorOptions() {
    return { removable: true, hostEditor: activeEditor, onChange: persistActiveEditor };
  }

  function persistActiveEditor() {
    const tab = activeTab();
    if (!tab) return;
    if (activeEditor === editor) tab.draft = editor.innerHTML;
    else if (tab.editingTurnIndex !== null) {
      tab.editingDraft = activeEditor.innerHTML;
      if (!tab.editingDrafts) tab.editingDrafts = {};
      tab.editingDrafts[tab.editingTurnIndex] = activeEditor.innerHTML;
    }
  }

  const historyMenu = document.querySelector('.historyMenu');
  const clockControl = document.querySelector('.clockControl');
  const chatHistory = [];

  function recordHistory(tab) {
    let entry = chatHistory.find(item => item.id === tab.id);
    if (!entry) {
      entry = { id: tab.id };
      chatHistory.push(entry);
    }
    entry.title = tab.title;
    entry.turns = tab.turns;
    entry.draft = tab.draft;
  }

  const tabs = [createTab(1)];
  let activeTabId = 1;
  let nextTabId = 2;
  let activeTabHistory = [1];

  function createTab(id) {
    return {
      id,
      title: 'New Agent',
      draft: '',
      editingTurnIndex: null,
      editingDraft: '',
      turns: [],
    };
  }

  function activeTab() {
    return tabs.find(tab => tab.id === activeTabId);
  }

  function saveActiveDraft() {
    const tab = activeTab();
    if (tab) tab.draft = editor.innerHTML;
  }

  function respondingTurn(tab) {
    return tab.turns.find(turn => turn.responding) || null;
  }

  function setComposerState(isStop) {
    sendButton.setAttribute('aria-label', isStop ? 'Stop' : 'Send');
    sendIcon.src = isStop ? 'icons/stop-rounded.svg' : 'icons/arrow-up.svg';
  }

  function setChatTitleFromPrompt(tab, promptText) {
    if (tab.title !== 'New Agent') return;
    tab.title = promptText;
    recordHistory(tab);
  }

  function clearTurnTimers(turn) {
    turn.abortController?.abort();
    turn.abortController = null;
  }

  function createTurn(text, html) {
    return {
      text,
      html: html != null ? html : escapeHtml(text),
      responseText: 'Planning next moves',
      responding: true,
      abortController: null,
    };
  }

  const pendingReads = new Map();
  function readFileContent(path) {
    return new Promise(resolve => {
      let list = pendingReads.get(path);
      if (!list) { list = []; pendingReads.set(path, list); }
      list.push(resolve);
      parent.postMessage({ type: 'vfs:read', name: path }, '*');
    });
  }

  async function serializeForLLM(turn) {
    const html = turn.html != null ? turn.html : escapeHtml(turn.text);
    const container = document.createElement('div');
    container.innerHTML = html;
    let text = '';
    for (const node of container.childNodes) {
      if (node.nodeType === Node.TEXT_NODE) text += node.textContent;
      else if (node.classList && node.classList.contains('command')) {
        const command = commandByTitle(node.dataset.title);
        text += command ? command.body : '/' + node.dataset.title;
      }
      else if (node.classList && node.classList.contains('mention')) {
        const path = node.dataset.path;
        text += path.split('/').pop() + ':\n' + await readFileContent(path);
      }
      else if (node.nodeName === 'BR') text += '\n';
      else text += node.textContent;
    }
    return text;
  }

  async function conversationMessages(tab, throughText) {
    const history = [];
    for (const turn of tab.turns) {
      history.push({ role: 'user', content: await serializeForLLM(turn) });
      if (turn.text === throughText) break;
      history.push({ role: 'assistant', content: turn.responseText });
    }
    return history;
  }

  function startTurnResponse(tab, turn) {
    renderActiveTab();
    streamResponse(tab, turn);
  }

  async function streamResponse(tab, turn) {
    const controller = new AbortController();
    turn.abortController = controller;
    let firstToken = true;
    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: await conversationMessages(tab, turn.text), system: await readFileContent('SYSTEM/system.md'), model: selectedModel }),
        signal: controller.signal,
      });
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        if (!chunk) continue;
        if (firstToken) { turn.responseText = ''; firstToken = false; }
        turn.responseText += chunk;
        if (tab.id === activeTabId) renderActiveTab();
      }
    } catch (err) {
      if (err.name === 'AbortError') return;
    }
    turn.responding = false;
    turn.abortController = null;
    if (tab.id === activeTabId) renderActiveTab();
  }

  function createEditComposer(tab, turn, index) {
    const prompt = document.createElement('div');
    prompt.className = 'prompt editPrompt';

    const editEditor = document.createElement('div');
    editEditor.className = 'editor';
    editEditor.contentEditable = 'true';
    editEditor.innerHTML = tab.editingDraft || '';
    rehydrateMentions(editEditor, { removable: true, hostEditor: editEditor, onChange: () => { tab.editingDraft = editEditor.innerHTML; } });
    editEditor.addEventListener('input', () => resizeEditComposer(editEditor));
    attachComposerEditor(editEditor, () => submitEditedTurn(tab, index));

    const footer = document.createElement('div');
    footer.className = 'promptFooter';

    const button = document.createElement('button');
    button.className = 'send';
    button.type = 'button';
    button.setAttribute('aria-label', 'Send');
    button.innerHTML = '<img src="icons/arrow-up.svg" alt="">';
    button.addEventListener('click', () => submitEditedTurn(tab, index));

    footer.append(button);
    prompt.append(editEditor, footer);
    prompt.addEventListener('focusout', event => {
      if (prompt.contains(event.relatedTarget)) return;
      if (mentionMenu.contains(event.relatedTarget)) return;
      if (commandMenu.contains(event.relatedTarget)) return;
      if (tab.editingTurnIndex !== index) return;
      cancelEditTurn(tab);
    });
    requestAnimationFrame(() => resizeEditComposer(editEditor));
    return prompt;
  }

  function resizeEditComposer(editEditor) {
    const maxTextAreaHeight = 92;
    editEditor.style.height = 'auto';
    const textAreaHeight = Math.min(editEditor.scrollHeight, maxTextAreaHeight);
    editEditor.style.height = textAreaHeight + 'px';
    editEditor.style.overflowY = editEditor.scrollHeight > maxTextAreaHeight ? 'auto' : 'hidden';
    editEditor.parentElement.style.height = textAreaHeight + 28 + 'px';
  }

  function editTurn(tab, index) {
    const turn = tab.turns[index];
    if (tab.editingTurnIndex !== index) {
      tab.editingTurnIndex = index;
      if (!tab.editingDrafts) tab.editingDrafts = {};
      if (tab.editingDrafts[index] == null) {
        tab.editingDrafts[index] = turn.html != null ? turn.html : escapeHtml(turn.text);
      }
      tab.editingDraft = tab.editingDrafts[index];
    }
    renderActiveTab();
    const editEditor = messages.querySelector('.editPrompt .editor');
    if (editEditor) {
      activeEditor = editEditor;
      editEditor.focus();
      const range = document.createRange();
      range.selectNodeContents(editEditor);
      range.collapse(false);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
    }
  }

  function cancelEditTurn(tab) {
    if (tab.editingDrafts && tab.editingTurnIndex !== null) {
      tab.editingDrafts[tab.editingTurnIndex] = tab.editingDraft;
    }
    tab.editingTurnIndex = null;
    activeEditor = editor;
    closeMentionMenu();
    renderActiveTab();
  }

  function renderTabs() {
    tabsEl.replaceChildren(...tabs.map(tab => {
      const tabEl = document.createElement('div');
      tabEl.className = tab.id === activeTabId ? 'tab active' : 'tab';
      const iconClass = respondingTurn(tab) ? 'spinnerIcon' : 'chatIcon';
      tabEl.innerHTML = `<span class="iconMask ${iconClass}" aria-hidden="true"></span><span class="tabTitle"></span><button class="topbarControl closeControl" type="button" aria-label="Close"><span class="iconMask closeIcon" aria-hidden="true"></span></button>`;
      tabEl.querySelector('.tabTitle').textContent = tab.title;
      tabEl.addEventListener('click', () => switchTab(tab.id));
      tabEl.querySelector('.closeControl').addEventListener('click', event => {
        event.stopPropagation();
        closeTab(tab.id);
      });
      return tabEl;
    }));
    requestAnimationFrame(updateTabScrollbar);
  }

  function updateTabScrollbar() {
    const maxScroll = tabsEl.scrollWidth - tabsEl.clientWidth;
    const hasOverflow = maxScroll > 0;
    tabArea.classList.toggle('hasOverflow', hasOverflow);
    if (!hasOverflow) return;
    const thumbWidth = Math.max(16, tabsEl.clientWidth * tabsEl.clientWidth / tabsEl.scrollWidth);
    const thumbLeft = tabsEl.scrollLeft * (tabsEl.clientWidth - thumbWidth) / maxScroll;
    tabScrollbarThumb.style.width = thumbWidth + 'px';
    tabScrollbarThumb.style.transform = `translateX(${thumbLeft}px)`;
  }

  function renderConversation(tab) {
    messages.replaceChildren();

    tab.turns.forEach((turn, index) => {
      const turnEl = document.createElement('div');
      turnEl.className = 'turn';

      let message;
      if (tab.editingTurnIndex === index) {
        message = createEditComposer(tab, turn, index);
      } else {
        message = document.createElement('div');
        message.className = turn.responding ? 'message responding' : 'message';
        message.innerHTML = turn.html != null ? turn.html : escapeHtml(turn.text);
        rehydrateMentions(message, { removable: false });
        message.addEventListener('mousedown', event => {
          if (tab.editingTurnIndex === null || tab.editingTurnIndex === index) return;
          event.preventDefault();
          editTurn(tab, index);
        });
        message.addEventListener('click', () => editTurn(tab, index));

        const stopButton = document.createElement('button');
        stopButton.className = 'messageStop';
        stopButton.type = 'button';
        stopButton.setAttribute('aria-label', 'Stop');
        stopButton.innerHTML = '<img src="icons/stop-rounded.svg" alt="">';
        stopButton.addEventListener('mousedown', event => event.stopPropagation());
        stopButton.addEventListener('click', event => {
          event.stopPropagation();
          completeResponse(tab, turn);
        });
        message.append(stopButton);
      }

      const response = document.createElement('div');
      response.className = 'response';
      if (turn.responseText === 'Planning next moves') response.classList.add('planning');
      response.textContent = turn.responseText;

      turnEl.append(message, response);
      messages.append(turnEl);
      if (message.classList.contains('message') && message.scrollHeight > message.clientHeight) {
        message.classList.add('overflowing');
      }
    });

    messages.scrollTop = messages.scrollHeight;
  }

  function renderActiveTab() {
    const tab = activeTab();
    if (!tab) return;
    for (const tooltip of document.querySelectorAll('.mentionTooltip')) tooltip.remove();
    renderTabs();
    renderConversation(tab);
    editor.innerHTML = tab.draft || '';
    rehydrateMentions(editor, { removable: true, hostEditor: editor, onChange: () => { activeTab().draft = editor.innerHTML; } });
    document.body.classList.toggle('submitted', tab.turns.length > 0);
    setComposerState(Boolean(respondingTurn(tab)));
  }

  function completeResponse(tab, turn) {
    if (!turn) return;
    clearTurnTimers(turn);
    if (turn.responseText === 'Planning next moves') turn.responseText = '';
    turn.responding = false;
    if (tab.id === activeTabId) {
      renderActiveTab();
    }
  }

  function submitEditedTurn(tab, index) {
    const editEditor = messages.querySelector('.editPrompt .editor');
    if (!editEditor) return;
    const text = editorText(editEditor);
    if (!text.trim()) return;
    const html = editEditor.innerHTML;

    for (const turn of tab.turns.slice(index)) clearTurnTimers(turn);
    tab.turns.splice(index + 1);

    const turn = tab.turns[index];
    turn.text = text;
    turn.html = html;
    turn.responseText = 'Planning next moves';
    turn.responding = true;
    turn.abortController = null;
    if (tab.editingDrafts) delete tab.editingDrafts[index];
    tab.editingTurnIndex = null;
    tab.editingDraft = '';
    activeEditor = editor;
    closeMentionMenu();

    setChatTitleFromPrompt(tab, text);
    startTurnResponse(tab, turn);
  }

  function switchTab(id) {
    if (id === activeTabId) return;
    saveActiveDraft();
    activeTabId = id;
    activeTabHistory = activeTabHistory.filter(tabId => tabId !== id);
    activeTabHistory.push(id);
    renderActiveTab();
  }

  function addTab() {
    saveActiveDraft();
    const tab = createTab(nextTabId++);
    tabs.push(tab);
    activeTabId = tab.id;
    activeTabHistory = activeTabHistory.filter(tabId => tabId !== tab.id);
    activeTabHistory.push(tab.id);
    renderActiveTab();
    editor.focus();
  }

  function closeTab(id) {
    const index = tabs.findIndex(tab => tab.id === id);
    if (index === -1) return;

    const [closedTab] = tabs.splice(index, 1);
    if (closedTab.title !== 'New Agent') recordHistory(closedTab);
    for (const turn of closedTab.turns) clearTurnTimers(turn);
    activeTabHistory = activeTabHistory.filter(tabId => tabId !== id);

    if (tabs.length === 0) {
      activeTabId = null;
      messages.replaceChildren();
      editor.replaceChildren();
      document.body.classList.remove('submitted');
      setComposerState(false);
      renderTabs();
      parent.postMessage({ type: 'right:close' }, '*');
      return;
    }

    if (id === activeTabId) {
      activeTabId = activeTabHistory[activeTabHistory.length - 1] || tabs[tabs.length - 1].id;
    }

    renderActiveTab();
  }

  function resetWorkspace() {
    for (const tab of tabs) {
      for (const turn of tab.turns) clearTurnTimers(turn);
    }
    tabs.length = 0;
    activeTabId = null;
    activeTabHistory = [];
    messages.replaceChildren();
    editor.replaceChildren();
    document.body.classList.remove('submitted');
    setComposerState(false);
    renderTabs();
  }

  function ensureTabForOpen() {
    if (tabs.length > 0) {
      renderActiveTab();
      editor.focus();
      return;
    }

    const tab = createTab(nextTabId++);
    tabs.push(tab);
    activeTabId = tab.id;
    activeTabHistory = [tab.id];
    renderActiveTab();
    editor.focus();
  }

  function submitChat() {
    const tab = activeTab();
    if (respondingTurn(tab)) return;

    const text = editorText();
    if (!text.trim()) return;

    const html = editor.innerHTML;
    setChatTitleFromPrompt(tab, text);
    tab.draft = '';
    editor.replaceChildren();

    const turn = createTurn(text, html);
    tab.turns.push(turn);
    startTurnResponse(tab, turn);
  }

  function cleanupOrphanedTooltips() {
    for (const tooltip of document.querySelectorAll('.mentionTooltip')) {
      const owner = [...document.querySelectorAll('.editor .mention')].find(span => span._tooltip === tooltip);
      if (!owner) tooltip.remove();
    }
  }

  function attachComposerEditor(editorEl, onSubmit) {
    editorEl.addEventListener('focus', () => { activeEditor = editorEl; });
    editorEl.addEventListener('input', () => {
      cleanupOrphanedTooltips();
      persistActiveEditor();
      const mentionMatch = findMentionQuery();
      if (mentionMatch) { openMentionMenu(mentionMatch.query); closeCommandMenu(); }
      else {
        closeMentionMenu();
        const commandMatch = findCommandQuery();
        if (commandMatch) openCommandMenu(commandMatch.query);
        else closeCommandMenu();
      }
    });
    editorEl.addEventListener('keydown', (event) => {
      const menuOpen = mentionMenu.style.display === 'block';
      const commandMenuOpen = commandMenu.style.display === 'block';
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        if (menuOpen) {
          const highlighted = mentionMenu.querySelector('.mentionItem.highlighted');
          if (highlighted) selectMention(highlighted.dataset.path);
          return;
        }
        if (commandMenuOpen) {
          const highlighted = commandMenu.querySelector('.commandItem.highlighted');
          if (highlighted) selectCommand(highlighted.dataset.title);
          return;
        }
        onSubmit();
      } else if (event.key === 'Escape') {
        if (menuOpen) closeMentionMenu();
        if (commandMenuOpen) closeCommandMenu();
      }
    });
  }

  attachComposerEditor(editor, submitChat);

  tabsEl.addEventListener('scroll', updateTabScrollbar);
  tabsEl.addEventListener('wheel', event => {
    if (tabsEl.scrollWidth <= tabsEl.clientWidth) return;
    event.preventDefault();
    tabsEl.scrollLeft += event.deltaX || event.deltaY;
  }, { passive: false });
  tabScrollbarThumb.addEventListener('mousedown', event => {
    event.preventDefault();
    const maxScroll = tabsEl.scrollWidth - tabsEl.clientWidth;
    const thumbWidth = tabScrollbarThumb.getBoundingClientRect().width;
    const maxThumbLeft = tabsEl.clientWidth - thumbWidth;
    if (maxScroll <= 0 || maxThumbLeft <= 0) return;
    const startX = event.clientX;
    const startScrollLeft = tabsEl.scrollLeft;
    const move = moveEvent => {
      tabsEl.scrollLeft = startScrollLeft + (moveEvent.clientX - startX) * maxScroll / maxThumbLeft;
    };
    const up = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      document.body.style.userSelect = '';
    };
    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
  addEventListener('resize', updateTabScrollbar);
  addEventListener('message', event => {
    const message = event.data;
    if (!message || typeof message !== 'object') return;
    if (message.type === 'right:open') ensureTabForOpen();
    else if (message.type === 'right:reset') resetWorkspace();
    else if (message.type === 'canvas:tabs') openTabNames = message.names || [];
    else if (message.type === 'vfs:files') workspaceFiles = message.files || [];
    else if (message.type === 'vfs:content') {
      const list = pendingReads.get(message.name);
      if (list) {
        pendingReads.delete(message.name);
        for (const resolve of list) resolve(message.content ?? '');
      }
    }
    else if (message.type === 'commands:files') setCommandsFromVfs(message.files);
    else if (message.type === 'settings:theme') themeVariant = message.value === 'light' ? 'light' : 'dark';
  });

  sendButton.addEventListener('click', () => {
    const tab = activeTab();
    const turn = respondingTurn(tab);
    if (turn) {
      completeResponse(tab, turn);
      return;
    }

    submitChat();
  });

  function openHistoryChat(entry) {
    closeHistoryMenu();
    const existing = tabs.find(tab => tab.id === entry.id);
    if (existing) {
      switchTab(existing.id);
      return;
    }
    saveActiveDraft();
    const tab = createTab(entry.id);
    tab.title = entry.title;
    tab.draft = entry.draft || '';
    tab.turns = entry.turns || [];
    for (const turn of tab.turns) {
      clearTurnTimers(turn);
      turn.responding = false;
    }
    tabs.push(tab);
    activeTabId = tab.id;
    activeTabHistory = activeTabHistory.filter(tabId => tabId !== tab.id);
    activeTabHistory.push(tab.id);
    renderActiveTab();
  }

  function closeHistoryMenu() {
    historyMenu.style.display = 'none';
    historyMenu.replaceChildren();
  }

  function openHistoryMenu() {
    if (chatHistory.length === 0) return;
    historyMenu.replaceChildren(...chatHistory.map((entry, index) => {
      const item = document.createElement('div');
      item.className = index === 0 ? 'historyItem highlighted' : 'historyItem';
      item.addEventListener('mouseenter', () => {
        for (const other of historyMenu.children) other.classList.remove('highlighted');
        item.classList.add('highlighted');
      });
      item.addEventListener('mousedown', event => {
        event.preventDefault();
        openHistoryChat(entry);
      });
      const titleEl = document.createElement('span');
      titleEl.className = 'historyTitle';
      titleEl.textContent = entry.title;
      item.append(titleEl);
      return item;
    }));

    historyMenu.style.display = 'block';
    const rect = clockControl.getBoundingClientRect();
    historyMenu.style.left = (rect.left - historyMenu.offsetWidth) + 'px';
    historyMenu.style.top = rect.bottom + 'px';
  }

  clockControl.addEventListener('click', event => {
    event.stopPropagation();
    if (historyMenu.style.display === 'block') closeHistoryMenu();
    else openHistoryMenu();
  });
  document.addEventListener('mousedown', event => {
    if (historyMenu.style.display !== 'block') return;
    if (historyMenu.contains(event.target) || clockControl.contains(event.target)) return;
    closeHistoryMenu();
  });
  historyMenu.addEventListener('keydown', () => {});
  document.addEventListener('keydown', event => {
    if (historyMenu.style.display !== 'block') return;
    if (event.key === 'Enter') {
      event.preventDefault();
      const highlighted = historyMenu.querySelector('.historyItem.highlighted');
      if (highlighted) highlighted.dispatchEvent(new MouseEvent('mousedown'));
    } else if (event.key === 'Escape') {
      closeHistoryMenu();
    }
  });

  document.querySelector('.addControl').addEventListener('click', addTab);
  renderActiveTab();
  parent.postMessage({ type: 'canvas:tabs:request' }, '*');
  parent.postMessage({ type: 'vfs:list' }, '*');
</script>
