<!doctype html>
<title>Canvas</title>
<style>
  html, body { margin: 0; height: 100%; }
  body { background: var(--editor-background); color: var(--editor-foreground); font: 13px ui-monospace, monospace; }
  pre { margin: 0; padding: 12px; white-space: pre-wrap; }
</style>
<pre id="view"></pre>
<script>
  addEventListener('message', e => {
    if (e.data?.type === 'vfs:opened') document.getElementById('view').textContent = e.data.content;
  });
</script>
