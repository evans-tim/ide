<script type="module">
  import { prepare, layout } from '/node_modules/@chenglou/pretext/dist/layout.js';
  const FONT = '13px Menlo, Monaco, "Courier New", monospace';
  const LINE_HEIGHT = layout(prepare('M', FONT), 10000, 18).height;
  let lines = [''];
  let cur = { line: 0, col: 0 };
  let fileTabs = [];
  let settingsTabOpen = false;
  let activeTabName = null;
  let activeFileName = null;
  let activeTabHistory = [];
  const SETTINGS_TAB_NAME = '__settings__';
  const tabsEl = document.querySelector('.tabs');
  const tabArea = document.querySelector('.tabArea');
  const tabScrollbarThumb = document.querySelector('.tabScrollbarThumb');
  const settingsFrame = document.getElementById('settingsFrame');
  const view = document.getElementById('view');
  const gutter = document.getElementById('gutter');
  const scroller = document.getElementById('scroller');
  const gutterHighlight = document.getElementById('gutter-highlight');
  const settings = {
    'editor.wordSeparators': " `~!@#$%^&*()-=+[{]}\\|;:'\",.<>/?"
  };
  let sel = null;
  let lastPointerDown = null;

  function positionGutterHighlight() {
    const line = view.querySelector('.line.active');
    if (!line) {
      gutterHighlight.style.display = 'none';
      return;
    }
    const lr = line.getBoundingClientRect();
    const sr = scroller.getBoundingClientRect();
    const gutterW = sr.right - sr.left - scroller.clientWidth;
    if (gutterW <= 0) {
      gutterHighlight.style.display = 'none';
      return;
    }
    gutterHighlight.style.display = 'block';
    gutterHighlight.style.top = lr.top + 'px';
    gutterHighlight.style.left = (sr.left + scroller.clientWidth) + 'px';
    gutterHighlight.style.width = gutterW + 'px';
    gutterHighlight.style.height = LINE_HEIGHT + 'px';
  }

  function updateTopShadow() {
    document.body.classList.toggle('scrolled', scroller.scrollTop > 0);
  }

  function updateScrollPast() {
    const pad = Math.max(0, scroller.clientHeight - LINE_HEIGHT);
    view.style.paddingBottom = pad + 'px';
    gutter.style.paddingBottom = pad + 'px';
  }
  addEventListener('resize', () => { updateScrollPast(); positionGutterHighlight(); updateTopShadow(); });
  scroller.addEventListener('scroll', () => { positionGutterHighlight(); updateTopShadow(); });
  scroller.addEventListener('wheel', e => {
    e.preventDefault();
    scroller.scrollTop += e.deltaY;
  }, { passive: false });
  updateScrollPast();
  updateTopShadow();

  function render() {
    const range = selectionRange();
    gutter.textContent = lines.map((_, i) => i + 1).join('\n');
    view.innerHTML = '';
    lines.forEach((text, i) => {
      const div = document.createElement('div');
      div.className = 'line' + (!range && i === cur.line ? ' active' : '');
      div.dataset.line = i;
      appendLine(div, text, i, range);
      view.appendChild(div);
    });
    positionGutterHighlight();
  }

  function samePos(a, b) {
    return a.line === b.line && a.col === b.col;
  }

  function posBefore(a, b) {
    return a.line < b.line || (a.line === b.line && a.col < b.col);
  }

  function selectionRange() {
    if (!sel || samePos(sel.anchor, sel.head)) return null;
    return posBefore(sel.anchor, sel.head)
      ? { start: sel.anchor, end: sel.head }
      : { start: sel.head, end: sel.anchor };
  }

  function appendLine(div, text, lineIndex, range) {
    const startCol = range && lineIndex >= range.start.line && lineIndex <= range.end.line
      ? (lineIndex === range.start.line ? range.start.col : 0)
      : null;
    const endCol = startCol === null
      ? null
      : (lineIndex === range.end.line ? range.end.col : text.length);
    const boundaries = [0, text.length, cur.line === lineIndex ? cur.col : null, startCol, endCol]
      .filter(v => v !== null)
      .sort((a, b) => a - b);
    const unique = [...new Set(boundaries)];
    if (cur.line === lineIndex && cur.col === 0) appendCaret(div, text, 0);
    for (let j = 0; j < unique.length - 1; j++) {
      const from = unique[j];
      const to = unique[j + 1];
      if (to > from) appendText(div, text.slice(from, to), startCol !== null && from >= startCol && to <= endCol);
      if (cur.line === lineIndex && cur.col === to) appendCaret(div, text, to);
    }
    if (!text && !(cur.line === lineIndex && cur.col === 0)) div.textContent = '\u200b';
  }

  function appendText(parent, text, selected) {
    if (!selected) {
      parent.appendChild(document.createTextNode(text));
      return;
    }
    const span = document.createElement('span');
    span.className = 'selection';
    span.textContent = text;
    parent.appendChild(span);
  }

  function textWidth(text) {
    if (!text) return 0;
    return layout(prepare(text, FONT), 10000, LINE_HEIGHT).width;
  }

  function appendCaret(parent, text, col) {
    const caret = document.createElement('span');
    caret.className = 'cursor';
    const ratio = window.devicePixelRatio || 1;
    caret.style.left = Math.round(textWidth(text.slice(0, col)) * ratio) / ratio + 'px';
    caret.style.width = 1 / ratio + 'px';
    parent.appendChild(caret);
  }

  function setFromContent(content) {
    lines = content.split('\n');
    cur = { line: 0, col: 0 };
    sel = null;
    render();
  }

  function activeFileTab() {
    return fileTabs.find(tab => tab.name === activeFileName);
  }

  function activeEditableFileTab() {
    return activeTabName === SETTINGS_TAB_NAME ? null : fileTabs.find(tab => tab.name === activeTabName);
  }

  function baseName(path) {
    return path.split('/').pop();
  }

  function parentDirName(path) {
    const parts = path.split('/');
    return parts.length > 1 ? parts[parts.length - 2] : '';
  }

  function fileIconClassFor(path) {
    const name = baseName(path);
    const ext = name.slice(name.lastIndexOf('.')).toLowerCase();
    if (ext === '.txt' || ext === '.md') return 'textFileIcon';
    if (ext === '.js') return 'jsFileIcon';
    return 'unknownFileIcon';
  }

  function saveActiveFileContent() {
    const tab = activeEditableFileTab();
    if (tab) tab.content = lines.join('\n');
  }

  function markFileActive(name) {
    activeFileName = name;
    markTabActive(name);
  }

  function markTabActive(name) {
    activeTabName = name;
    activeTabHistory = activeTabHistory.filter(tabName => tabName !== name);
    activeTabHistory.push(name);
  }

  function notifyActiveFileSelected() {
    if (activeFileName) parent.postMessage({ type: 'vfs:select', name: activeFileName }, '*');
  }

  function renderTabs() {
    const counts = new Map();
    for (const tab of fileTabs) {
      const name = baseName(tab.name);
      counts.set(name, (counts.get(name) || 0) + 1);
    }

    const allTabs = settingsTabOpen
      ? [...fileTabs, { name: SETTINGS_TAB_NAME, settings: true }]
      : fileTabs;
    tabsEl.replaceChildren(...allTabs.map(tab => {
      const tabEl = document.createElement('div');
      tabEl.className = tab.name === activeTabName ? 'tab active' : 'tab';

      const icon = document.createElement('span');
      icon.className = `iconMask tabIcon ${tab.settings ? 'settingsTabIcon' : fileIconClassFor(tab.name)}`;
      icon.setAttribute('aria-hidden', 'true');

      const title = document.createElement('span');
      title.className = 'tabTitle';
      const name = document.createElement('span');
      name.textContent = tab.settings ? 'Settings' : baseName(tab.name);
      title.append(name);

      if (!tab.settings && counts.get(baseName(tab.name)) > 1) {
        const dir = document.createElement('span');
        dir.className = 'tabDir';
        dir.textContent = ' ' + parentDirName(tab.name);
        title.append(dir);
      }

      const close = document.createElement('button');
      close.className = 'topbarControl closeControl';
      close.type = 'button';
      close.setAttribute('aria-label', 'Close');
      close.innerHTML = '<span class="iconMask closeIcon" aria-hidden="true"></span>';

      tabEl.append(icon, title, close);
      tabEl.addEventListener('click', () => switchTab(tab.name));
      close.addEventListener('click', event => {
        event.stopPropagation();
        closeTab(tab.name);
      });
      return tabEl;
    }));

    requestAnimationFrame(() => {
      updateTabScrollbar();
      const activeTabEl = tabsEl.querySelector('.tab.active');
      if (activeTabEl) activeTabEl.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    });
  }

  function updateTabScrollbar() {
    const maxScroll = tabsEl.scrollWidth - tabsEl.clientWidth;
    const hasOverflow = maxScroll > 0;
    tabArea.classList.toggle('hasOverflow', hasOverflow);
    if (!hasOverflow) return;
    const thumbWidth = Math.max(16, tabsEl.clientWidth * tabsEl.clientWidth / tabsEl.scrollWidth);
    const thumbLeft = tabsEl.scrollLeft * (tabsEl.clientWidth - thumbWidth) / maxScroll;
    tabScrollbarThumb.style.width = thumbWidth + 'px';
    tabScrollbarThumb.style.transform = `translateX(${thumbLeft}px)`;
  }

  function renderBlankCanvas() {
    activeTabName = null;
    activeFileName = null;
    document.body.classList.add('empty');
    document.body.classList.remove('settings');
    document.body.classList.remove('scrolled');
    lines = [''];
    cur = { line: 0, col: 0 };
    sel = null;
    gutter.textContent = '';
    view.replaceChildren();
    renderTabs();
  }

  function resetWorkspace() {
    saveActiveFileContent();
    fileTabs = [];
    settingsTabOpen = false;
    activeTabHistory = [];
    renderBlankCanvas();
    parent.postMessage({ type: 'vfs:select', name: null }, '*');
  }

  function renderActiveFile() {
    if (activeTabName === SETTINGS_TAB_NAME) {
      document.body.classList.remove('empty');
      document.body.classList.add('settings');
      document.body.classList.remove('scrolled');
      renderTabs();
      return;
    }

    const tab = activeEditableFileTab();
    if (!tab) {
      renderBlankCanvas();
      return;
    }

    document.body.classList.remove('empty');
    document.body.classList.remove('settings');
    setFromContent(tab.content);
    renderTabs();
    notifyActiveFileSelected();
  }

  function openFileTab(name, content) {
    saveActiveFileContent();

    let tab = fileTabs.find(fileTab => fileTab.name === name);
    if (tab && name === activeTabName) {
      renderTabs();
      notifyActiveFileSelected();
      return;
    }

    if (!tab) {
      tab = { name, content };
      const activeIndex = fileTabs.findIndex(fileTab => fileTab.name === activeTabName);
      fileTabs.splice(activeIndex >= 0 ? activeIndex + 1 : 0, 0, tab);
    }

    markFileActive(name);
    renderActiveFile();
  }

  function openSettingsTab() {
    if (settingsTabOpen && activeTabName === SETTINGS_TAB_NAME) return;
    saveActiveFileContent();
    settingsTabOpen = true;
    markTabActive(SETTINGS_TAB_NAME);
    renderActiveFile();
  }

  function switchTab(name) {
    if (name === activeTabName) return;
    saveActiveFileContent();
    if (name === SETTINGS_TAB_NAME) markTabActive(name);
    else markFileActive(name);
    renderActiveFile();
  }

  function closeTab(name) {
    saveActiveFileContent();
    if (name === SETTINGS_TAB_NAME) {
      if (!settingsTabOpen) return;
      settingsTabOpen = false;
    } else {
      const index = fileTabs.findIndex(tab => tab.name === name);
      if (index === -1) return;
      fileTabs.splice(index, 1);
      if (name === activeFileName) {
        activeFileName = null;
        parent.postMessage({ type: 'vfs:select', name: null }, '*');
      }
    }

    activeTabHistory = activeTabHistory.filter(tabName => tabName !== name);
    const remainingTabNames = [
      ...fileTabs.map(tab => tab.name),
      ...(settingsTabOpen ? [SETTINGS_TAB_NAME] : [])
    ];

    if (remainingTabNames.length === 0) {
      activeTabHistory = [];
      renderBlankCanvas();
      parent.postMessage({ type: 'vfs:select', name: null }, '*');
      return;
    }

    if (name === activeTabName) {
      const next = [...activeTabHistory].reverse().find(tabName => remainingTabNames.includes(tabName)) || remainingTabNames[remainingTabNames.length - 1];
      if (next === SETTINGS_TAB_NAME) markTabActive(next);
      else markFileActive(next);
    }

    renderActiveFile();
  }

  function positionFromEvent(e, mode = 'caret') {
    const padTop = parseFloat(getComputedStyle(view).paddingTop) || 0;
    const viewRect = view.getBoundingClientRect();
    const lineIndex = Math.max(0, Math.min(lines.length - 1, Math.floor((e.clientY - viewRect.top - padTop) / LINE_HEIGHT)));
    let lineEl = view.querySelector(`[data-line="${lineIndex}"]`);
    if (!lineEl) {
      const last = view.lastElementChild;
      if (!last) return null;
      return { line: lines.length - 1, col: lines[lines.length - 1].length };
    }
    const li = +lineEl.dataset.line;
    const text = lines[li];
    const rect = lineEl.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const measure = document.createElement('span');
    measure.style.font = getComputedStyle(view).font;
    measure.style.visibility = 'hidden';
    measure.style.position = 'absolute';
    measure.style.whiteSpace = 'pre';
    document.body.appendChild(measure);
    if (mode === 'character') {
      let col = Math.max(0, text.length - 1);
      for (let i = 0; i < text.length; i++) {
        measure.textContent = text.slice(0, i + 1);
        if (measure.offsetWidth > x) { col = i; break; }
      }
      document.body.removeChild(measure);
      return { line: li, col };
    }
    let col = text.length;
    let left = 0;
    for (let i = 0; i < text.length; i++) {
      measure.textContent = text.slice(0, i + 1);
      const right = measure.offsetWidth;
      if (x < left + (right - left) / 2) { col = i; break; }
      left = right;
    }
    document.body.removeChild(measure);
    return { line: li, col };
  }

  function wordRangeAt(pos) {
    const text = lines[pos.line];
    const separators = new Set(settings['editor.wordSeparators']);
    let index = pos.col < text.length ? pos.col : pos.col - 1;
    if (index < 0) return null;
    const isSeparator = separators.has(text[index]);
    if (isSeparator) return { start: { line: pos.line, col: index }, end: { line: pos.line, col: index + 1 } };
    let start = index;
    let end = index + 1;
    while (start > 0 && !separators.has(text[start - 1])) start--;
    while (end < text.length && !separators.has(text[end])) end++;
    return { start: { line: pos.line, col: start }, end: { line: pos.line, col: end } };
  }

  function wordSelectionFrom(root, hover) {
    if (posBefore(hover.end, root.start) || samePos(hover.end, root.start)) {
      return { anchor: root.end, head: hover.start };
    }
    if (posBefore(root.start, hover.start) || samePos(root.start, hover.start)) {
      return { anchor: root.start, head: hover.end };
    }
    return { anchor: root.start, head: root.end };
  }

  function deleteSelection() {
    const range = selectionRange();
    if (!range) return false;
    const before = lines[range.start.line].slice(0, range.start.col);
    const after = lines[range.end.line].slice(range.end.col);
    lines.splice(range.start.line, range.end.line - range.start.line + 1, before + after);
    cur = { ...range.start };
    sel = null;
    return true;
  }

  function selectedText() {
    const range = selectionRange();
    if (!range) return '';
    if (range.start.line === range.end.line) {
      return lines[range.start.line].slice(range.start.col, range.end.col);
    }
    return [
      lines[range.start.line].slice(range.start.col),
      ...lines.slice(range.start.line + 1, range.end.line),
      lines[range.end.line].slice(0, range.end.col)
    ].join('\n');
  }

  function insertText(text) {
    deleteSelection();
    const parts = text.split('\n');
    const line = lines[cur.line];
    const before = line.slice(0, cur.col);
    const after = line.slice(cur.col);
    if (parts.length === 1) {
      lines[cur.line] = before + parts[0] + after;
      cur.col += parts[0].length;
      return;
    }
    const inserted = [before + parts[0], ...parts.slice(1, -1), parts.at(-1) + after];
    lines.splice(cur.line, 1, ...inserted);
    cur = { line: cur.line + parts.length - 1, col: parts.at(-1).length };
  }

  function closestTarget(target, selector) {
    return target instanceof Element
      ? target.closest(selector)
      : target.parentElement?.closest(selector);
  }

  function isRepeatedPointerDown(e) {
    if (!lastPointerDown) return false;
    const elapsed = e.timeStamp - lastPointerDown.time;
    const distance = Math.hypot(e.clientX - lastPointerDown.x, e.clientY - lastPointerDown.y);
    return elapsed < 300 && distance < 6;
  }

  addEventListener('message', e => {
    if (e.data?.type === 'vfs:opened') openFileTab(e.data.name, e.data.content);
    else if (e.data?.type === 'vfs:reset') resetWorkspace();
    else if (e.data?.type === 'settings:open') openSettingsTab();
    else if (e.data?.type === 'settings:theme') {
      if (e.source === settingsFrame.contentWindow) parent.postMessage(e.data, '*');
      else settingsFrame.contentWindow.postMessage(e.data, '*');
    } else if (e.data?.type === 'settings:directory') {
      if (e.source === settingsFrame.contentWindow) parent.postMessage(e.data, '*');
      else settingsFrame.contentWindow.postMessage(e.data, '*');
    } else if (e.data?.type === 'settings:ready') {
      parent.postMessage(e.data, '*');
    }
  });

  document.addEventListener('pointerdown', e => {
    if (closestTarget(e.target, '.topbar')) return;
    if (document.body.classList.contains('empty')) return;
    if (closestTarget(e.target, '.gutter')) return;
    const start = positionFromEvent(e);
    if (!start) return;
    const repeatedPointerDown = isRepeatedPointerDown(e);
    lastPointerDown = { time: e.timeStamp, x: e.clientX, y: e.clientY };
    if (repeatedPointerDown) {
      const range = wordRangeAt(positionFromEvent(e, 'character'));
      if (range) {
        cur = range.end;
        sel = { anchor: range.start, head: range.end };
        render();
        view.focus();
        view.setPointerCapture(e.pointerId);
        const onMove = moveEvent => {
          const pos = positionFromEvent(moveEvent, 'character');
          if (!pos) return;
          const hover = wordRangeAt(pos);
          if (!hover) return;
          sel = wordSelectionFrom(range, hover);
          cur = sel.head;
          render();
        };
        const onUp = upEvent => {
          view.releasePointerCapture(upEvent.pointerId);
          view.removeEventListener('pointermove', onMove);
          view.removeEventListener('pointerup', onUp);
          view.removeEventListener('pointercancel', onUp);
          render();
        };
        view.addEventListener('pointermove', onMove);
        view.addEventListener('pointerup', onUp);
        view.addEventListener('pointercancel', onUp);
        e.preventDefault();
      }
      return;
    }
    view.setPointerCapture(e.pointerId);
    cur = start;
    sel = null;
    render();
    view.focus();
    const onMove = moveEvent => {
      const pos = positionFromEvent(moveEvent);
      if (!pos) return;
      cur = pos;
      sel = { anchor: start, head: pos };
      render();
    };
    const onUp = upEvent => {
      view.releasePointerCapture(upEvent.pointerId);
      view.removeEventListener('pointermove', onMove);
      view.removeEventListener('pointerup', onUp);
      view.removeEventListener('pointercancel', onUp);
      if (!selectionRange()) sel = null;
      render();
    };
    view.addEventListener('pointermove', onMove);
    view.addEventListener('pointerup', onUp);
    view.addEventListener('pointercancel', onUp);
    e.preventDefault();
  });

  document.addEventListener('dblclick', e => {
    if (closestTarget(e.target, '.topbar')) return;
    if (document.body.classList.contains('empty')) return;
    if (closestTarget(e.target, '.gutter')) return;
    const pos = positionFromEvent(e, 'character');
    if (!pos) return;
    const range = wordRangeAt(pos);
    if (!range) return;
    cur = range.end;
    sel = { anchor: range.start, head: range.end };
    render();
    view.focus();
    e.preventDefault();
  });

  view.addEventListener('keydown', async e => {
    if (document.body.classList.contains('empty')) return;
    if (e.metaKey && e.key.toLowerCase() === 'a') {
      const start = { line: 0, col: 0 };
      const end = { line: lines.length - 1, col: lines[lines.length - 1].length };
      cur = end;
      sel = { anchor: start, head: end };
      e.preventDefault();
    } else if (e.metaKey && e.key.toLowerCase() === 'c') {
      e.preventDefault();
      await navigator.clipboard.writeText(selectedText());
    } else if (e.metaKey && e.key.toLowerCase() === 'v') {
      e.preventDefault();
      insertText(await navigator.clipboard.readText());
    } else if (e.key === 'Enter') {
      deleteSelection();
      const text = lines[cur.line];
      lines.splice(cur.line, 1, text.slice(0, cur.col), text.slice(cur.col));
      cur = { line: cur.line + 1, col: 0 };
      e.preventDefault();
    } else if (e.key === 'Backspace') {
      if (deleteSelection()) {
      } else if (cur.col > 0) {
        const text = lines[cur.line];
        lines[cur.line] = text.slice(0, cur.col - 1) + text.slice(cur.col);
        cur.col--;
      } else if (cur.line > 0) {
        const prev = lines[cur.line - 1];
        const text = lines[cur.line];
        cur = { line: cur.line - 1, col: prev.length };
        lines.splice(cur.line, 2, prev + text);
      }
      e.preventDefault();
    } else if (e.key === 'Delete') {
      if (!deleteSelection()) {
        const text = lines[cur.line];
        if (cur.col < text.length) {
          lines[cur.line] = text.slice(0, cur.col) + text.slice(cur.col + 1);
        } else if (cur.line < lines.length - 1) {
          lines.splice(cur.line, 2, text + lines[cur.line + 1]);
        }
      }
      e.preventDefault();
    } else if (e.key === 'ArrowLeft') {
      if (sel && !e.shiftKey) {
        cur = selectionRange().start;
        sel = null;
      } else {
        const anchor = e.shiftKey && !sel ? { ...cur } : sel?.anchor;
      if (cur.col > 0) cur.col--;
      else if (cur.line > 0) { cur.line--; cur.col = lines[cur.line].length; }
        sel = e.shiftKey ? { anchor, head: { ...cur } } : null;
      }
      e.preventDefault();
    } else if (e.key === 'ArrowRight') {
      if (sel && !e.shiftKey) {
        cur = selectionRange().end;
        sel = null;
      } else {
        const anchor = e.shiftKey && !sel ? { ...cur } : sel?.anchor;
      if (cur.col < lines[cur.line].length) cur.col++;
      else if (cur.line < lines.length - 1) { cur.line++; cur.col = 0; }
        sel = e.shiftKey ? { anchor, head: { ...cur } } : null;
      }
      e.preventDefault();
    } else if (e.key === 'ArrowUp') {
      const anchor = e.shiftKey && !sel ? { ...cur } : sel?.anchor;
      if (cur.line > 0) { cur.line--; cur.col = Math.min(cur.col, lines[cur.line].length); }
      sel = e.shiftKey ? { anchor, head: { ...cur } } : null;
      e.preventDefault();
    } else if (e.key === 'ArrowDown') {
      const anchor = e.shiftKey && !sel ? { ...cur } : sel?.anchor;
      if (cur.line < lines.length - 1) { cur.line++; cur.col = Math.min(cur.col, lines[cur.line].length); }
      sel = e.shiftKey ? { anchor, head: { ...cur } } : null;
      e.preventDefault();
    } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
      deleteSelection();
      const text = lines[cur.line];
      lines[cur.line] = text.slice(0, cur.col) + e.key + text.slice(cur.col);
      cur.col++;
      e.preventDefault();
    } else {
      return;
    }
    render();
  });

  const setFocused = v => document.body.classList.toggle('focused', v);
  view.addEventListener('focus', () => {
    setFocused(true);
    notifyActiveFileSelected();
  });
  view.addEventListener('blur', () => setFocused(false));
  setFocused(document.hasFocus());

  tabsEl.addEventListener('scroll', updateTabScrollbar);
  tabsEl.addEventListener('wheel', event => {
    if (tabsEl.scrollWidth <= tabsEl.clientWidth) return;
    event.preventDefault();
    tabsEl.scrollLeft += event.deltaX || event.deltaY;
  }, { passive: false });
  tabScrollbarThumb.addEventListener('mousedown', event => {
    event.preventDefault();
    const maxScroll = tabsEl.scrollWidth - tabsEl.clientWidth;
    const thumbWidth = tabScrollbarThumb.getBoundingClientRect().width;
    const maxThumbLeft = tabsEl.clientWidth - thumbWidth;
    if (maxScroll <= 0 || maxThumbLeft <= 0) return;
    const startX = event.clientX;
    const startScrollLeft = tabsEl.scrollLeft;
    const move = moveEvent => {
      tabsEl.scrollLeft = startScrollLeft + (moveEvent.clientX - startX) * maxScroll / maxThumbLeft;
    };
    const up = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      document.body.style.userSelect = '';
    };
    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
  addEventListener('resize', updateTabScrollbar);

  renderBlankCanvas();
</script>
