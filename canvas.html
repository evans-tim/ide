      name.textContent = tab.settings ? 'Settings' : baseName(tab.name);
      title.append(name);

      if (!tab.settings && counts.get(baseName(tab.name)) > 1) {
        const dir = document.createElement('span');
        dir.className = 'tabDir';
        dir.textContent = ' ' + parentDirName(tab.name);
        title.append(dir);
      }

      const close = document.createElement('button');
      close.className = 'topbarControl closeControl';
      close.type = 'button';
      close.setAttribute('aria-label', 'Close');
      close.innerHTML = '<span class="iconMask closeIcon" aria-hidden="true"></span><span class="dirtyDot" aria-hidden="true"></span>';

      tabEl.append(icon, title, close);
      tabEl.addEventListener('click', () => switchTab(tab.name));
      close.addEventListener('click', event => {
        event.stopPropagation();
        requestTabClose(tab.name);
      });
      return tabEl;
    }));

    renderBreadcrumb();

    requestAnimationFrame(() => {
      updateTabScrollbar();
      const activeTabEl = tabsEl.querySelector('.tab.active');
      if (activeTabEl) activeTabEl.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    });
  }

  function renderBreadcrumb() {
    const tab = activeEditableFileTab();
    breadcrumbEl.replaceChildren();
    breadcrumbButtonsEl.replaceChildren();
    if (!tab) return;

    const parts = tab.name.split('/');
    parts.slice(0, -1).forEach(dir => {
      const crumb = document.createElement('span');
      crumb.className = 'crumb';
      crumb.textContent = dir;
      breadcrumbEl.append(crumb);
      const chevron = document.createElement('span');
      chevron.className = 'iconMask chevron';
      chevron.setAttribute('aria-hidden', 'true');
      breadcrumbEl.append(chevron);
    });

    const icon = document.createElement('span');
    icon.className = 'fileIcon';
    icon.setAttribute('aria-hidden', 'true');
    const glyph = fileIconFor(tab.name);
    icon.textContent = glyph.char;
    icon.style.color = glyph.color;
    const name = document.createElement('span');
    name.className = 'crumb fileName';
    name.textContent = baseName(tab.name);
    breadcrumbEl.append(icon, name);

    if (baseName(tab.name).toLowerCase().endsWith('.md')) {
      const mode = tab.mdView || 'markdown';
      for (const view of ['preview', 'markdown']) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'topbarTab' + (mode === view ? ' active' : '');
        btn.textContent = view === 'preview' ? 'Preview' : 'Markdown';
        btn.addEventListener('click', () => {
          if (tab.mdView === view) return;
          tab.mdView = view;
          applyMdView();
          renderBreadcrumb();
        });
        breadcrumbButtonsEl.append(btn);
      }
    }
  }

  function applyMdView() {
    const tab = activeEditableFileTab();
    const preview = !!tab && (tab.mdView === 'preview') && baseName(tab.name).toLowerCase().endsWith('.md');
    document.body.classList.toggle('preview', preview);
    if (preview) {
      tab.content = lines.join('\n');
      markdownEl.innerHTML = renderMarkdown(tab.content);
      previewScroller.scrollTop = 0;
      updateTopShadow();
    }
  }

  function updateTabScrollbar() {
    const maxScroll = tabsEl.scrollWidth - tabsEl.clientWidth;
    const hasOverflow = maxScroll > 0;
    tabArea.classList.toggle('hasOverflow', hasOverflow);
    if (!hasOverflow) return;
    const thumbWidth = Math.max(16, tabsEl.clientWidth * tabsEl.clientWidth / tabsEl.scrollWidth);
    const thumbLeft = tabsEl.scrollLeft * (tabsEl.clientWidth - thumbWidth) / maxScroll;
    tabScrollbarThumb.style.width = thumbWidth + 'px';
    tabScrollbarThumb.style.transform = `translateX(${thumbLeft}px)`;
  }

  function renderBlankCanvas() {
    activeTabName = null;
    activeFileName = null;
    document.body.classList.add('empty');
    document.body.classList.remove('settings');
    document.body.classList.remove('preview');
    document.body.classList.remove('scrolled');
    lines = [''];
    cur = { line: 0, col: 0 };
    sel = null;
    gutter.textContent = '';
    view.replaceChildren();
    renderTabs();
  }

  function resetWorkspace() {
    saveActiveFileContent();
    fileTabs = [];
    settingsTabOpen = false;
    activeTabHistory = [];
    renderBlankCanvas();
    parent.postMessage({ type: 'vfs:select', name: null }, '*');
  }

  function renderActiveFile() {
    if (activeTabName === SETTINGS_TAB_NAME) {
      document.body.classList.remove('empty');
      document.body.classList.add('settings');
      document.body.classList.remove('preview');
      document.body.classList.remove('scrolled');
      renderTabs();
      return;
    }

    const tab = activeEditableFileTab();
    if (!tab) {
      renderBlankCanvas();
      return;
    }

    document.body.classList.remove('empty');
    document.body.classList.remove('settings');
    setFromContent(tab.content);
    renderTabs();
    applyMdView();
    notifyActiveFileSelected();
  }

  function openFileTab(name, content) {
    saveActiveFileContent();

    let tab = fileTabs.find(fileTab => fileTab.name === name);
    if (tab && name === activeTabName) {
      renderTabs();
      notifyActiveFileSelected();
      return;
    }

    if (!tab) {
      tab = { name, content, savedContent: content };
      const activeIndex = fileTabs.findIndex(fileTab => fileTab.name === activeTabName);
      fileTabs.splice(activeIndex >= 0 ? activeIndex + 1 : 0, 0, tab);
    }

    markFileActive(name);
    renderActiveFile();
  }

  function openSettingsTab() {
    if (settingsTabOpen && activeTabName === SETTINGS_TAB_NAME) return;
    saveActiveFileContent();
    settingsTabOpen = true;
    markTabActive(SETTINGS_TAB_NAME);
    renderActiveFile();
  }

  function switchTab(name) {
    if (name === activeTabName) return;
    saveActiveFileContent();
    if (name === SETTINGS_TAB_NAME) markTabActive(name);
    else markFileActive(name);
    renderActiveFile();
  }

  function closeTab(name) {
    saveActiveFileContent();
    if (name === SETTINGS_TAB_NAME) {
      if (!settingsTabOpen) return;
      settingsTabOpen = false;
    } else {
      const index = fileTabs.findIndex(tab => tab.name === name);
      if (index === -1) return;
      fileTabs.splice(index, 1);
      if (name === activeFileName) {
        activeFileName = null;
        parent.postMessage({ type: 'vfs:select', name: null }, '*');
      }
    }

    activeTabHistory = activeTabHistory.filter(tabName => tabName !== name);
    const remainingTabNames = [
      ...fileTabs.map(tab => tab.name),
      ...(settingsTabOpen ? [SETTINGS_TAB_NAME] : [])
    ];

    if (remainingTabNames.length === 0) {
      activeTabHistory = [];
      renderBlankCanvas();
      parent.postMessage({ type: 'vfs:select', name: null }, '*');
      return;
    }

    if (name === activeTabName) {
      const next = [...activeTabHistory].reverse().find(tabName => remainingTabNames.includes(tabName)) || remainingTabNames[remainingTabNames.length - 1];
      if (next === SETTINGS_TAB_NAME) markTabActive(next);
      else markFileActive(next);
    }

    renderActiveFile();
  }

  const confirmOverlay = document.getElementById('confirmOverlay');
  const confirmTitle = document.getElementById('confirmTitle');

  function requestTabClose(name) {
    const tab = fileTabs.find(fileTab => fileTab.name === name);
    if (!tab || !isDirty(tab)) {
      closeTab(name);
      return;
    }
    confirmTitle.textContent = `Do you want to save the changes you made to ${baseName(tab.name)}?`;
    confirmOverlay.style.display = 'flex';
    const cleanup = () => {
      confirmOverlay.style.display = 'none';
      document.getElementById('confirmSave').onclick = null;
      document.getElementById('confirmDontSave').onclick = null;
      document.getElementById('confirmCancel').onclick = null;
    };
    document.getElementById('confirmSave').onclick = () => {
      cleanup();
      tab.savedContent = tab.content;
      parent.postMessage({ type: 'vfs:save', name: tab.name, content: tab.content }, '*');
      closeTab(name);
    };
    document.getElementById('confirmDontSave').onclick = () => {
      cleanup();
      tab.savedContent = tab.content;
      closeTab(name);
    };
    document.getElementById('confirmCancel').onclick = cleanup;
  }

  function positionFromEvent(e, mode = 'caret') {
    const padTop = parseFloat(getComputedStyle(view).paddingTop) || 0;
    const viewRect = view.getBoundingClientRect();
    const lineIndex = Math.max(0, Math.min(lines.length - 1, Math.floor((e.clientY - viewRect.top - padTop) / LINE_HEIGHT)));
    let lineEl = view.querySelector(`[data-line="${lineIndex}"]`);
    if (!lineEl) {
      const last = view.lastElementChild;
      if (!last) return null;
      return { line: lines.length - 1, col: lines[lines.length - 1].length };
    }
    const li = +lineEl.dataset.line;
    const text = lines[li];
    const rect = lineEl.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const measure = document.createElement('span');
    measure.style.font = getComputedStyle(view).font;
    measure.style.visibility = 'hidden';
    measure.style.position = 'absolute';
    measure.style.whiteSpace = 'pre';
    document.body.appendChild(measure);
    if (mode === 'character') {
      let col = Math.max(0, text.length - 1);
      for (let i = 0; i < text.length; i++) {
        measure.textContent = text.slice(0, i + 1);
        if (measure.offsetWidth > x) { col = i; break; }
      }
      document.body.removeChild(measure);
      return { line: li, col };
    }
    let col = text.length;
    let left = 0;
    for (let i = 0; i < text.length; i++) {
      measure.textContent = text.slice(0, i + 1);
      const right = measure.offsetWidth;
      if (x < left + (right - left) / 2) { col = i; break; }
      left = right;
    }
    document.body.removeChild(measure);
    return { line: li, col };
  }

  function wordRangeAt(pos) {
    const text = lines[pos.line];
    const separators = new Set(settings['editor.wordSeparators']);
    let index = pos.col < text.length ? pos.col : pos.col - 1;
    if (index < 0) return null;
    const isSeparator = separators.has(text[index]);
    if (isSeparator) return { start: { line: pos.line, col: index }, end: { line: pos.line, col: index + 1 } };
    let start = index;
    let end = index + 1;
    while (start > 0 && !separators.has(text[start - 1])) start--;
    while (end < text.length && !separators.has(text[end])) end++;
    return { start: { line: pos.line, col: start }, end: { line: pos.line, col: end } };
  }

  function wordSelectionFrom(root, hover) {
    if (posBefore(hover.end, root.start) || samePos(hover.end, root.start)) {
      return { anchor: root.end, head: hover.start };
    }
    if (posBefore(root.start, hover.start) || samePos(root.start, hover.start)) {
      return { anchor: root.start, head: hover.end };
    }
    return { anchor: root.start, head: root.end };
  }

  function deleteSelection() {
    const range = selectionRange();
    if (!range) return false;
    const before = lines[range.start.line].slice(0, range.start.col);
    const after = lines[range.end.line].slice(range.end.col);
    lines.splice(range.start.line, range.end.line - range.start.line + 1, before + after);
    cur = { ...range.start };
    sel = null;
    return true;
  }

  function selectedText() {
    const range = selectionRange();
    if (!range) return '';
    if (range.start.line === range.end.line) {
      return lines[range.start.line].slice(range.start.col, range.end.col);
    }
    return [
      lines[range.start.line].slice(range.start.col),
      ...lines.slice(range.start.line + 1, range.end.line),
      lines[range.end.line].slice(0, range.end.col)
    ].join('\n');
  }

  function insertText(text) {
    deleteSelection();
    const parts = text.split('\n');
    const line = lines[cur.line];
    const before = line.slice(0, cur.col);
    const after = line.slice(cur.col);
    if (parts.length === 1) {
      lines[cur.line] = before + parts[0] + after;
      cur.col += parts[0].length;
      return;
    }
    const inserted = [before + parts[0], ...parts.slice(1, -1), parts.at(-1) + after];
    lines.splice(cur.line, 1, ...inserted);
    cur = { line: cur.line + parts.length - 1, col: parts.at(-1).length };
  }

  function closestTarget(target, selector) {
    return target instanceof Element
      ? target.closest(selector)
      : target.parentElement?.closest(selector);
  }

  function isRepeatedPointerDown(e) {
    if (!lastPointerDown) return false;
    const elapsed = e.timeStamp - lastPointerDown.time;
    const distance = Math.hypot(e.clientX - lastPointerDown.x, e.clientY - lastPointerDown.y);
    return elapsed < 300 && distance < 6;
  }

  addEventListener('message', e => {
    if (e.data?.type === 'vfs:opened') openFileTab(e.data.name, e.data.content);
    else if (e.data?.type === 'vfs:reset') resetWorkspace();
    else if (e.data?.type === 'settings:open') openSettingsTab();
    else if (e.data?.type === 'settings:theme') {
      themeVariant = e.data.value === 'light' ? 'light' : 'dark';
      renderTabs();
      if (e.source === settingsFrame.contentWindow) parent.postMessage(e.data, '*');
      else settingsFrame.contentWindow.postMessage(e.data, '*');
    } else if (e.data?.type === 'settings:directory') {
      if (e.source === settingsFrame.contentWindow) parent.postMessage(e.data, '*');
      else settingsFrame.contentWindow.postMessage(e.data, '*');
    } else if (e.data?.type === 'settings:ready') {
      parent.postMessage(e.data, '*');
    }
  });

  document.addEventListener('pointerdown', e => {
    if (closestTarget(e.target, '#confirmOverlay')) return;
    if (confirmOverlay.style.display !== 'none') return;
    if (closestTarget(e.target, '.topbar')) return;
    if (closestTarget(e.target, '.breadcrumbBar')) return;
    if (document.body.classList.contains('empty')) return;
    if (closestTarget(e.target, '.gutter')) return;
    const start = positionFromEvent(e);
    if (!start) return;
    const repeatedPointerDown = isRepeatedPointerDown(e);
    lastPointerDown = { time: e.timeStamp, x: e.clientX, y: e.clientY };
    if (repeatedPointerDown) {
      const range = wordRangeAt(positionFromEvent(e, 'character'));
      if (range) {
        cur = range.end;
        sel = { anchor: range.start, head: range.end };
        render();
        view.focus();
        view.setPointerCapture(e.pointerId);
        const onMove = moveEvent => {
          const pos = positionFromEvent(moveEvent, 'character');
          if (!pos) return;
          const hover = wordRangeAt(pos);
          if (!hover) return;
          sel = wordSelectionFrom(range, hover);
          cur = sel.head;
          render();
        };
        const onUp = upEvent => {
          view.releasePointerCapture(upEvent.pointerId);
          view.removeEventListener('pointermove', onMove);
          view.removeEventListener('pointerup', onUp);
          view.removeEventListener('pointercancel', onUp);
          render();
        };
        view.addEventListener('pointermove', onMove);
        view.addEventListener('pointerup', onUp);
        view.addEventListener('pointercancel', onUp);
        e.preventDefault();
      }
      return;
    }
    view.setPointerCapture(e.pointerId);
    cur = start;
    sel = null;
    render();
    view.focus();
    const onMove = moveEvent => {
      const pos = positionFromEvent(moveEvent);
      if (!pos) return;
      cur = pos;
      sel = { anchor: start, head: pos };
      render();
    };
    const onUp = upEvent => {
      view.releasePointerCapture(upEvent.pointerId);
      view.removeEventListener('pointermove', onMove);
      view.removeEventListener('pointerup', onUp);
      view.removeEventListener('pointercancel', onUp);
      if (!selectionRange()) sel = null;
      render();
    };
    view.addEventListener('pointermove', onMove);
    view.addEventListener('pointerup', onUp);
    view.addEventListener('pointercancel', onUp);
    e.preventDefault();
  });

  document.addEventListener('dblclick', e => {
    if (closestTarget(e.target, '.topbar')) return;
    if (closestTarget(e.target, '.breadcrumbBar')) return;
    if (document.body.classList.contains('empty')) return;
    if (closestTarget(e.target, '.gutter')) return;
    const pos = positionFromEvent(e, 'character');
    if (!pos) return;
    const range = wordRangeAt(pos);
    if (!range) return;
    cur = range.end;
    sel = { anchor: range.start, head: range.end };
    render();
    view.focus();
    e.preventDefault();
  });

  view.addEventListener('keydown', async e => {
    if (document.body.classList.contains('empty')) return;
    if (e.metaKey && e.key.toLowerCase() === 's') {
      e.preventDefault();
      const tab = activeEditableFileTab();
      if (tab) persistTab(tab);
      return;
    }
    if (e.metaKey && e.key.toLowerCase() === 'a') {
      const start = { line: 0, col: 0 };
      const end = { line: lines.length - 1, col: lines[lines.length - 1].length };
      cur = end;
      sel = { anchor: start, head: end };
      e.preventDefault();
    } else if (e.metaKey && e.key.toLowerCase() === 'c') {
      e.preventDefault();
      await navigator.clipboard.writeText(selectedText());
    } else if (e.metaKey && e.key.toLowerCase() === 'v') {
      e.preventDefault();
      insertText(await navigator.clipboard.readText());
    } else if (e.key === 'Enter') {
      deleteSelection();
      const text = lines[cur.line];
      lines.splice(cur.line, 1, text.slice(0, cur.col), text.slice(cur.col));
      cur = { line: cur.line + 1, col: 0 };
      e.preventDefault();
    } else if (e.key === 'Backspace') {
      if (deleteSelection()) {
      } else if (cur.col > 0) {
        const text = lines[cur.line];
        lines[cur.line] = text.slice(0, cur.col - 1) + text.slice(cur.col);
        cur.col--;
      } else if (cur.line > 0) {
        const prev = lines[cur.line - 1];
        const text = lines[cur.line];
        cur = { line: cur.line - 1, col: prev.length };
        lines.splice(cur.line, 2, prev + text);
      }
      e.preventDefault();
    } else if (e.key === 'Delete') {
      if (!deleteSelection()) {
        const text = lines[cur.line];
        if (cur.col < text.length) {
          lines[cur.line] = text.slice(0, cur.col) + text.slice(cur.col + 1);
        } else if (cur.line < lines.length - 1) {
          lines.splice(cur.line, 2, text + lines[cur.line + 1]);
        }
      }
      e.preventDefault();
    } else if (e.key === 'ArrowLeft') {
      if (sel && !e.shiftKey) {
        cur = selectionRange().start;
        sel = null;
      } else {
        const anchor = e.shiftKey && !sel ? { ...cur } : sel?.anchor;
      if (cur.col > 0) cur.col--;
      else if (cur.line > 0) { cur.line--; cur.col = lines[cur.line].length; }
        sel = e.shiftKey ? { anchor, head: { ...cur } } : null;
      }
      e.preventDefault();
    } else if (e.key === 'ArrowRight') {
      if (sel && !e.shiftKey) {
        cur = selectionRange().end;
        sel = null;
      } else {
        const anchor = e.shiftKey && !sel ? { ...cur } : sel?.anchor;
      if (cur.col < lines[cur.line].length) cur.col++;
      else if (cur.line < lines.length - 1) { cur.line++; cur.col = 0; }
        sel = e.shiftKey ? { anchor, head: { ...cur } } : null;
      }
      e.preventDefault();
    } else if (e.key === 'ArrowUp') {
      const anchor = e.shiftKey && !sel ? { ...cur } : sel?.anchor;
      if (cur.line > 0) { cur.line--; cur.col = Math.min(cur.col, lines[cur.line].length); }
      sel = e.shiftKey ? { anchor, head: { ...cur } } : null;
      e.preventDefault();
    } else if (e.key === 'ArrowDown') {
      const anchor = e.shiftKey && !sel ? { ...cur } : sel?.anchor;
      if (cur.line < lines.length - 1) { cur.line++; cur.col = Math.min(cur.col, lines[cur.line].length); }
      sel = e.shiftKey ? { anchor, head: { ...cur } } : null;
      e.preventDefault();
    } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
      deleteSelection();
      const text = lines[cur.line];
      lines[cur.line] = text.slice(0, cur.col) + e.key + text.slice(cur.col);
      cur.col++;
      e.preventDefault();
    } else {
      return;
    }
    render();
    syncDirtyState();
  });

  const setFocused = v => document.body.classList.toggle('focused', v);
  view.addEventListener('focus', () => {
    setFocused(true);
    notifyActiveFileSelected();
  });
  view.addEventListener('blur', () => setFocused(false));
  setFocused(document.hasFocus());

  tabsEl.addEventListener('scroll', updateTabScrollbar);
  tabsEl.addEventListener('wheel', event => {
    if (tabsEl.scrollWidth <= tabsEl.clientWidth) return;
    event.preventDefault();
    tabsEl.scrollLeft += event.deltaX || event.deltaY;
  }, { passive: false });
  tabScrollbarThumb.addEventListener('mousedown', event => {
    event.preventDefault();
    const maxScroll = tabsEl.scrollWidth - tabsEl.clientWidth;
    const thumbWidth = tabScrollbarThumb.getBoundingClientRect().width;
    const maxThumbLeft = tabsEl.clientWidth - thumbWidth;
    if (maxScroll <= 0 || maxThumbLeft <= 0) return;
    const startX = event.clientX;
    const startScrollLeft = tabsEl.scrollLeft;
    const move = moveEvent => {
      tabsEl.scrollLeft = startScrollLeft + (moveEvent.clientX - startX) * maxScroll / maxThumbLeft;
    };
    const up = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      document.body.style.userSelect = '';
    };
    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
  addEventListener('resize', updateTabScrollbar);

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function safeUrl(url) {
    const trimmed = url.trim();
    if (/^\s*javascript:/i.test(trimmed)) return '';
    return trimmed;
  }

  function attrEscape(s) {
    return escapeHtml(s).replace(/"/g, '&quot;');
  }

  function renderInline(src) {
    let out = '';
    let i = 0;
    const n = src.length;
    while (i < n) {
      const c = src[i];
      if (c === '\\' && i + 1 < n && /[\\`*_{}\[\]()#+\-.!~>|]/.test(src[i + 1])) {
        out += escapeHtml(src[i + 1]);
        i += 2;
        continue;
      }
      if (c === '`') {
        let run = 0;
        while (src[i + run] === '`') run++;
        const fence = '`'.repeat(run);
        const close = src.indexOf(fence, i + run);
        if (close !== -1) {
          let code = src.slice(i + run, close);
          code = code.replace(/^ +| +$/g, '');
          out += '<code>' + escapeHtml(code) + '</code>';
          i = close + run;
          continue;
        }
        out += escapeHtml(fence);
        i += run;
        continue;
      }
      if (c === '!' && src[i + 1] === '[') {
        const m = matchLink(src, i + 1);
        if (m) {
          const url = safeUrl(m.url);
          out += '<img src="' + attrEscape(url) + '" alt="' + attrEscape(m.text) + '"'
            + (m.title ? ' title="' + attrEscape(m.title) + '"' : '') + '>';
          i = m.end;
          continue;
        }
      }
      if (c === '[') {
        const m = matchLink(src, i);
        if (m) {
          const url = safeUrl(m.url);
          out += '<a href="' + attrEscape(url) + '"'
            + (m.title ? ' title="' + attrEscape(m.title) + '"' : '') + '>'
            + renderInline(m.text) + '</a>';
          i = m.end;
          continue;
        }
      }
      if ((c === '*' || c === '_' || c === '~') ) {
        const double = src[i + 1] === c;
        const marker = double ? c + c : c;
        if (c === '~' && !double) { out += escapeHtml(c); i++; continue; }
        const close = src.indexOf(marker, i + marker.length);
        if (close !== -1 && close > i + marker.length) {
          const inner = src.slice(i + marker.length, close);
          const tag = c === '~' ? 'del' : (double ? 'strong' : 'em');
          out += '<' + tag + '>' + renderInline(inner) + '</' + tag + '>';
          i = close + marker.length;
          continue;
        }
        out += escapeHtml(marker);
        i += marker.length;
        continue;
      }
      const auto = src.slice(i).match(/^https?:\/\/[^\s<]+[^\s<.,;:!?)]/);
      if (auto) {
        const url = auto[0];
        out += '<a href="' + attrEscape(url) + '">' + escapeHtml(url) + '</a>';
        i += url.length;
        continue;
      }
      out += escapeHtml(c);
      i++;
    }
    return out;
  }

  function matchLink(src, start) {
    if (src[start] !== '[') return null;
    let depth = 1;
    let i = start + 1;
    while (i < src.length && depth > 0) {
      if (src[i] === '\\') { i += 2; continue; }
      if (src[i] === '[') depth++;
      else if (src[i] === ']') depth--;
      if (depth === 0) break;
      i++;
    }
    if (depth !== 0 || src[i + 1] !== '(') return null;
    const text = src.slice(start + 1, i);
    let j = i + 2;
    let url = '';
    while (j < src.length && src[j] !== ')' && src[j] !== ' ' && src[j] !== '\t') { url += src[j]; j++; }
    let title = '';
    if (src[j] === ' ' || src[j] === '\t') {
      while (src[j] === ' ' || src[j] === '\t') j++;
      if (src[j] === '"' || src[j] === "'") {
        const q = src[j]; j++;
        while (j < src.length && src[j] !== q) { title += src[j]; j++; }
        j++;
      }
    }
    if (src[j] !== ')') return null;
    return { text, url, title, end: j + 1 };
  }

  function isHr(line) {
    const t = line.trim();
    if (t.length < 3) return false;
    const ch = t[0];
    if (ch !== '-' && ch !== '*' && ch !== '_') return false;
    return t.split('').every(c => c === ch || c === ' ') && t.replace(/ /g, '').length >= 3;
  }

  function renderListItemContent(text) {
    const taskMatch = text.match(/^\[([ xX])\]\s+(.*)$/);
    if (taskMatch) {
      const checked = taskMatch[1].toLowerCase() === 'x';
      return { task: true, html: '<input type="checkbox" disabled' + (checked ? ' checked' : '') + '>' + renderInline(taskMatch[2]) };
    }
    return { task: false, html: renderInline(text) };
  }

  function renderTable(rows) {
    const splitRow = r => {
      let s = r.trim();
      if (s.startsWith('|')) s = s.slice(1);
      if (s.endsWith('|')) s = s.slice(0, -1);
      const cells = [];
      let cur = '';
      for (let i = 0; i < s.length; i++) {
        if (s[i] === '\\' && s[i + 1] === '|') { cur += '|'; i++; continue; }
        if (s[i] === '|') { cells.push(cur); cur = ''; continue; }
        cur += s[i];
      }
      cells.push(cur);
      return cells.map(c => c.trim());
    };
    const header = splitRow(rows[0]);
    const aligns = splitRow(rows[1]).map(c => {
      const left = c.startsWith(':');
      const right = c.endsWith(':');
      if (left && right) return 'center';
      if (right) return 'right';
      if (left) return 'left';
      return '';
    });
    let html = '<table><thead><tr>';
    header.forEach((cell, idx) => {
      const a = aligns[idx] ? ' style="text-align:' + aligns[idx] + '"' : '';
      html += '<th' + a + '>' + renderInline(cell) + '</th>';
    });
    html += '</tr></thead><tbody>';
    for (let r = 2; r < rows.length; r++) {
      const cells = splitRow(rows[r]);
      html += '<tr>';
      for (let idx = 0; idx < header.length; idx++) {
        const a = aligns[idx] ? ' style="text-align:' + aligns[idx] + '"' : '';
        html += '<td' + a + '>' + renderInline(cells[idx] || '') + '</td>';
      }
      html += '</tr>';
    }
    html += '</tbody></table>';
    return html;
  }

  function isTableDelimiter(line) {
    const t = line.trim();
    if (!t.includes('-')) return false;
    return /^\|?\s*:?-+:?\s*(\|\s*:?-+:?\s*)*\|?$/.test(t);
  }

  function renderBlocks(srcLines) {
    let html = '';
    let i = 0;
    const n = srcLines.length;
    while (i < n) {
      let line = srcLines[i];
      if (line.trim() === '') { i++; continue; }

      const fence = line.match(/^(\s*)(```+|~~~+)(.*)$/);
      if (fence) {
        const marker = fence[2][0];
        const len = fence[2].length;
        const lang = fence[3].trim().split(/\s+/)[0];
        const body = [];
        i++;
        let closed = false;
        while (i < n) {
          const cm = srcLines[i].match(/^\s*(`+|~+)\s*$/);
          if (cm && cm[1][0] === marker && cm[1].length >= len) { closed = true; i++; break; }
          body.push(srcLines[i]);
          i++;
        }
        if (closed) {
          html += '<pre><code' + (lang ? ' class="language-' + attrEscape(lang) + '"' : '') + '>'
            + escapeHtml(body.join('\n')) + '</code></pre>';
        } else {
          html += '<p>' + renderInline(line) + '</p>';
          i = i;
        }
        continue;
      }

      if (/^( {4}|\t)/.test(line)) {
        const body = [];
        while (i < n && (/^( {4}|\t)/.test(srcLines[i]) || srcLines[i].trim() === '')) {
          if (srcLines[i].trim() === '' && !(i + 1 < n && /^( {4}|\t)/.test(srcLines[i + 1]))) break;
          body.push(srcLines[i].replace(/^( {4}|\t)/, ''));
          i++;
        }
        while (body.length && body[body.length - 1] === '') body.pop();
        html += '<pre><code>' + escapeHtml(body.join('\n')) + '</code></pre>';
        continue;
      }

      const atx = line.match(/^(#{1,6})\s+(.*?)\s*#*\s*$/);
      if (atx) {
        const level = atx[1].length;
        html += '<h' + level + '>' + renderInline(atx[2]) + '</h' + level + '>';
        i++;
        continue;
      }

      if (isHr(line)) { html += '<hr>'; i++; continue; }

      if (line.startsWith('>')) {
        const body = [];
        while (i < n && srcLines[i].startsWith('>')) {
          body.push(srcLines[i].replace(/^>\s?/, ''));
          i++;
        }
        html += '<blockquote>' + renderBlocks(body) + '</blockquote>';
        continue;
      }

      if (i + 1 < n && line.includes('|') && isTableDelimiter(srcLines[i + 1])) {
        const rows = [line, srcLines[i + 1]];
        i += 2;
        while (i < n && srcLines[i].includes('|') && srcLines[i].trim() !== '') { rows.push(srcLines[i]); i++; }
        html += renderTable(rows);
        continue;
      }

      const ulMatch = line.match(/^(\s*)([-*+])\s+(.*)$/);
      const olMatch = line.match(/^(\s*)(\d+)[.)]\s+(.*)$/);
      if (ulMatch || olMatch) {
        const ordered = !!olMatch;
        const startNum = ordered ? parseInt(olMatch[2], 10) : 1;
        let items = [];
        while (i < n) {
          const cur = srcLines[i];
          const um = cur.match(/^(\s*)([-*+])\s+(.*)$/);
          const om = cur.match(/^(\s*)(\d+)[.)]\s+(.*)$/);
          const m = ordered ? om : um;
          if (!m) {
            if (cur.trim() === '') {
              if (i + 1 < n && (ordered ? /^(\s*)\d+[.)]\s+/.test(srcLines[i + 1]) : /^(\s*)[-*+]\s+/.test(srcLines[i + 1]))) { i++; continue; }
              break;
            }
            if (/^(\s+)\S/.test(cur)) {
              items[items.length - 1].lines.push(cur.replace(/^\s{1,4}/, ''));
              i++;
              continue;
            }
            break;
          }
          items.push({ lines: [m[3]] });
          i++;
        }
        const tag = ordered ? 'ol' : 'ul';
        const startAttr = ordered && startNum !== 1 ? ' start="' + startNum + '"' : '';
        let listHtml = '<' + tag + startAttr + '>';
        for (const item of items) {
          if (item.lines.length === 1) {
            const r = renderListItemContent(item.lines[0]);
            listHtml += '<li' + (r.task ? ' class="task"' : '') + '>' + r.html + '</li>';
          } else {
            listHtml += '<li>' + renderBlocks(item.lines) + '</li>';
          }
        }
        listHtml += '</' + tag + '>';
        html += listHtml;
        continue;
      }

      const para = [];
      while (i < n && srcLines[i].trim() !== '' && !/^#{1,6}\s+/.test(srcLines[i])
        && !srcLines[i].startsWith('>') && !isHr(srcLines[i])
        && !/^(\s*)([-*+])\s+/.test(srcLines[i]) && !/^(\s*)\d+[.)]\s+/.test(srcLines[i])
        && !/^(\s*)(```+|~~~+)/.test(srcLines[i])) {
        if (i > 0 && i + 1 <= n) {
          const next = srcLines[i + 1];
          if (para.length === 0 && next !== undefined && /^=+\s*$/.test(next)) {
            html += '<h1>' + renderInline(srcLines[i].trim()) + '</h1>';
            i += 2;
            para.push('__consumed__');
            break;
          }
          if (para.length === 0 && next !== undefined && /^-+\s*$/.test(next)) {
            html += '<h2>' + renderInline(srcLines[i].trim()) + '</h2>';
            i += 2;
            para.push('__consumed__');
            break;
          }
        }
        para.push(srcLines[i]);
        i++;
      }
      if (para.length && para[0] !== '__consumed__') {
        const rendered = para.map((l, idx) => {
          const hard = /( {2,}|\\)$/.test(l) && idx < para.length - 1;
          return renderInline(l.replace(/( {2,}|\\)$/, '')) + (hard ? '<br>' : '');
        }).join('\n');
        html += '<p>' + rendered + '</p>';
      }
    }
    return html;
  }

  function renderMarkdown(src) {
    return renderBlocks(src.replace(/\r\n?/g, '\n').split('\n'));
  }

  renderBlankCanvas();
</script>
