<!doctype html>
<title>Canvas</title>
<style>
  html, body { margin: 0; height: 100%; }
  html, body { background: var(--editor-background); }
  ::-webkit-scrollbar { width: 14px; height: 14px; background: transparent; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbarSlider-background, #c1c1c1); border-radius: 0; }
  ::-webkit-scrollbar-thumb:hover { background: var(--scrollbarSlider-hoverBackground, #a8a8a8); }
  ::-webkit-scrollbar-corner { background: transparent; }
  body { color: var(--editor-foreground); font: 13px "Menlo", monospace; line-height: 18px; overflow: hidden; }
  html { overflow: hidden; }
  html, body { cursor: default; }
  .scroller { height: 100%; overflow-y: scroll; overflow-x: hidden; overscroll-behavior: none; }
  #top-shadow { position: fixed; top: 0; left: 0; right: 0; height: 6px; pointer-events: none; z-index: 10; opacity: 0; background: linear-gradient(to bottom, rgba(0, 0, 0, 0.08), transparent); }
  body.scrolled #top-shadow { opacity: 1; }
  .wrap { display: flex; min-height: 100%; cursor: text; }
  .gutter { color: var(--editorLineNumber-foreground, #999); text-align: right; padding: 12px 12px 0 0; user-select: none; white-space: pre; min-width: 3ch; cursor: default; }
  #view { margin: 0; padding: 12px 0 0 0; white-space: pre; outline: none; position: relative; flex: 1; min-width: 0; }
  #gutter-highlight { display: none; position: fixed; pointer-events: none; z-index: 10; background: var(--list-inactiveSelectionBackground); }
  body.focused #gutter-highlight { background: var(--list-activeSelectionBackground); }
  .line { display: block; height: 18px; line-height: 18px; }
  .line.active { background: var(--list-inactiveSelectionBackground); color: var(--list-inactiveSelectionForeground); }
  body.focused .line.active { background: var(--list-activeSelectionBackground); color: var(--list-activeSelectionForeground); }
  .cursor { display: inline-block; width: 1px; background: var(--editor-foreground, #000); margin-left: -1px; animation: blink 1s step-end infinite; vertical-align: text-bottom; height: 1em; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
<div class="scroller" id="scroller"><div class="wrap"><div class="gutter" id="gutter"></div><pre id="view" tabindex="0"></pre></div></div><div id="top-shadow"></div><div id="gutter-highlight"></div>
<script type="module">
  import { prepare, layout } from '/node_modules/@chenglou/pretext/dist/layout.js';
  const FONT = '13px Menlo';
  const LINE_HEIGHT = layout(prepare('M', FONT), 10000, 18).height;
  let lines = [''];
  let cur = { line: 0, col: 0 };
  const view = document.getElementById('view');
  const gutter = document.getElementById('gutter');
  const scroller = document.getElementById('scroller');
  const gutterHighlight = document.getElementById('gutter-highlight');

  function positionGutterHighlight() {
    const line = view.querySelector('.line.active');
    if (!line) {
      gutterHighlight.style.display = 'none';
      return;
    }
    const lr = line.getBoundingClientRect();
    const sr = scroller.getBoundingClientRect();
    const gutterW = sr.right - sr.left - scroller.clientWidth;
    if (gutterW <= 0) {
      gutterHighlight.style.display = 'none';
      return;
    }
    gutterHighlight.style.display = 'block';
    gutterHighlight.style.top = lr.top + 'px';
    gutterHighlight.style.left = (sr.left + scroller.clientWidth) + 'px';
    gutterHighlight.style.width = gutterW + 'px';
    gutterHighlight.style.height = LINE_HEIGHT + 'px';
  }

  function updateTopShadow() {
    document.body.classList.toggle('scrolled', scroller.scrollTop > 0);
  }

  function updateScrollPast() {
    const pad = Math.max(0, scroller.clientHeight - LINE_HEIGHT);
    view.style.paddingBottom = pad + 'px';
    gutter.style.paddingBottom = pad + 'px';
  }
  addEventListener('resize', () => { updateScrollPast(); positionGutterHighlight(); updateTopShadow(); });
  scroller.addEventListener('scroll', () => { positionGutterHighlight(); updateTopShadow(); });
  scroller.addEventListener('wheel', e => {
    e.preventDefault();
    scroller.scrollTop += e.deltaY;
  }, { passive: false });
  updateScrollPast();
  updateTopShadow();

  function render() {
    gutter.textContent = lines.map((_, i) => i + 1).join('\n');
    view.innerHTML = '';
    lines.forEach((text, i) => {
      const div = document.createElement('div');
      div.className = 'line' + (i === cur.line ? ' active' : '');
      div.dataset.line = i;
      if (i === cur.line) {
        const before = document.createTextNode(text.slice(0, cur.col));
        const caret = document.createElement('span');
        caret.className = 'cursor';
        const after = document.createTextNode(text.slice(cur.col) || '\u200b');
        div.appendChild(before);
        div.appendChild(caret);
        div.appendChild(after);
      } else {
        div.textContent = text || '\u200b';
      }
      view.appendChild(div);
    });
    positionGutterHighlight();
  }

  function setFromContent(content) {
    lines = content.split('\n');
    cur = { line: 0, col: 0 };
    render();
  }

  addEventListener('message', e => {
    if (e.data?.type === 'vfs:opened') setFromContent(e.data.content);
  });

  document.addEventListener('mousedown', e => {
    if (e.target.closest('.gutter')) return;
    let lineEl = e.target.closest('.line');
    if (!lineEl) {
      const last = view.lastElementChild;
      if (!last) return;
      cur = { line: lines.length - 1, col: lines[lines.length - 1].length };
      render();
      view.focus();
      return;
    }
    const li = +lineEl.dataset.line;
    const text = lines[li];
    const rect = lineEl.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const measure = document.createElement('span');
    measure.style.font = getComputedStyle(view).font;
    measure.style.visibility = 'hidden';
    measure.style.position = 'absolute';
    measure.style.whiteSpace = 'pre';
    document.body.appendChild(measure);
    let col = text.length;
    for (let i = 0; i <= text.length; i++) {
      measure.textContent = text.slice(0, i);
      if (measure.offsetWidth >= x) { col = i > 0 ? (measure.offsetWidth - x < (measure.offsetWidth - (measure.textContent = text.slice(0, i - 1), measure.offsetWidth)) ? i : i - 1) : 0; break; }
    }
    document.body.removeChild(measure);
    cur = { line: li, col };
    render();
    view.focus();
  });

  view.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const text = lines[cur.line];
      lines.splice(cur.line, 1, text.slice(0, cur.col), text.slice(cur.col));
      cur = { line: cur.line + 1, col: 0 };
      e.preventDefault();
    } else if (e.key === 'Backspace') {
      if (cur.col > 0) {
        const text = lines[cur.line];
        lines[cur.line] = text.slice(0, cur.col - 1) + text.slice(cur.col);
        cur.col--;
      } else if (cur.line > 0) {
        const prev = lines[cur.line - 1];
        const text = lines[cur.line];
        cur = { line: cur.line - 1, col: prev.length };
        lines.splice(cur.line, 2, prev + text);
      }
      e.preventDefault();
    } else if (e.key === 'ArrowLeft') {
      if (cur.col > 0) cur.col--;
      else if (cur.line > 0) { cur.line--; cur.col = lines[cur.line].length; }
      e.preventDefault();
    } else if (e.key === 'ArrowRight') {
      if (cur.col < lines[cur.line].length) cur.col++;
      else if (cur.line < lines.length - 1) { cur.line++; cur.col = 0; }
      e.preventDefault();
    } else if (e.key === 'ArrowUp') {
      if (cur.line > 0) { cur.line--; cur.col = Math.min(cur.col, lines[cur.line].length); }
      e.preventDefault();
    } else if (e.key === 'ArrowDown') {
      if (cur.line < lines.length - 1) { cur.line++; cur.col = Math.min(cur.col, lines[cur.line].length); }
      e.preventDefault();
    } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
      const text = lines[cur.line];
      lines[cur.line] = text.slice(0, cur.col) + e.key + text.slice(cur.col);
      cur.col++;
      e.preventDefault();
    } else {
      return;
    }
    render();
  });

  const setFocused = v => document.body.classList.toggle('focused', v);
  view.addEventListener('focus', () => setFocused(true));
  view.addEventListener('blur', () => setFocused(false));
  setFocused(document.hasFocus());

  render();
</script>
